<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Darabif & Insan Jaya - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Darabif & Insan Jaya Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "darabif",
                "name": "Ladang Darabif & Insan Jaya Estate",
                "reportInfo": "Data based on PA Report 2-2025 (Visit: Dec 2025) & Agronomy Report 1-2026 (Visit: Feb 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Ladang Darabif: 1,647.00 ha",
                            "Ladang Insan Jaya: 483.00 ha",
                            "Total Mature: 2,130.00 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Jan 2026)",
                        "value": "1.43 / 1.26 MT",
                        "note": "Darabif (+56%) / Insan Jaya (+19%). (Agro Rep 1-2026)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 202.97 / RM 230.45",
                        "note": "Darabif YTD Oct 2025. Underspent due to delayed upkeep."
                    },
                    "weeding": {
                        "title": "Weeding Progress (2026)",
                        "value": "Slow",
                        "note": "Darabif Circle 15%. Insan Jaya Circle 0%. (Agro Rep 1-2026)"
                    },
                    "manuring": {
                        "title": "Manuring Progress (2026)",
                        "value": "Delayed",
                        "note": "Darabif: NK1 22%. Insan Jaya: Mix B 3%. (Agro Rep 1-2026)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio (Darabif)", "value": "1:17 ha (Inadequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 7h8m0 0v8m0-8l-8 8-4-4-6 6' /></svg>", "label": "Yield Trend (Jan 26)", "value": "Darabif +56% vs 2025" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "13-15 Days (Darabif)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Road Status", "value": "Grading Delayed (57%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "P&D Status", "value": "IJ Rats >10% (Dec 25)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25"],
                        "ffb": [2938, 2915, 2951, 3148, 3650, 4050, 4252, 4017],
                        "rainfall": [202, 61, 202, 311, 433, 127, 21, 168],
                        "note": "*Chart data based on 2025 PA records. 2026 data pending full-year aggregation."
                    },
                    "ageProfile": {
                        "labels": ["8-19 Years (Prime)", "20-25 Years (Old)"],
                        "data": [50, 50],
                        "title": "Combined Palm Age Distribution",
                        "note": "*Estates range from 11-23 years old. No replanting required presently. (Agro Rep 1-2026)"
                    }
                },
                "observations": [
                    "<b>Yield Performance:</b> Early 2026 yields have shown significant improvement. Darabif achieved 1.43 MT/ha (+56% vs Jan 2025) which is acceptable. Insan Jaya achieved 1.26 MT/ha (+19%) but remains slightly below expectations. <span class='observation-ref'>(Agro Report 1-2026, Pg. 58)</span>",
                    "<b>Harvesting Operations:</b> Harvesting intervals at Darabif improved significantly to 13-15 days in Jan 2026. Conversely, Insan Jaya continues to struggle with intervals exceeding 15 days due to persistent harvester shortages. <span class='observation-ref'>(Agro Report 1-2026, Pg. 19, 41)</span>",
                    "<b>Manuring Progress:</b> The 2025 fertilizer program was completed (albeit with 2-4 month delays). The 2026 program is already behind schedule due to carry-forward work. Darabif's sub-soil application was converted to broadcasting due to labor limits. <span class='observation-ref'>(Agro Report 1-2026, Pg. 13-17)</span>",
                    "<b>Field Vegetation & Upkeep:</b> Weeding progress is very slow in early 2026. Insan Jaya recorded 0% circle spraying in Jan 2026, leading to the presence of VOPs and Clidemia. Darabif only completed 15% circle weeding. Road grading was previously reported as delayed (57%). <span class='observation-ref'>(Agro Report 1-2026, Pg. 30, 50; PA Report 2-2025)</span>",
                    "<b>Pest & Disease:</b> Rat damage at Insan Jaya spiked to >10% in Dec 2025 but dropped below threshold after baiting; however, the baiting campaign itself was incomplete. At Darabif, Ganoderma infection levels remain undetermined; immediate de-boling is advised. <span class='observation-ref'>(Agro Report 1-2026, Pg. 37-38, 44)</span>",
                    "<b>Labour Situation:</b> A persistent shortage of specialized workers (spraying and manuring) heavily impacts upkeep schedules and contributes to operational delays across both estates. <span class='observation-ref'>(PA Report 2-2025; Agro Report 1-2026)</span>"
                ],
                "reports": {
                    "agronomy": {
                         "ExecutiveSummary": "Both estates completed the 2025 fertilizer program with deviations. The 2026 program is currently behind schedule. Crop recovery at Insan Jaya remains a concern with intervals >15 days, while Darabif has improved. 2026 early yields have shown improvement (+56% Darabif, +19% Insan Jaya vs Jan 2025). (Agro Report 1-2026, Pg. 4-7, 58)",
                        "NutrientInputs": "The 2025 program was completed in Jan 2026, though delayed by 2-4 months. For 2026, progress is slow due to carry-forward programs.<ul class='list-disc pl-5 mt-1'><li><b>Insan Jaya:</b> Mix B is at 3% completion.</li><li><b>Darabif:</b> NK1 is at 22% completion.</li><li><b>Methodology:</b> Sub-soil application in Darabif was converted to broadcasting due to labor constraints.</li></ul>(Agro Report 1-2026, Pg. 13-17)",
                        "AgronomicObservationInsanJaya": "Harvesting intervals often exceeded 15 days. Loose fruit management is satisfactory, but underripe bunches were left in the field.<ul class='list-disc pl-5 mt-1'><li><b>Palms:</b> Vigor improved, but Mg deficiency was noted in PM14F-3.</li><li><b>Pruning:</b> Acceptable except for block PM05E (under-pruned).</li><li><b>Weeding:</b> Slow progress (0% circle spraying in Jan 2026). VOPs and wild bamboo are present.</li><li><b>Pests:</b> Rat damage exceeded 10% in Dec 2025 but is currently under control post-baiting.</li></ul>(Agro Report 1-2026, Pg. 19-38)",
                        "AgronomicObservationDarabif": "Harvesting intervals improved significantly to 13-15 days in Jan 2026. Crop quality is acceptable.<ul class='list-disc pl-5 mt-1'><li><b>Pruning:</b> 100% complete for most blocks except PM05E.</li><li><b>Weeding:</b> Progress is very slow (15% circle, 0.4% inter-row in Jan 2026).</li><li><b>Pests & Diseases:</b> Rat damage is below the 5% threshold. Ganoderma infection remains undetermined; de-boling is strongly advised.</li></ul>(Agro Report 1-2026, Pg. 41-51)",
                        "YieldPerformance": "Yields showed improvement early in the year.<ul class='list-disc pl-5 mt-1'><li><b>Darabif:</b> Achieved 1.43 MT/ha in Jan 2026 (+56% vs 2025). Performance is acceptable.</li><li><b>Insan Jaya:</b> Achieved 1.26 MT/ha (+19% vs 2025) but remains below expectation.</li><li><b>Issues:</b> Yield limiting factors include extended harvesting intervals and past fertilizer deviations.</li></ul>(Agro Report 1-2026, Pg. 55-58)",
                        "FertilizerRecommendation": "The 2026 program remains unchanged, except sub-soil applications in Darabif (D4 & D5) have been converted to broadcasting due to an inconsistent workforce. (Agro Report 1-2026, Pg. 60)"
                    },
                    "plantationDarabif": {
                        "ExecutiveSummary": "The estate faces a high turnover of harvesters, though the situation improved by December. Yield YTD Oct is 17% below budget. Field conditions are generally satisfactory, but VOPs need eradication. Road grading must be completed in Feb during dry weather. (PA Report 2-2025, Pg. 47)",
                        "AreaStatement": "As of Oct 2025, the total planted area is 1,684.00 ha. This comprises:<ul class='list-disc pl-5 mt-1'><li><b>Mature:</b> 1,647.00 ha.</li><li><b>Immature:</b> 0 ha.</li><li><b>Others:</b> 25 ha Vacant Land, 12 ha Housing/Pond.</li><li><b>Issues:</b> 50 ha tapping rights claim under appeal (P03/C4, C5, C6, B1).</li></ul>(PA Report 2-2025, Pg. 9)",
                        "LabourStatement": "Current workforce is 96 workers vs requirement of 117 (Ratio 1:17 ha).<ul class='list-disc pl-5 mt-1'><li><b>Harvesters:</b> 63 (Shortage: 6, Ratio 1:26 ha). Reported adequate in Dec.</li><li><b>Spraying:</b> 9 workers (Shortage: 5).</li><li><b>Manuring:</b> 4 workers (Shortage: 5). Reported adequate in Dec.</li><li><b>Turnover:</b> High turnover remains a major issue.</li></ul>(PA Report 2-2025, Pg. 10-11)",
                        "StaffEstablishment": "The staff establishment is satisfactory with 12 personnel.<ul class='list-disc pl-5 mt-1'><li>Includes 1 Manager (Mr. Tomi Hendra), 3 Assistant Managers, and 5 Field Conductors.</li><li>En. Shafai (Sustainability Exec) resigned in June; En. Amirul (FC) joined in August.</li></ul>(PA Report 2-2025, Pg. 12)",
                        "GeneralCharges": "Total General Charges expenditure is RM 1,373,084.02, which is 30% below the budget. Expenditure is well under control. (PA Report 2-2025, Pg. 13)",
                        "UpkeepAndCultivation": "Upkeep activities have experienced delays.<ul class='list-disc pl-5 mt-1'><li><b>Weeding:</b> Circle spraying 67% complete (Delayed due to sprayer shortage). Selective spraying 91% complete.</li><li><b>Manuring:</b> 74% complete (Delayed). Sub-surface application cancelled for specific blocks due to labor shortage and replaced with broadcasting.</li><li><b>Pest & Disease:</b> Ganoderma infection 0.63% (Deboling incomplete). Rat damage low.</li><li><b>Roads & Drains:</b> Grading 57% complete. Erosion noted at P03/C5. Desilting 22% complete.</li></ul>(PA Report 2-2025, Pg. 14-33)",
                        "HarvestingAndCollection": "YTD Cost is RM 71.52/MT, slightly higher than budget (RM 68.88/MT).<ul class='list-disc pl-5 mt-1'><li><b>Rounds:</b> Achieved 15 rounds vs 20 budget.</li><li><b>Interval:</b> 21 days (Target 14 days). Needs reduction.</li><li><b>Productivity:</b> Low in blocks B, C, D (2.07 - 2.56 MT/md). Needs improvement to 3 MT/md.</li></ul>(PA Report 2-2025, Pg. 38-41)",
                        "CropProduction": "YTD FFB Production is 27,549 MT.<ul class='list-disc pl-5 mt-1'><li><b>Yield/Ha:</b> 16.93 MT/ha, which is 17% below the budget of 20.30 MT/ha.</li><li><b>Issues:</b> Shortfall primarily due to harvester shortage and extended intervals. Bunch weights in C & D stagnant due to overripe bunches.</li></ul>(PA Report 2-2025, Pg. 42-43)",
                        "ProductionCost": "YTD Cost of Production is RM 202.97/MT, which is favourable compared to the budget of RM 230.45/MT.<ul class='list-disc pl-5 mt-1'><li><b>General Charges:</b> RM 49.84/MT (-16%)</li><li><b>Upkeep:</b> RM 70.88/MT (-22%)</li><li><b>Harvesting:</b> RM 82.25/MT (+3%)</li></ul>(PA Report 2-2025, Pg. 44)",
                        "VehiclesRunningCost": "Vehicle running costs are satisfactory. Hilux ALM 1918 running cost is RM 0.28/km vs Budget RM 0.74/km. (PA Report 2-2025, Pg. 45)",
                        "CapitalExpenditure": "Budget RM 551,560. Actual expenditure is charged to General Charges by Head Office. Includes new labour/staff quarters. (PA Report 2-2025, Pg. 46)",
                        "Immature": "N/A (100% Mature Estate). (PA Report 2-2025, Pg. 9)"
                    },
                    "plantationInsanjaya": {
                        "ExecutiveSummary": "Main issues are production-related, stemming from harvester (-4) and manuring worker (-1) shortages. This has led to delayed field work (manuring 46% complete) and a 13% yield shortfall vs budget (as of May 2025). Road maintenance is critical. (PA Report 1-2025, Pg. 10, 21, 36, 43)",
                        "AreaStatement": "Total planted area is 483.00 ha, all mature. No change in area statement. (PA Report 1-2025, Pg. 8)",
                        "LabourStatement": "Total 29 workers. The estate is short 4 harvesters and 1 manuring worker. The ratio of workers to planted ha is 1:15, which is acceptable. (PA Report 1-2025, Pg. 9-10)",
                        "UpkeepAndCultivation": "Circle spraying (R1) is 104% complete and satisfactory. Manuring is severely behind schedule at 46% complete (as of May) due to worker shortage. Pruning is 60% complete. Rat damage is high at 12.8%; baiting commenced in June. (PA Report 1-2025, Pg. 14, 21, 23, 26, 28, 30)",
                        "HarvestingAndCollection": "Harvesting rounds are very low (6.19 vs. 10 budget) with an average interval of 19 days. Harvester productivity was low but improved significantly in June. (PA Report 1-2025, Pg. 32, 34, 35)",
                        "CropProduction": "Yield YTD May is 7.12 tons/ha, which is 13% below budget (8.15 tons/ha). (PA Report 1-2025, Pg. 36)"
                    },
                    "pinfosys": {
                         "CEOFinancialSummary": "N/A",
                        "SummaryOfOilPalmExpenditure": "N/A"
                    }
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Labour Recruitment & Productivity</p><p class='text-sm text-gray-600'><b>Darabif PA Remark:</b> High turnover of harvesters must be curbed by encouraging high wages through productivity and long-term retention strategies. (PA Rep 2-2025, Pg. 47)</p></div><div class='policy-item'><p class='font-semibold'>Field Operations & Upkeep</p><p class='text-sm text-gray-600'><b>Darabif PA Remark:</b> Road grading and surfacing must be done in February to capitalise on dry weather. (PA Rep 2-2025, Pg. 47)</p><p class='text-sm text-gray-600'><b>Agro Report Remark:</b> Manuring was deviated from the schedule... Do not allow further delay in manuring. (Agro Rep 1-2026, Pg. 4, 7)</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Darabif PA Remark:</b> To achieve the production budget, the estate must achieve a minimum of 24 rounds/year. Productivity for blocks B, C, and D needs improvement. (PA Rep 2-2025, Pg. 47)</p></div><div class='policy-item'><p class='font-semibold'>Pest & Disease Control</p><p class='text-sm text-gray-600'><b>Agro Report Remark (Insan Jaya):</b> Rat attack is concerning. Rat Baiting has deviated from the standard... ensure... activities are conducted in accordance with the standard operational guidelines. (Agro Rep 1-2026, Pg. 5, 38)</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-purple-50 text-purple-800';
                    
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} h-full"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm text-gray-700">${line}</p>`).join('')}</div>`;
                    }
                    
                    return `<div class="p-4 rounded-lg ${colorClass} h-full"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold text-gray-900 mt-2">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="flex-shrink-0 bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div>
                            <p class="text-sm text-gray-500">${metric.label}</p>
                            <p class="font-bold text-lg">${metric.value}</p>
                        </div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Agronomy Report Details (Report 1-2026)</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-plantation-darabif" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Plantation Advisory Report Details (Darabif, Report 2-2025)</button>
                            <div id="${estate.id}-plantation-darabif" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-plantation-insanjaya" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Plantation Advisory Report Details (Insan Jaya, Report 1-2025)</button>
                            <div id="${estate.id}-plantation-insanjaya" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-semibold">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#c026d3', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#4CAF50', '#2196F3', '#FFC107', '#F44336', '#9C27B0'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const renderSection = (data) => Object.entries(data).map(([section, content]) => `
                    <div class="mb-5">
                        <h4 class="font-bold text-gray-900 text-lg">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4>
                        <div class="text-sm text-gray-700 mt-2 leading-relaxed">${content}</div>
                    </div>
                `).join('');

                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDarabifDiv = document.getElementById(`${estateData.id}-plantation-darabif`);
                const plantationInsanJayaDiv = document.getElementById(`${estateData.id}-plantation-insanjaya`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) agronomyDiv.innerHTML = renderSection(estateData.reports.agronomy);
                if (plantationDarabifDiv && estateData.reports.plantationDarabif) plantationDarabifDiv.innerHTML = renderSection(estateData.reports.plantationDarabif);
                if (plantationInsanJayaDiv && estateData.reports.plantationInsanjaya) plantationInsanJayaDiv.innerHTML = renderSection(estateData.reports.plantationInsanjaya);
                if (pinfosysDiv && estateData.reports.pinfosys) pinfosysDiv.innerHTML = renderSection(estateData.reports.pinfosys);
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estateData) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            modalContent.innerHTML = estateData.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
