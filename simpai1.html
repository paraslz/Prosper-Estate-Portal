<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Simpai 1 - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Simpai 1 Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JS -->
        </div>
    </div>
    
    <!-- Modal -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "simpai1",
                "name": "Ladang Simpai 1",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 15th June 2026) & Agronomy Report 1/2026 (Visit: 22nd April 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": ["Total Planted: 1,249.22 ha", "Mature: 1,141.37 ha", "Immature: 107.85 ha"]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "5.47 / 7.14 MT",
                        "note": "Year to Date (May 2026)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 408.78 / RM 316.15",
                        "note": "Year to Date (May 2026)"
                    },
                    "labour": {
                        "title": "Labour Ratio",
                        "value": "1:16 ha",
                        "note": "As at May 2026"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Shortage", "value": "Sprayers (-4)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Rat Damage", "value": "21-25% (Threshold exceeded)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Harvest Interval", "value": "14 Days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Outturn", "value": "71%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Manuring Prog.", "value": "94% (Mix B)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Barn Owl Occup.", "value": "48%" }
                ],
                "observations": [
                    "<b>Sprayer Shortage & Productivity:</b> Significant shortage of sprayers (-4). Productivity is low (1.8 ha/man-day), requiring training and potential shift to CDA/Inter Pump. <span class='observation-ref'>(PA 1/2026, Pg. 10, 15)</span>",
                    "<b>Rat Infestation:</b> Rat damage census in March 2026 showed infestation levels (20-25%) exceeding the 10% threshold. Rat baiting campaign in progress. <span class='observation-ref'>(AR 1/2026, Pg. 26-27)</span>",
                    "<b>High Overspending:</b> General Charges overspent by 124%, driven by unbudgeted Head Office/Agency fees and Directors' remuneration. <span class='observation-ref'>(PA 1/2026, Pg. 13)</span>",
                    "<b>Manuring Program:</b> 2025 program completed. 2026 Mix B is 94% complete (Mar 2026), but Kieserite application is delayed due to late delivery. <span class='observation-ref'>(AR 1/2026, Pg. 13)</span>",
                    "<b>Harvester Outturn:</b> Harvester outturn is at 71%. Disparities in wages for younger fields (P19-P22) require urgent review to stabilize production. <span class='observation-ref'>(PA 1/2026, Pg. 34-36)</span>",
                    "<b>Weeding Delays:</b> Weeding is slightly delayed due to worker shortages. Improvement needed in spraying quality in inter-rows to address Hedyotis and Asystasia. <span class='observation-ref'>(AR 1/2026, Pg. 22)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate faces critical challenges regarding labour shortage (specifically sprayers) and low operational productivity. While harvesting is satisfactory, urgent measures are needed for sprayer recruitment, mechanization, and financial oversight. (Source: PA 1/2026, Pg. 7)",
                        "Area Statement": "Mature area has increased to 1,141.37 ha. Immature area is 107.85 ha. Total area: 1,249.22 ha. (Source: PA 1/2026, Pg. 9)",
                        "Labour Statement": "Shortage of 4 sprayers noted. Current Harvesters: 48. Total workforce: 65 vs 77 required. Ratio 1:16 ha is satisfactory. (Source: PA 1/2026, Pg. 10-11)",
                        "Staff Establishment": "Current staff (1 Manager, 2 Asst Managers, 1 Cadet Trainee, 4 Field Conductors, 2 Clerks) are adequate. (Source: PA 1/2026, Pg. 12)",
                        "General Charges": "124% overspend attributed to unbudgeted Head Office/Agency fees (6000% variance) and increased medical claims. (Source: PA 1/2026, Pg. 13)",
                        "Upkeep and Cultivation": "Circle spraying progress 74% (shortage of workers). Inter-row spraying 71%. Manuring progress 57%. (Source: PA 1/2026, Pg. 14-22)",
                        "Harvesting and Collection": "12.2 rounds completed (budgeted 10). Average interval 14 days. Mechanization only implemented in 166 ha. Harvester outturn 71%. (Source: PA 1/2026, Pg. 34-36)",
                        "Crop Production": "Yield 5.47 MT/ha (25% below budget). Dry weather affecting ripening. (Source: PA 1/2026, Pg. 37)",
                        "Production Cost": "RM 408.78/Tonne FFB. High variance due to General Charges overspend. (Source: PA 1/2026, Pg. 40)",
                        "Vehicles Running Cost": "Inconsistent reporting; no budget set for Hilux running costs. Urgent coordination required. (Source: PA 1/2026, Pg. 41)",
                        "Capital Expenditure": "N/A - No expenditure incurred till May. (Source: PA 1/2026, Pg. 42)",
                        "Immature": "PR23H (107.85 ha). Weeding satisfactory. Supplying 1074 palms to date. (Source: PA 1/2026, Pg. 43-46)"
                    },
                    "agronomy": {
                        "Executive Summary": "Primary limiting factors are delayed manuring (late fertilizer delivery), sprayer productivity issues, and rat infestation (threshold exceeded). 2025 yield improved significantly to 22.34 MT/ha. (Source: AR 1/2026, Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "2025 program completed. 2026 Mixture B is 94% complete (Mar 2026); Kieserite pending delivery. (Source: AR 1/2026, Pg. 12-13)",
                        "Agronomic Observation": "Weeding slightly delayed by labor shortage. Rat census (March 2026) indicates damage >10% (avg. 20-25%). Canopy management good; over-pruning noted in PM21F. (Source: AR 1/2026, Pg. 15-27)",
                        "Yield Performance": "2025 yield 22.34 MT/ha (26% increase from 2024). Early 2026 yield 9% higher than Q1 2025. (Source: AR 1/2026, Pg. 38-40)",
                        "Fertilizer Recommendation": "Second half of 2026 program revised for budget optimization. (Source: AR 1/2026, Pg. 45-48)"
                    },
                    "pinfosys": {
                        "CEO Financial Summary": "Not Available",
                        "Summary of Oil Palm Expenditure": "Not Available"
                    }
                }
            };

            const container = document.getElementById('selected-estate-container');
            
            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function populateDropdowns(estate) {
                // Plantation
                const plantationDiv = document.getElementById(`${estate.id}-plantation`);
                if (plantationDiv && estate.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estate.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                // Agronomy
                const agronomyDiv = document.getElementById(`${estate.id}-agronomy`);
                if (agronomyDiv && estate.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estate.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                // Pinfosys
                const pinfosysDiv = document.getElementById(`${estate.id}-pinfosys`);
                if (pinfosysDiv && estate.reports.pinfosys) {
                    pinfosysDiv.innerHTML = Object.entries(estate.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
            }

            container.innerHTML = createEstateHTML(estateData);
            populateDropdowns(estateData);
            container.querySelectorAll('.dropdown-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.dropdownId;
                    document.getElementById(id).classList.toggle('active');
                });
            });
        });
    </script>
</body>
</html>
