<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Simpai 2 - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Simpai 2 Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Central Data Store for Ladang Simpai 2
            // Combines new Agronomy Report 1/2026 and existing PA Report 2/2025
            const estateData = {
                "id": "simpai2",
                "name": "Ladang Simpai 2",
                "reportInfo": "Data based on PA Report 2/2025 (Visit: 16th Dec 2025) & Agronomy Report 1/2026 (Visit: 21st April 2026).",
                
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": [
                            "Total Planted: 1,237.02 ha", 
                            "Mature: 694.92 ha", 
                            "Immature: 542.10 ha",
                            "Unplanted: 29.70 ha"
                        ] 
                    },
                    "yield": { 
                        "title": "Yield/Ha (Actual)", 
                        "value": "2.58 MT", 
                        "note": "YTD Mar 2026 (-15.5% vs 2025)" 
                    },
                    "cost": { 
                        "title": "FFB Cost/Tonne (Actual / Budget)", 
                        "value": "RM 425.23 / RM 424.49", 
                        "note": "YTD Oct 2025 (PA Report)" 
                    },
                    "weeding": { 
                        "title": "Weeding Progress", 
                        "value": "Ongoing / Delayed", 
                        "note": "Inter-row delayed; Mucuna in PR24" 
                    },
                    "manuring": { 
                        "title": "Manuring Progress", 
                        "value": "In Progress", 
                        "note": "44% Mix B, 100% Comp B (Mar '26)" 
                    }
                },

                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Status", "value": "Critical Shortage", "note": "Impacts field upkeep" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-500' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "P&D Status", "value": "Concern", "note": "Rats & Rhino Beetles" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER %", "value": "15.66%", "note": "YTD Oct 2025" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z' /></svg>", "label": "Harvest Interval", "value": "5-15 Days", "note": "Acceptable range" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Pruning", "value": "100% Done", "note": "Stacking needs work" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Mg Deficiency", "note": "PM18A-1 (Low-lying)" }
                ],

                "chartData": {
                    "production": {
                        "labels": ["YTD Mar 2025", "YTD Mar 2026"],
                        "data": [2.98, 2.58],
                        "note": "*YTD Yield (MT/Ha). 2026 Performance dropped 15.5% vs 2025. (Source: AR 1/2026)"
                    },
                    "ageProfile": {
                        "labels": ["0-3 Yrs (Immature)", "4-7 Yrs (Young Mature)", "8-19 Yrs (Prime)", ">26 Yrs (Old)"],
                        "data": [542.10, 551.73, 89.43, 53.76],
                        "title": "Ladang Simpai 2 Palm Age Distribution",
                        "note": "*Based on Agronomy Report 1/2026, Pg. 8."
                    }
                },

                "observations": [
                    "<b>Yield Decline (Agronomy):</b> YTD March 2026 yield is 2.58 MT/ha, a 15.5% decrease compared to the same period in 2025, heavily impacted by poor yields in PM971 (-41%) and PM18A (-29%). Low early-year rainfall may cause moisture stress. <span class='observation-ref'>(AR 1/2026, Pg. 33-34)</span>",
                    "<b>Labor Shortage (PA & Agro):</b> A critical shortage of weeders and manurers continues to delay field upkeep (inter-row spraying) and resulted in incomplete 2025 RP/CPD manuring programs. Overall ratio was 1:23 ha. <span class='observation-ref'>(PA 2/2025, Pg. 12; AR 1/2026, Pg. 9, 19)</span>",
                    "<b>Pest Issues - Rats & Rhino Beetles (Agronomy):</b> Rat damage symptoms remain a concern despite ongoing baiting campaigns. Rhinoceros beetle attacks are high (9-14% damage) in immature areas PR24F and PR25G, requiring sustained chemical treatments. <span class='observation-ref'>(AR 1/2026, Pg. 25, 31)</span>",
                    "<b>Ground Upkeep & Weeds (Agronomy):</b> Weeding progress is lagging in specific blocks. Mucuna is creeping onto palms in PR24F, Stenochlaena in PM18A, and Clidemia/VOPs persist in PM21C-1. <span class='observation-ref'>(AR 1/2026, Pg. 20-21, 27-29)</span>",
                    "<b>Frond Stacking & Quality (Agronomy):</b> Canopy management is acceptable, but frond stacking is unsatisfactory, particularly in lowland/previously flooded areas (PM971) and young mature blocks. Unripe and long-stalk bunches are still observed at ramps. <span class='observation-ref'>(AR 1/2026, Pg. 12, 15-18)</span>",
                    "<b>Nutrient Deficiency (Agronomy):</b> Magnesium deficiency (yellowing lower fronds) persists, notably in block PM18A-1 in low-lying, flood-prone areas. <span class='observation-ref'>(AR 1/2026, Pg. 22)</span>"
                ],

                "reports": {
                    "agronomy": {
                        "Executive Summary": "The overall palm condition is acceptable. 2025 yield improved significantly to 17.59 MT/ha (+37%), but YTD March 2026 dropped 15.5% vs 2025. Pest issues (Rats & Rhino Beetle) and delayed ground upkeep due to labor shortages are the main yield-limiting factors. The 2026 fertilizer program has been revised down due to high prices. <span class='observation-ref'>(AR 1/2026, Pg. 6, 32-36)</span>",
                        
                        "Area Statement": "As of April 2026, the total planted area is <b>1,237.02 ha</b>. This comprises:<br>&bull; <b>Mature:</b> 694.92 ha (56%).<br>&bull; <b>Immature:</b> 542.10 ha (44%).<br>&bull; <b>Unplanted:</b> 29.70 ha.<br>&bull; <b>Replanting:</b> PR25 (82.7 ha) completed in Dec 2025 with SPH 145. <span class='observation-ref'>(AR 1/2026, Pg. 7-8)</span>",
                        
                        "Nutrient Inputs & Progress of Manuring": "<br>&bull; <b>2025 Progress:</b> Mix B, Kies, and CRF achieved 100%. RP (87%) and CPD (60%) incomplete due to delivery and labor constraints.<br>&bull; <b>2026 Progress (Mar):</b> Mix B (44%) and Compound B (100%) applied. Others commence in April. Overall progress acceptable. <span class='observation-ref'>(AR 1/2026, Pg. 9-10)</span>",
                        
                        "Agronomic Observation": "<br>&bull; <b>Harvesting:</b> Intervals are acceptable (5-15 days). Minor issues with unripe and long-stalk bunches observed at ramp.<br>&bull; <b>Pruning:</b> 100% completed, but frond stacking is messy in flooded lowland areas (PM971, PM21C).<br>&bull; <b>Weeding:</b> Circle spraying mostly done (66-100%). Inter-row delayed in several blocks. Stenochlaena, Clidemia, VOPs, and Mucuna (PR24) present.<br>&bull; <b>Pest & Disease:</b> Rat damage remains a concern; baiting ongoing. Rhinoceros beetle attacks high (9-14%) in PR24/PR25; chemical treatments ongoing. Mg deficiency in PM18A-1. <span class='observation-ref'>(AR 1/2026, Pg. 11-31)</span>",
                        
                        "Yield Performance": "<br>&bull; <b>2025 Full Year:</b> 17.59 MT/Ha (+37.3% vs 2024), driven by young mature blocks (PM21C up 172%). Old mature PM971 dropped 48%.<br>&bull; <b>2026 YTD (Mar):</b> 2.58 MT/Ha (-15.5% vs 2025). PM971 (-41%) and PM18A (-29%) performed poorly. Dry start to 2026 (low Jan-Mar rainfall) may cause moisture stress. <span class='observation-ref'>(AR 1/2026, Pg. 32-34)</span>",
                        
                        "Fertilizer Recommendation": "<br>&bull; <b>2026 Program:</b> Revised for 2nd half of 2026. One application round withdrawn in old mature areas, and dosage reduced for young mature/immature areas due to high fertilizer prices and stock limits. <span class='observation-ref'>(AR 1/2026, Pg. 36)</span>"
                    },
                    "plantation": {
                        "Executive Summary": "Crop production as of Oct 2025 was robust at 14.67 MT/ha (+46% above budget). However, management of immature areas is compromised by a severe labor shortage. Recommendations include: 1) Urgent recruitment of sprayers, 2) Adoption of CDA or Inter Pump spraying to boost productivity, 3) Specific eradication of Lalang/VOPs, and 4) Immediate drainage works to resolve flooding at PR25. <span class='observation-ref'>(PA Report 2/2025, Pg. 51-52)</span>",
                        
                        "Area Statement": "<b>Total Planted (Dec 2025):</b> 1,237.02 ha.<br>&bull; <b>Mature:</b> 497.50 ha (25.23%).<br>&bull; <b>Immature:</b> 656.82 ha (33.31%).<br>&bull; <b>Replanting (PR25):</b> 82.70 ha (6.53%).<br>&bull; No replanting is planned for 2026 or 2027. <span class='observation-ref'>(PA Report 2/2025, Pg. 11)</span>",
                        
                        "Labour Statement": "Current workforce is inadequate (Ratio 1:23 ha).<br>&bull; <b>Harvesters:</b> 31 (Adequate, Ratio 1:16).<br>&bull; <b>Weeders:</b> 12 (Shortage 10).<br>&bull; <b>Manurers:</b> 4 (Shortage 4). <span class='observation-ref'>(PA Report 2/2025, Pg. 12)</span>",
                        
                        "Staff Establishment": "Staffing is satisfactory despite recent turnover. New joiners in Aug/Sept 2025 include En. Aminuddin (Asst In-Charge) and two Asst Managers. <span class='observation-ref'>(PA Report 2/2025, Pg. 13-14)</span>",
                        
                        "General Charges": "<b>Expenditure:</b> RM 1,302.81/ha vs Budget RM 1,555.98/ha (16% Underspent).<br>&bull; Management & Supervision cost is RM 583.18/ha.<br>&bull; Labour & Amenities cost is RM 233.69/ha. <span class='observation-ref'>(PA Report 2/2025, Pg. 15)</span>",
                        
                        "Upkeep & Cultivation": "<br>&bull; <b>Weeding:</b> Circle spraying 88% done. Selective spraying 76% done.<br>&bull; <b>Manuring:</b> Cost is 7% above budget due to price increases.<br>&bull; <b>Roads:</b> Grading done. Hilly roads are slippery; crusher run recommended.<br>&bull; <b>Pruning:</b> 100% completed; appearance satisfactory. <span class='observation-ref'>(PA Report 2/2025, Pg. 16-28)</span>",
                        
                        "Harvesting and Collection": "<b>Cost:</b> RM 105.37/MT (High due to incentives).<br>&bull; <b>Performance:</b> 17.4 rounds completed (Budget 20). Interval ~12 days.<br>&bull; <b>Productivity:</b> Harvester outturn 68% (Unsatisfactory). Loose fruit collection at P21 needs improvement. <span class='observation-ref'>(PA Report 2/2025, Pg. 29-31)</span>",
                        
                        "Crop Production": "<b>Yield (YTD Oct 2025):</b> 14.67 MT/ha vs Budget 10.02 MT/ha (+46%).<br>&bull; 5% higher than last year.<br>&bull; Bunch Weights improved across all plantings. <span class='observation-ref'>(PA Report 2/2025, Pg. 32-33)</span>",
                        
                        "Production Cost": "<b>Total Cost:</b> RM 425.23/MT (Budget RM 424.49/MT).<br>&bull; <b>Breakdown:</b> General Charges (RM 205.72/MT), Upkeep (RM 114.15/MT), Harvesting (RM 105.37/MT). <span class='observation-ref'>(PA Report 2/2025, Pg. 34)</span>",
                        
                        "Vehicles Running Cost": "<br>&bull; <b>Mitsubishi Triton:</b> RM 0.48/km.<br>&bull; <b>Toyota Hilux:</b> RM 0.26/km.<br>Costs are generally satisfactory. <span class='observation-ref'>(PA Report 2/2025, Pg. 35)</span>",
                        
                        "Immature": "<br>&bull; <b>PR22 (197 ha):</b> Scout harvesting 2.7 MT/ha. Weeding 92% done but Lalang present.<br>&bull; <b>PR23 (230 ha):</b> Manuring completed. Patches of Asystasia/VOPs remain.<br>&bull; <b>PR24 (230 ha):</b> Weeding unsatisfactory; prevalent Woodies, VOPs, and Lalang.<br>&bull; <b>PR25 (83 ha):</b> Severe flooding in low-lying area requires drain desilting. <span class='observation-ref'>(PA Report 2/2025, Pg. 37-50)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<p>Policy cross-references are not yet available for this estate.</p>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-red-50 text-red-800' :
                                       metric.title.includes('Weeding') ? 'bg-orange-50 text-orange-800' : 'bg-purple-50 text-purple-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note || ''}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p><p class="text-xs text-gray-400">${metric.note || ''}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Operational Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">YTD Yield Comparison (MT/Ha)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [{
                                label: 'Yield (MT/Ha)',
                                data: estateData.chartData.production.data,
                                backgroundColor: ['#9ca3af', '#f87171'] // Grey for older, Red for new (lower yield)
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#4ade80', '#a3e635', '#facc15', '#fb923c'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                // Insert directly as innerHTML so the nested <br> and <b> tags format properly
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-900">${section}:</h4><p class="text-sm text-gray-700 leading-relaxed">${content}</p></div>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-900">${section}:</h4><p class="text-sm text-gray-700 leading-relaxed">${content}</p></div>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv) {
                    if (estateData.reports.pinfosys && estateData.reports.pinfosys !== "Not Available") {
                        pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-900">${section}:</h4><p class="text-sm text-gray-700 leading-relaxed">${content}</p></div>`).join('');
                    } else {
                         pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                    }
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modal = document.getElementById('policyModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const estateData = { "id": "simpai2", "name": "Ladang Simpai 2" }; 
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            
            const policyData = `
                <div class='policy-item'>
                    <p class='font-semibold'>Pest Management (Rhino Beetles)</p>
                    <p class='text-sm text-gray-600'><b>Ref: P&D-RHINO-01:</b> Chemical treatments must be sustained in immature areas (PR24, PR25) until damage falls below threshold.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Harvesting Standards</p>
                    <p class='text-sm text-gray-600'><b>Ref: HARV-RIPENESS-02:</b> Harvesters must ensure minimum ripeness standards. Unripe bunches/long stalks affect OER and must be penalized.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Weeding Schedule</p>
                    <p class='text-sm text-gray-600'><b>Ref: UPKEEP-WEED-01:</b> Circles and inter-rows must be kept weed-free to prevent encroachment of Mucuna onto palms.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Canopy Management</p>
                    <p class='text-sm text-gray-600'><b>Ref: UPKEEP-PRUNE-03:</b> Fronds must be neatly stacked to avoid blocking paths and creating habitats for pests, especially in lowland areas.</p>
                </div>
            `;
            
            modalContent.innerHTML = policyData;
            modal.classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
