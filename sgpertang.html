<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sungai Pertang Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Sungai Pertang Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sgpertang",
                "name": "Ladang Sungai Pertang",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: 21st Jan 2026) and Plantation Advisory Report 1/2025 (Visit: 9th Oct 2025).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area (AR 1/26)", 
                        "lines": [
                            "Total Oil Palm: 1,228.00 ha", 
                            "Mature: 1,030.00 ha", 
                            "Immature (PR23): 100.00 ha", 
                            "Replanting (PR24): 98.00 ha"
                        ],
                        "note": "Source: AR Pg. 9"
                    },
                    "yield": { 
                        "title": "Yield/Ha (2025 Actual)", 
                        "value": "12.45 MT", 
                        "note": "June-Dec 2025 vs 10.39 Est. Source: AR Pg. 65" 
                    },
                    "cost": { 
                        "title": "Manuring Progress", 
                        "value": "32%", 
                        "note": "2025 Revised Program. Source: AR Pg. 15" 
                    },
                     "pests": {
                        "title": "Key Pests & Diseases",
                        "value": "Rat & Oryctes",
                        "note": "High Rat risk; Oryctes in PR24. Source: AR Pg. 5, 44"
                    },
                    "weeding": { 
                        "title": "Weeding Status", 
                        "value": "Improving", 
                        "note": "Interrow satisfactory; Circles inconsistent. Source: AR Pg. 36-40" 
                    }
                },
                "keyMetrics": [
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21v-2a4 4 0 00-4-4H9.88a4 4 0 00-3.78 2.41m-1.12-2.41a4 4 0 00-4 4v2m16-10a4 4 0 01-4 4H7a4 4 0 01-4-4' /></svg>`, 
                        "label": "Harvester Ratio", 
                        "value": "1:17 ha (Target Met)" 
                    },
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>`, 
                        "label": "P&D Status", 
                        "value": "Rat & Oryctes Risk" 
                    },
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>`, 
                        "label": "2026 Yield Target", 
                        "value": ">20 MT/ha" 
                    },
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 17h8m0 0V9m0 8l-8-8-4 4-6-6' /></svg>`, 
                        "label": "Harvester Prod.", 
                        "value": "<2.0 MT/md (Suboptimal)" 
                    },
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>`, 
                        "label": "Harvest Interval", 
                        "value": "16-25 days (Extended)" 
                    },
                    { 
                        "icon": `<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 11c0 3.517-1.009 6.789-2.756 9.354-1.748-2.565-2.756-5.837-2.756-9.354C6.488 7.483 8.991 5 12 5s5.512 2.483 5.512 6.146c0 3.517-1.009 6.789-2.756 9.354C13.009 17.789 12 14.517 12 11z' /></svg>`, 
                        "label": "Pruning Status", 
                        "value": "22% Progress (Slow)" 
                    }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [2032, 2079, 2023, 2275, 1862, 1881],
                        "rainfall": [74, 183, 193, 160, 342, 272],
                        "note": "*Monthly production peaking in Oct 2025. Source: AR Pg. 21, 69."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Yrs (Immature)", "4-7 Yrs", "8-19 Yrs (Prime)", "20-25 Yrs", ">26 Yrs (Old)"],
                        "data": [16, 16, 17, 21, 30],
                        "title": "Sg Pertang Palm Age Distribution (2026)",
                        "note": "*51% of palms are over 20 years old. Source: AR Pg. 10."
                    }
                },
                "observations": [
                    "<b>Extended Harvesting Intervals:</b> Intervals remain extended at 16-25 days, particularly in old plantings, causing over-ripe bunches and loose fruit loss. Crop recovery in ravines is incomplete. <span class='observation-ref'>(AR Pg. 4, 22)</span>",
                    "<b>Pruning Backlog:</b> Only 22% of fields were pruned in 2025. Severe under-pruning in older plantings (P99, P00, P01, P02) obstructs harvesting and reduces efficiency. <span class='observation-ref'>(AR Pg. 5, 27-28)</span>",
                    "<b>Significant Manuring Deviation:</b> Only 32% of the 2025 revised manuring program was completed. Fertilizer unavailability (Urea, MOP, Kieserite) caused major delays. <span class='observation-ref'>(AR Pg. 15-17)</span>",
                    "<b>Immature Area Constraints:</b> PR24 shows severe Oryctes infestation and suboptimal vigor due to manuring delays. PR23 scout harvesting quality is low with loose fruit left behind. <span class='observation-ref'>(AR Pg. 6, 52, 60)</span>",
                    "<b>VOP & Weeding Issues:</b> While interrow conditions improved, palm circles in older plantings are dominated by Volunteer Oil Palm (VOP) seedlings and require urgent attention. <span class='observation-ref'>(AR Pg. 40-41)</span>",
                    "<b>Pest Management:</b> Rat infestation requires close monitoring as post-baiting damage remains spotted. Barn owl box installation is recommended at 1 box per 10 ha. <span class='observation-ref'>(AR Pg. 5, 44-45)</span>"
                ],
                "reports": {
                    "agronomy": { 
                        "Executive Summary": "The estate's palm age profile is less than ideal, with 51% of palms aged over 20 years. Yield performance in 2025 (12.45 mt/ha) was slightly above expectations but below full potential due to significant yield-limiting factors. Critical issues include extended harvesting intervals (up to 25 days), a severe pruning backlog (only 22% completed), and a major manuring shortfall (32% application rate). Drone-based census is underway to correct outdated palm density data. <span class='observation-ref'>(AR Pg. 4-7, 10-14)</span>",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 manuring program was severely disrupted. No progress was reported in the first half of 2025 except for Borate. Total application reached only 32% (191 MT of 597 MT required). Fertilizer unavailability forced the replacement of Urea with Ammonium Sulphate (SOA) at 1.5 kg/palm. NK Mixture was applied to P15-P21 in Sept. Critical delays in Rock Phosphate and Kieserite persist. Manuring in PR23 and PR24 is long overdue, risking permanent vegetative setbacks. Workers' productivity for SOA application in P05 was low (20 bags/day), using inconsistent container sizes. <span class='observation-ref'>(AR Pg. 14-20)</span>",
                        "Agronomic Observation": "<b>Harvesting:</b> Consistently extended intervals (16-25 days) resulted in excessive loose fruits and over-ripe bunches on platforms. In P04, bunches were missed in ravines, leading to rot. <br><b>Pruning:</b> Slow progress at 22%. Under-pruned conditions in old plantings (P99-P02) show excessive dry hanging fronds. P15/P16 progressive pruning is acceptable. <br><b>Palm Appearance:</b> Magnesium deficiency (yellowing older fronds) noted in P09, P15, P16. Poor vigor persists in P98/P99. <br><b>Weeding:</b> Inter-row broadleaf control is effective, but circle weeding is inconsistent. 'Strip spraying' and small radii (<6ft) observed in P98. VOP seedlings are significant in circles of P99-P02. <br><b>P&D:</b> Rat damage detected in P98. Oryctes infestation continues in PR24. <span class='observation-ref'>(AR Pg. 21-45)</span>",
                        "Yield Performance": "Total production for July-Dec 2025 was 12,818 MT. Average yield of 12.45 MT/ha is 20% higher than projection. Prime plantings (P15, P16) achieved >16 MT/ha. Old plantings (P98-P00) are yielding below average due to height, ravine accessibility, and pruning status. P19A yields only 8 MT/ha due to large unplantable areas and hilly terrain. <span class='observation-ref'>(AR Pg. 65-68)</span>",
                        "Fertilizer Recommendation": "The 2026 program remains as drafted but requires computation based on the new drone census. Appendix I details: <br> - <b>P98-P99:</b> NK1 (2.0kg) in Jan & July. <br> - <b>P01-P04:</b> Mix A (2.0kg) in Feb, May, Aug, Nov. <br> - <b>P15-P16:</b> Mix B (2.25kg) in Jan, April, July, Oct plus RP in June. <br> - <b>PR24:</b> Compound (1.2-1.5kg) in Jan, April, July, Oct. <span class='observation-ref'>(AR Pg. 71-73)</span>"
                    },
                    "plantation": { 
                        "Executive Summary": "Visit on 9th Oct 2025. FFB production (Jun-Sep) was 6,798.84 MT, 7% above estimate. However, crop losses noted from tall palms and poor loose fruit recovery. Labour is short by 21 workers. Key priorities are improving harvesting standards and accelerating pruning in old mature fields. <span class='observation-ref'>(PA Pg. 35-39)</span>",
                        "Area Statement": "Total oil palm area is 1,228.00 ha (Mature: 1,030.00 ha, Immature: 100.00 ha, Replanting: 98.00 ha). Over 50% of palms are old mature (>19 years). <span class='observation-ref'>(PA Pg. 5-6)</span>",
                        "Labour Statement": "Total 69 workers (21 estate, 48 contractor) against a requirement of 90. Harvester to land ratio is 1:24 ha. <span class='observation-ref'>(PA Pg. 9)</span>",
                        "Upkeep and Cultivation": "Weeding: Interrow spraying satisfactory; circle spraying delayed. Manuring: NK Mix application in progress in Oct. P&D: No significant issues; no barn owl boxes installed. Pruning: Progress slow in old fields. <span class='observation-ref'>(PA Pg. 11-22)</span>",
                        "Harvesting and Collection": "Average 1.74 rounds in Sept, with intervals of 11-18 days. Standards need urgent improvement, especially for tall palms and loose fruit collection. <span class='observation-ref'>(PA Pg. 23-27)</span>",
                        "Crop Production": "FFB from 21 Jun - 30 Sep 2025 was 6,798.84 mt (6.60 mt/ha), which was 6.93% above the estimate of 6,358.00 mt. <span class='observation-ref'>(PA Pg. 28)</span>",
                        "Immature": "PR 2023 (100 ha): Palm growth not uniform. PR 2024 (98 ha): Growth acceptable but Rhinoceros beetle needs attention. <span class='observation-ref'>(PA Pg. 31-34)</span>"
                    },
                    "pinfosys": {
                        "CEO Financial Summary": "N/A", "Summary of Oil Palm Expenditure": "N/A"
                    }
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Pruning Regime</p><p class='text-sm text-gray-600'><b>Policy Ref: AR-PRUN-01:</b> For palms <15 yrs, retain min 2 fronds below lowest bunch. For >15 yrs, retain min 1 frond. <span class='observation-ref'>(AR Pg. 30)</span></p></div><div class='policy-item'><p class='font-semibold'>Pest Thresholds</p><p class='text-sm text-gray-600'><b>Policy Ref: AR-PEST-02:</b> Rat threshold at 10% census damage. Bagworm threshold at 10 larvae/frond. <span class='observation-ref'>(AR Pg. 44)</span></p></div><div class='policy-item'><p class='font-semibold'>Fertilizer Application</p><p class='text-sm text-gray-600'><b>Policy Ref: AR-FERT-03:</b> Use standardized pre-measured containers to ensure even dosage and prevent nutrient stress. <span class='observation-ref'>(AR Pg. 19)</span></p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.entries(estate.summaryMetrics).map(([key, metric]) => {
                    const colorClass = key === 'area' ? 'bg-blue-50 text-blue-800' :
                                       key === 'yield' ? 'bg-green-50 text-green-800' :
                                       key === 'cost' ? 'bg-orange-50 text-orange-800' :
                                       key === 'pests' ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    
                    let contentHTML = metric.lines ? metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('') : `<p class="text-2xl font-bold">${metric.value}</p>`;

                    return `<div class="p-4 rounded-lg ${colorClass}">
                                <h3 class="font-semibold">${metric.title}</h3>
                                ${contentHTML}
                                <p class="text-xs text-gray-500 mt-1">${metric.note || ''}</p>
                            </div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues (Blended)</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details (Visit: Jan 2026)</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details (Visit: Oct 2025)</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (plantationDiv) {
                     plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (pinfosysDiv) {
                     pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">N/A</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: Ladang Sungai Pertang`;
            modalContent.innerHTML = estateData.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
