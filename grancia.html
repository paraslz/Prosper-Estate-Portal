<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Grancia - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Grancia Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "grancia",
                "name": "Ladang Grancia",
                "reportInfo": "Data based on PA Report (February 2026) & Agronomy Report (September 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 205.00 ha",
                            "Mature: 146.00 ha",
                            "Immature: 59.00 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (2025 vs Budget)",
                        "value": "29.99 / 30.00 MT",
                        "note": "Achieved 99.9% of Budget (Source: PAR Pg. 25)"
                    },
                    "cost": {
                        "title": "Harvesting Cost/MT",
                        "value": "RM 30-50",
                        "note": "Varies by planting year (Source: PAR Pg. 26)"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Widespread in P99",
                        "note": "Deboling in progress (Source: PAR Pg. 20)"
                    },
                    "pests": {
                        "title": "Key Pests",
                        "value": "Oryctes & Rats",
                        "note": "Oryctes reducing; Rat damage <10%"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:10 ha (Acceptable)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Moderate (Ganoderma focus)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Harvest Interval", "value": "13-17 Days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "2.2-2.3 MT/md (Target: 3.0)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Weeding Status", "value": "100% Mature / 83% Imm." },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring Status", "value": "100% (22 Rounds Complete)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [280, 260, 270, 310, 380, 350, 500, 460, 400, 410, 430, 440],
                        "rainfall": [113, 81, 71, 325, 110, 221, 135, 57, 186, 210, 250, 300],
                        "note": "*FFB Production (MT) & Rainfall (mm) data for 2025. (Source: AR Pg. 34, 40)"
                    },
                    "ageProfile": {
                        "labels": ["Immature (PN24)", "P2018 (Young)", "P2016 (Prime)", "P2013 (Prime)", "P1999 (Old)"],
                        "data": [28.8, 24.9, 29.6, 10.4, 6.3],
                        "title": "Ladang Grancia - Palm Age Distribution (205 ha)",
                        "note": "*Source: PAR Pg. 9."
                    }
                },
                "observations": [
                    "<b>Ganoderma Infection & Spread:</b> Infections are widespread in P99 with many fallen palms. Fruiting bodies are also identified in P13 and P16. A systematic census is required to determine the exact extent. <span class='observation-ref'>(PAR Pg. 20-21)</span>",
                    "<b>Immature Area Fire Damage:</b> A fire from neighboring smallholdings scorched ~6 ha of PR24 in Feb 2026. While spears are intact, manual watering and close monitoring are essential for recovery. <span class='observation-ref'>(PAR Pg. 30-31)</span>",
                    "<b>Oryctes control in PR24:</b> Oryctes infestation levels have reduced following 13 rounds of Cypermethrin spraying, but vigilance must remain high as palms recover. <span class='observation-ref'>(PAR Pg. 29)</span>",
                    "<b>Harvester Productivity Target:</b> Current productivity is satisfactory (~2.2 MT/md) but the estate is urged to push for 3.0 MT/md in P13 and P16 given the high yield and mechanized collection. <span class='observation-ref'>(PAR Pg. 6, 26)</span>",
                    "<b>Manuring Efficiency:</b> 2025 program was 100% complete (22 rounds), but worker productivity (20 bags/md) was below the target of 25 bags/md. Earnings remained low at RM 44/day. <span class='observation-ref'>(PAR Pg. 16-17)</span>",
                    "<b>Unresolved Cattle Intrusion:</b> Cattle intrusion remains an ongoing issue in P18, resulting in palm damage that requires stricter field supervision. <span class='observation-ref'>(AR Pg. 23-24)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate is generally well managed. Workforce is adequate (15/16) with a ratio of 1:10 ha. Yield reached 29.99 MT/ha in 2025, just 0.1% below budget. Focus is now on increasing harvester productivity and monitoring Ganoderma spread. (Source: PAR Pg. 7, 10, 25, 32)",
                        "Area Statement": "Total planted area: 205.00 ha. Consists of 146 ha Mature (P99, P13, P16, P18) and 59 ha Immature (PN24). No change in the statement. (Source: PAR Pg. 9)",
                        "Labour Statement": "Actual workforce is 15 against a requirement of 16. Shortage of 1 manurer is covered by deployment from Sg. Beranang Estate. Harvester ratio is 1:18 ha. (Source: PAR Pg. 10)",
                        "Staff Establishment": "Satisfactory. 2 Executives (Sr. Assistant and Assistant Manager). Assistant also manages rubber at Sg. Beranang. (Source: PAR Pg. 11)",
                        "General Charges": "N/A",
                        "Upkeep & Cultivation": "Circle and Selective spraying 100% complete for mature area. Manuring: 22 rounds (100%) completed till Dec 2025. Progressive pruning complete (100%) with satisfactory palm appearance. (Source: PAR Pg. 12, 16, 23)",
                        "Harvesting and Collection": "Intervals averaged 13 days with 24.5 rounds achieved. Productivity ranges 1.42 - 2.32 MT/md. In-field collection uses 2 Badang units. (Source: PAR Pg. 25-26)",
                        "Crop Production": "Total yield 29.99 T/Ha (Budget: 30.00). Bunch weights increased across all plantings (e.g., P99 at 28.1 kg). Fruit set in P18/D is good. (Source: PAR Pg. 25, 27)",
                        "Production Cost": "N/A",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "Routine road patching done by backhoe; 550 chains of grading budgeted but not executed due to satisfactory conditions. No drainage works required. (Source: PAR Pg. 22-23)",
                        "Immature": "PR24 (59 ha) Weeding 83% complete. 13 rounds of Oryctes control. Fire affected 6 ha; recovery implementation is critical. Supplying of 200 palms done. (Source: PAR Pg. 28-30)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield performance shows consistent growth. Manuring progress improved to 93% by Aug 2025, though application quality (narrow banding) in P13 requires correction. Ganoderma and cattle intrusion remain primary threats. (Source: AR Pg. 4-5, 8)",
                        "Nutrient Inputs/Progress of Manuring": "93% complete by Aug. Mixture B and Compound fertilizer used. Quality issues noted in P13 (narrow bands) which limits nutrient uptake. (Source: AR Pg. 8-10)",
                        "Agronomic Observation": "Mature area appearance acceptable; localized orange fronds (Mg deficiency) in P13/P16. Pruning in P99 noted as unsatisfactory (under-pruned). Immature palm size is variable due to prior Oryctes attacks. (Source: AR Pg. 11-31)",
                        "Yield Performance": "YTD Sept '25 yield 21.74 MT/ha (1% above 2024 YTD). P99 remains high; P13 saw 5% decline but expected to hit >30 MT/ha for the year. (Source: AR Pg. 32-34)",
                        "Fertilizer Recommendation": "2026 program suggests Mixture B for mature and Compound for PR24. Kieserite and Rock Phosphate recommended for P13, P16, and P18 to address deficiencies. (Source: AR Pg. 35-37)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Ganoderma Management</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-03:</b> Upon identification of infection, a full census must be initiated within 60 days. Deboling of all fallen palms is mandatory to prevent spread.</p></div> <div class='policy-item'><p class='font-semibold'>Worker Productivity & Wages</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-WAGE-07:</b> If average task earnings fall below RM 65.38 (basic wage), management must conduct a piece-rate or task review to ensure fair compensation.</p></div> <div class='policy-item'><p class='font-semibold'>Oryctes Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Oryc-02:</b> Chemical spraying frequency (e.g., Cypermethrin) must be maintained until infestation levels drop below threshold levels.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');
            let chartInstances = {};

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeCharts();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.entries(estate.summaryMetrics).map(([key, metric]) => {
                    const colorClasses = { area: 'bg-blue-50 text-blue-800', yield: 'bg-green-50 text-green-800', cost: 'bg-orange-50 text-orange-800', ganoderma: 'bg-red-50 text-red-800', pests: 'bg-yellow-50 text-yellow-800' };
                    const colorClass = colorClasses[key] || 'bg-gray-50';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">
                                ${estate.keyMetrics.map(m => `<div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg"><div class="bg-gray-100 p-2 rounded-full">${m.icon}</div><div><p class="text-sm text-gray-500">${m.label}</p><p class="font-bold text-lg">${m.value}</p></div></div>`).join('')}
                            </div>
                        </div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('')}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="plantation-details" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="plantation-details" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="agronomy-details" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="agronomy-details" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeCharts() {
                const prodCtx = document.getElementById('prodChart').getContext('2d');
                chartInstances.prod = new Chart(prodCtx, {
                    type: 'bar',
                    data: {
                        labels: estateData.chartData.production.labels,
                        datasets: [
                            { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                            { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { 'y-ffb': { position: 'left' }, 'y-rainfall': { position: 'right', grid: { drawOnChartArea: false } } } }
                });

                const ageCtx = document.getElementById('ageChart').getContext('2d');
                chartInstances.age = new Chart(ageCtx, {
                    type: 'pie',
                    data: {
                        labels: estateData.chartData.ageProfile.labels,
                        datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'] }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                });
            }

            function populateInternalDropdowns() {
                const pDetails = document.getElementById('plantation-details');
                pDetails.innerHTML = Object.entries(estateData.reports.plantation).map(([title, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-l-4 border-green-800 pl-2 mb-1">${title.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600 whitespace-pre-line">${content}</p></div>`).join('');
                
                const aDetails = document.getElementById('agronomy-details');
                aDetails.innerHTML = Object.entries(estateData.reports.agronomy).map(([title, content]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-l-4 border-blue-800 pl-2 mb-1">${title.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600 whitespace-pre-line">${content}</p></div>`).join('');
            }

            function attachEventListeners() {
                document.querySelectorAll('.dropdown-btn').forEach(btn => btn.onclick = (e) => {
                    const content = document.getElementById(e.target.dataset.dropdownId);
                    content.classList.toggle('active');
                    e.target.classList.toggle('active');
                });
                document.querySelector('.policy-modal-btn').onclick = openPolicyModal;
            }

            renderEstate();
        });

        function openPolicyModal() {
            document.getElementById('modalContent').innerHTML = `
                <div class="policy-item"><p class="font-semibold">Ganoderma Management</p><p class="text-sm text-gray-600"><b>Policy Ref: P&D-Gano-03:</b> Census must be initiated within 60 days of identifying spread. Deboling of fallen palms is critical.</p></div>
                <div class="policy-item"><p class="font-semibold">Oryctes control</p><p class="text-sm text-gray-600"><b>Policy Ref: P&D-Oryc-02:</b> Increase spraying frequency for immature areas with active infestations until threshold levels drop.</p></div>
            `;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
