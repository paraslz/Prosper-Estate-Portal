<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Tagar 1 - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Tagar 1 Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "tagar1",
                "name": "Ladang Tagar 1",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 21 Jan 2026) & Agronomy Report 1/2026 (Visit: 28 Jan 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,846 ha",
                            "Mature: 1,378 ha",
                            "Immature: 468 ha",
                            "Replanting: 108 ha (PR25M)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "13.45 / 16.20 MT",
                        "note": "Full Year 2025 (PA Report 1/2026)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 365.40 / RM 336.00",
                        "note": "Full Year 2025 (PA Report 1/2026)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "High Turnover",
                        "note": "Persistent shortages impacting crop recovery (AR Pg 23)"
                    },
                     "pests": {
                        "title": "Pest & Disease",
                        "value": "Ganoderma Risk",
                        "note": "De-boling required; Rats monitoring P16-P21 (AR Pg 39, 48)"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "Critical Shortage" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Moderate (Rats/Gano)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (YTD)", "value": "18.66% (Ref AR)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "<2.0 MT/md (Unsatisfactory)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": ">20 days (Ref AR Pg 23)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Suboptimal Mg Levels" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [1420, 1410, 1380, 1290, 1480, 1590, 1710, 1700, 1650, 1580, 1350, 1150], 
                        "rainfall": [356, 263, 277, 486, 240, 135, 115, 251, 180, 210, 290, 150], 
                        "note": "*FFB production and rainfall data Full Year 2025."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Yrs (Immature)", "4-7 Yrs (Young Mature)", "8-19 Yrs (Prime)", ">20 Yrs (Old)"],
                        "data": [15, 45, 20, 20], 
                        "title": "Tagar 1 - Palm Age Distribution (2026)",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 11."
                    }
                },
                "observations": [
                    "<b>Suboptimal Crop Recovery:</b> Harvesting intervals exceeded 20 days in older plantings (P04, P05, P07). Over-ripe bunches and loose fruits left behind signify direct crop loss. <span class='observation-ref'>(AR 1/2026 Pg. 18, 23)</span>",
                    "<b>Critical Pruning Backlog:</b> Pruning was only 50% complete by Dec 2025. Excessive dry hanging fronds restrict access to bunches, particularly in ravines, contributing to lower harvester productivity. <span class='observation-ref'>(AR 1/2026 Pg. 27-30)</span>",
                    "<b>Manuring Deviations:</b> Significant delays (2-3 months) in the 2025 program (NK1, Mixture A/B) due to weather and labour. 500MT (~22%) of fertilizers must be carried forward to Q1 2026. <span class='observation-ref'>(AR 1/2026 Pg. 13-15)</span>",
                    "<b>High Worker Turnover:</b> Estate struggles with critical labour shortages. Management must reassess root causes to avoid further deterioration of field maintenance in immature areas. <span class='observation-ref'>(PA Report 1/2026 Pg. 61)</span>",
                    "<b>Rat Infestation & P&D:</b> Rat damage census in P17, P19, P20 is required; baiting if damage >10%. Ganoderma de-boling is pending implementation. <span class='observation-ref'>(AR 1/2026 Pg. 38-39; PA Pg 61)</span>",
                    "<b>Immature Area Upkeep:</b> Weeding and inter-row maintenance in P22/K and P23/L are unsatisfactory. Filling of 900 vacant points in PR25 must be expedited. <span class='observation-ref'>(AR 1/2026 Pg. 12, 52; PA Pg 62)</span>"
                ],
                "reports": {
                     "agronomy": {
                        "Executive Summary": "Yield performance in 2025 was unsatisfactory, recording a 9% deficit compared to 2024. The primary agronomical constraints identified include incomplete crop recovery (intervals exceeding 20 days), significant deviations from the 2025 manuring program, and a critical backlog in canopy management/pruning. (Source: AR 1/2026, Pg. 4, 7)",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 program achieved only 82% completion. Key misses include NK1 (P01A), Mixture A (P04B, P05C, P11E, P16F), and Mixture B (P19H, P20I, P21J) which were scheduled for Oct/Nov. Consequently, 500MT (~22% of requirement) is carried forward to 2026. Semi-mechanized application in P01 was assessed as satisfactory, showing reduced 'narrowband' application compared to previous visits. (Source: AR 1/2026, Pg. 13-16)",
                        "Agronomic Observation": "Crop recovery remains poor with intervals over 20 days in older plantings. Incomplete harvesting was particularly evident in ravines where palms were obstructed by excessive dry fronds. Harvester productivity averaged a low 1.71 MT/md. Chlorotic palms in P05 ravines suggest these palms are receiving insufficient nutrient inputs. Mg deficiency (orange fronds) persists in P16/P17 due to low soil CEC. Pruning is only 50% complete against budget. (Source: AR 1/2026, Pg. 18-39)",
                        "Yield Performance": "Yield performance was unsatisfactory as yield-limiting factors persist. P04B (-16.3%) and P05C (-26.6%) showed the most significant declines. P05C's record of 10.69 MT/ha is considered exceptionally low. While young mature areas (P19-P21) showed age-related increases, their potential was compromised by inadequate field maintenance and harvesting delays. (Source: AR 1/2026, Pg. 61-63)",
                        "Fertilizer Recommendation": "The 2026 program is revised to include 2025 carry-over stocks as priority for Q1. GML is recommended for soil pH management. PR25 (replant) requires specific hole-fertilizer doses: 600g CRF and 500g RP per hole. Additional Kieserite rounds are prescribed annually for P16, P17, P19, and P20 to address leaf Mg deficiency. (Source: AR 1/2026, Pg. 15, 66-68)"
                    },
                    "plantation": {
                        "Executive Summary": "Estate performance impacted by high worker turnover. Immediate recruitment of harvesters and sprayers is critical to prevent crop loss. Full year 2025 yield was 13.45 MT/ha vs budget of 16.20 MT/ha. (Source: PA Report 1/2026, Pg. 61-62)",
                        "Area Statement": "Total planted area 1,846 ha. Comprises 1,226 ha Mature, 464 ha Immature, and 108 ha Replanting. Older plantings (>25 yrs) were phased out by 2024. (Source: PA Report 1/2026, Pg. 10; AR Pg 10)",
                        "Labour Statement": "Unsatisfactory situation with shortages in harvesters and sprayers. Management urged to reassess root causes of high turnover. (Source: PA Report 1/2026, Pg. 11, 61)",
                        "Staff Establishment": "Satisfactory. Managed by Senior Manager Mr. Paramaswarn A/L Thangavilu and Senior Assistant Mr. Lam Thou Chin. (Source: PA Report 1/2026, Pg. 2, 13)",
                        "General Charges": "Reviewed; management must ensure expenditure remains within budget. (Source: PA Report 1/2026, Pg. 14)",
                        "Upkeep and Cultivation": "Inter-row weeding in immature areas unsatisfactory due to labour shortage. Road maintenance needs acceleration (only 33% of grading budget achieved). (Source: PA Report 1/2026, Pg. 16, 62; AR Pg 24)",
                        "Harvesting and Collection": "Productivity is a key concern. Increasing earnings through higher productivity is suggested to curb turnover. (Source: PA Report 1/2026, Pg. 39, 61)",
                        "Crop Production": "Full year 2025 yield 13.45 MT/ha (below 16.20 MT budget). Shortfall due to labour and harvesting inefficiencies. (Source: PA Report 1/2026, Pg. 42)",
                        "Production Cost": "RM 365.40/MT (Actual) vs RM 336.00/MT (Budget). (Source: PA Report 1/2026, Pg. 45)",
                        "Vehicles Running Cost": "Efficiency in transport logistics must be maintained. (Source: PA Report 1/2026, Pg. 46)",
                        "Capital Expenditure": "Major CAPEX projects accounted for within budget. (Source: PA Report 1/2026, Pg. 47)",
                        "Immature": "Maintenance of P22/K, P23/L compromised. Minimal Oryctes infestation noted. PR25 requires 900 points filling. (Source: PA Report 1/2026, Pg. 48, 62; AR Pg 12)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": `
                <div class='policy-item'>
                    <p class='font-semibold'>Harvesting & Crop Recovery</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must not exceed 10-12 days to ensure maximum OER and minimum loose fruit loss.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Ganoderma Management</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: PD-GANO-02:</b> Deboling of infected palms (1.5m x 1.5m x 1.5m) is mandatory for field sanitation to prevent spread.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Manuring Quality</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-03:</b> Avoid "narrowband" application. Fertilizer must be broadcasted evenly within palm circles or inter-rows as prescribed.</p>
                </div>`
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-red-50 text-red-800' :
                                       metric.title.includes('Labour') ? 'bg-orange-50 text-orange-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                             <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#a7f3d0', '#34d399', '#059669', '#065f46'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (pinfosysDiv) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: Ladang Tagar 1`;
            modalContent.innerHTML = estateData.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
