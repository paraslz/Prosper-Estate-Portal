<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sri Sisek - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } 
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sri Sisek Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "srisek",
                "name": "Ladang Sri Sisek",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: 25th March 2026) and PA Report 2/2025 (Visit: 18th September 2025).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": [
                            "Total Planted: 319.69 ha", 
                            "Mature: 263.97 ha", 
                            "Immature: 55.72 ha"
                        ]
                    },
                    "yield": { 
                        "title": "Yield/Ha (Actual vs Prev)", 
                        "value": "22.32 / 25.48 MT", 
                        "note": "Full Year 2025 vs 2024" 
                    },
                    "cost": { 
                        "title": "FFB Cost/Tonne", 
                        "value": "N/A", 
                        "note": "Financial data not provided" 
                    },
                    "weeding": { 
                        "title": "Weeding Progress", 
                        "value": "Satisfactory", 
                        "note": "Inter-row 1st round complete" 
                    },
                    "manuring": { 
                        "title": "Manuring Progress", 
                        "value": "20% (2026)", 
                        "note": "2025 Program 99% Complete" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Ratio", "value": "1:32 ha" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Rat Infestation (P18G)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER %", "value": "N/A" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "2.07-2.22 MT/md" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "12-17 Days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "K Deficiency (P09)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [350.85, 341.28, 395.90, 528.08, 538.64, 637.40, 638.29, 516.29, 481.00, 592.12, 532.78, 472.68],
                        "rainfall": [177, 77, 155, 146, 231, 94, 19, 51, 50, 472, 404, 506],
                        "note": "*FFB production and rainfall data for Full Year 2025. (Source: Agronomy Report 1/2026, Appendix 2 & 3)"
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (14%)", "4-7 Years (11%)", "8-19 Years (61%)", "20-25 Years (9%)", ">26 Years (6%)"],
                        "data": [14, 11, 61, 9, 6],
                        "title": "Sri Sisek Palm Age Distribution (Mar 2026)",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 10."
                    }
                },
                "observations": [
                    "<b>Yield Performance Deficit:</b> The main crop division recorded a 12.4% yield deficit in 2025 (22.32 MT/ha) compared to 2024. Sub-block D3 (P98) saw an abnormal 51% decline, warranting further investigation. <span class='observation-ref'>(AR Pg. 48)</span>",
                    "<b>Rat & Pest Pressure:</b> A rat damage census in Jan 2026 recorded an alarming 31.92% infestation level in sub-block P18G. Baiting with Strom has reduced the pressure, but vigilance is required. <span class='observation-ref'>(AR Pg. 31, 41)</span>",
                    "<b>Nutrient Status & K Deficiency:</b> Mild Potassium (K) deficiency (confluent orange spotting) was detected in localised areas of P09A and P09B. Timely fertiliser application is critical to prevent yield decline. <span class='observation-ref'>(AR Pg. 18, 29)</span>",
                    "<b>Manuring Program Status:</b> The 2025 manuring program was 99% completed. The 2026 program has commenced (20% done) but faces supply delays for Compound and NK1 fertilisers. <span class='observation-ref'>(AR Pg. 13-14)</span>",
                    "<b>Ganoderma Infection:</b> Incurable Ganoderma remains a concern, causing loss of productive stands. Mounding and deboling (1.5m pits) are ongoing preventive measures. <span class='observation-ref'>(AR Pg. 26, 38)</span>",
                    "<b>Harvesting Standards:</b> Intervals ranged from 12-17 days, slightly exceeding the 15-day target. Management is advised to tighten intervals now that the harvester workforce is at the required strength (10 pax). <span class='observation-ref'>(AR Pg. 16-17)</span>"
                ],
                "reports": {
                    "agronomy": { 
                        "Executive Summary": "Yield for the main crop division recorded a 12.4% deficit in 2025. Harvesting operations are generally well-managed with minimal crop losses, though workforce constraints led to intervals slightly exceeding the 15-day target (actual 12-17 days). Pruning practices are effective. Potassium (K) deficiency remains a concern in mature blocks. 2025 manuring is completed, while 2026 faces supply delays. Rat infestation in P18G is severe at 31.9%. (Source: AR 1/2026, Pg. 4-7, 16)",
                        "Nutrient Inputs/Progress of Manuring": "<b>2025 Program:</b> Successfully completed for all fertilizers (99% overall). Mixture B achieved 98% (354.95/361.70 tonnes) as application was stopped in Aug due to cocoa replanting. RP and Compound achieved 100%. (Pg. 13). <b>2026 Program:</b> Commenced with Mixture B (26% complete). Delivery of Compound and NK1 fertilizers is delayed due to small required quantities (Pg. 14). <b>Bio-waste:</b> EFB application carried out systematically at 35 mt/ha, which is below the 50 mt/ha target rate (Pg. 15).",
                        "Agronomic Observation": "<b>Mature Palms:</b> Localised K deficiency (orange spotting) detected in P09A/B. Leaf nutrient status will be reassessed in 2026 (Pg. 18). <b>Weeding:</b> Inter-row round 1 complete in all blocks except P05L. Circle weeding starting Feb 2026. Patches of small VOPs found in P98D1 (Pg. 21-22). <b>P&D:</b> Rat damage census in Jan recorded 31.92% infestation in P18G; baiting with Strom initiated (Pg. 31). Ganoderma mounding completed for 11,294 palms across P09A/B, P06C, and P11D2 (Pg. 27). <b>New Blocks:</b> P18G vigour improving. P22H/I first harvesting year started; ablation recommended for PR24M once 15 months old (Pg. 29, 32, 40). PR26Q newly planted with 513 palms earlier this year (Pg. 42).",
                        "Yield Performance": "<b>Main Crop:</b> 2025 yield was 22.32 mt/ha vs 25.48 mt/ha in 2024 (12.4% deficit). Field D3 (P98) saw a drastic 51% decline to 11.27 mt/ha, considered abnormal despite Ganoderma pressure (Pg. 48). <b>Small Crop:</b> Yield improved by 6.7% (23.81 mt/ha). P011 recorded a 29.6% deficit due to age and seasonal factors (Pg. 49). Average cumulative harvesting rounds in 2025 reached 79.95% of target (Pg. 50).",
                        "Fertilizer Recommendation": "Program revised for 2026 due to price increases. Recommendations include Mixture B (2.25-2.50 kg/palm) for mature areas and Compound 25 (1.0-1.5 kg/palm) for immature blocks. New blocks PR23L2 and PR26Q require 600g CRF and 500g RP in planting holes (Pg. 51-53)."
                    },
                    "plantation": { 
                        "Executive Summary": "The estate's performance is generally satisfactory, though harvesting and collection need significant improvement to maximize crop recovery. FFB production YTD (Aug 2025) is 25% below estimate. Indonesian gang area (149 ha) faces extended harvesting intervals up to 36 days. Ganoderma is spreading. (Source: PA 2/2025, Pg. 40-42)",
                        "Area Statement": "As of Oct 2025, total planted area is 315.69 ha (Mature: 263.97 ha, Immature: 51.72 ha). Updated area in Mar 2026 is 319.69 ha following PR26Q acquisition. (Source: PA Pg. 9-10; AR Pg. 9)",
                        "Labour Statement": "Requirement of 22 workers, with a current shortage of 9 (Ratio 1:25 ha). Harvester ratio is 1:30 ha. 10 new workers expected in Oct to prioritize harvesting. (Source: PA Pg. 15)",
                        "Staff Establishment": "Satisfactory. Mr Go Kian Horng appointed Assistant In-Charge on 3rd Sept 2025. (Source: PA Pg. 13)",
                        "General Charges": "N/A",
                        "Upkeep and Cultivation": "Circle spraying is only 34% complete (Delayed). Manuring 73% complete by Oct. Road maintenance on schedule. Pruning satisfactory. (Source: PA Pg. 17-28)",
                        "Harvesting and Collection": "Intervals ranged from 10 to 36 days, well above the 15-day target. Indonesia gang area (149 ha) is the primary concern for crop loss. (Source: PA Pg. 29-31)",
                        "Crop Production": "YTD Aug 2025 production is 3,855.80 MT (25% below budget). Potential to close at 24.00 MT/ha if harvesting improves. (Source: PA Pg. 32-33)",
                        "Production Cost": "N/A",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "PR22H maturing Jan 2026. Rhino beetle damage in PR24M. Wild boar damage in PR221. (Source: PA Pg. 34-39)"
                    },
                    "pinfosys": "Not Available"
                }
            };

            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-purple-50 text-purple-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCtx = document.getElementById('prodChart').getContext('2d');
                new Chart(prodCtx, {
                    type: 'bar',
                    data: {
                        labels: estateData.chartData.production.labels,
                        datasets: [
                            { label: 'FFB (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                            { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { 
                            'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'Production (MT)' } }, 
                            'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } 
                        } 
                    }
                });

                const ageCtx = document.getElementById('ageChart').getContext('2d');
                new Chart(ageCtx, {
                    type: 'pie',
                    data: {
                        labels: estateData.chartData.ageProfile.labels,
                        datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'] }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }
            
            function populateInternalDropdowns() {
                const formatContent = (data) => Object.entries(data).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                document.getElementById('agronomy').innerHTML = formatContent(estateData.reports.agronomy);
                document.getElementById('plantation').innerHTML = formatContent(estateData.reports.plantation);
                document.getElementById('pinfosys').innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const content = document.getElementById(e.currentTarget.dataset.dropdownId);
                        content.classList.toggle('active');
                        e.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });

        function openPolicyModal() {
            document.getElementById('modalContent').innerHTML = `<p>No specific policy cross-references available for latest visit observations.</p>`;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('modalContent').innerHTML = '';
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
