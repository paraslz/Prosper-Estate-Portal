<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sri Sisek - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sri Sisek Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "srisek",
                "name": "Ladang Sri Sisek",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 28th April 2026) & Agronomy Report 1/2026 (Visit: 25th March 2026).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 319.69 ha",
                            "Mature: 303.47 ha",
                            "Immature: 16.22 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "3.38 / 5.27 MT",
                        "note": "YTD Jan-Mar 2026"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne",
                        "value": "N/A",
                        "note": "Pinfosys System Pending Setup"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Spreading in Mature",
                        "note": "11,294 palms mounded to date"
                    },
                     "pests": {
                        "title": "Key Pests",
                        "value": "Rats (Baiting Ongoing)",
                        "note": "100% Barn Owl Occupancy"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:18 ha (Shortage)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Ganoderma & Local Rats" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER %", "value": "N/A" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "1.68 MT/md" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "13.5 days (Acceptable)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "K Deficiency (P09)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [350.85, 341.28, 395.90, 528.08, 538.64, 637.40, 638.29, 516.29, 481.00, 592.12, 532.78, 472.68],
                        "rainfall": [177, 77, 155, 146, 231, 94, 19, 51, 50, 472, 404, 506],
                        "note": "*Historical full year 2025 production and rainfall data for trend comparison. (Source: AR 1/2026)"
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature)", "4-7 Years (Young Mature)", "8-19 Years (Prime)", ">20 Years (Old)"],
                        "data": [5, 10, 68, 17], 
                        "title": "Ladang Sri Sisek - Palm Age Distribution (2026)",
                        "note": "*Source: PA Report 1/2026, Pg. 9-11."
                    }
                },
                "observations": [
                    "<b>Crop Production Deficit:</b> YTD (Jan-Mar 2026) FFB production is 1,026.18 MT, which is 36% below the budget. Average harvester productivity is currently low at 1.68 MT/manday, though it is expected to gradually improve. <span class='observation-ref'>(PA Report, Pg. 30-31)</span>",
                    "<b>Ganoderma Infection:</b> Incurable Ganoderma remains a significant concern and is actively spreading across mature (tall palm) areas. Extensive preventive measures are ongoing, with 11,294 palms mounded and 2,310 de-bolled to date. <span class='observation-ref'>(PA Report, Pg. 23; AR, Pg. 26)</span>",
                    "<b>Pest Pressures (Rats & Oryctes):</b> Rat baiting has been carried out over 96.36 ha (P18G, P22H) to counter local infestations. Barn owl nest occupancy is excellent at 100%. Regular pest census is needed for Oryctes in immature areas. <span class='observation-ref'>(PA Report, Pg. 22, 37; AR, Pg. 31)</span>",
                    "<b>Labour Shortage:</b> The current overall labour ratio is 1:18 ha and the harvester ratio is 1:30 ha. This is significantly below the recommended ratio of 1:15 ha and 1:24 ha respectively. The estate is advised to increase harvesters to 14. <span class='observation-ref'>(PA Report, Pg. 13-14)</span>",
                    "<b>Nutrient Status & Manuring:</b> Mild Potassium (K) deficiency (confluent orange spotting) was detected in localized mature areas. Meanwhile, the 2026 manuring program is largely on schedule (105.65 MT applied), though minor delays for compound fertilizer in P23N must be addressed. <span class='observation-ref'>(PA Report, Pg. 20; AR, Pg. 18)</span>",
                    "<b>Harvesting Standards & Intervals:</b> Harvesting intervals have improved to an average of 13.5 days (ranging from 10-16 days). To prevent partial harvesting and crop mix-ups, management is advised to ensure harvesting strictly follows a field-by-field sequence. <span class='observation-ref'>(PA Report, Pg. 29-30)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate hectarage expanded to 319.69 ha. The workforce increased to 18 workers, now fully on the estate payroll (contractors terminated). Weeding and manuring programs are generally on schedule. Ganoderma continues to spread in mature areas, requiring ongoing mounding. FFB production for Q1 2026 is 36% below budget, but harvesting intervals have improved to 13.5 days. (PA Report, Pg. 38-40)",
                        "Area Statement": "As of March 2026, the total planted area is 319.69 ha. This comprises:<br>&bull; <b>Mature:</b> 303.47 ha (94.9%).<br>&bull; <b>Immature:</b> 16.22 ha (5.1%).<br>&bull; <b>Increase:</b> Acquired 4.00 ha (PR26Q) of ex-rubber land for oil palm replanting in January 2026. (PA Report, Pg. 9-11)",
                        "Labour Statement": "Current workforce is 18 permanent workers vs requirement of 20 (Overall Ratio 1:18 ha).<br>&bull; <b>Harvesters:</b> 10 (Ratio 1:30 ha). Shortage identified; estate advised to increase to 14 harvesters (Ratio 1:24 ha).<br>&bull; <b>Contractors:</b> Terminated in April 2026; moving fully to checkroll workers. (PA Report, Pg. 13-14)",
                        "Staff Establishment": "The staff establishment is satisfactory with 9 personnel. This includes 1 Assistant In-Charge (Mr. Go Kian Horng), 1 Asst Manager, 3 Security Guards, 1 Clerk, 1 Driver, and 2 Field Conductors. (PA Report, Pg. 12)",
                        "General Charges": "N/A (Costing not covered as the estate is currently in the midst of establishing the Pinfosys system). (PA Report, Pg. 8)",
                        "Upkeep and Cultivation": "&bull; <b>Weeding:</b> Circle spraying (308.33 ha) and selective spraying (337.94 ha) completed on schedule. Circle raking is recommended for tall palms with cut fronds/debris.<br>&bull; <b>Manuring:</b> 105.65 MT applied on schedule (except compound for P23N). 121.51 MT EFB and 13.02 MT decanter cake systematically applied.<br>&bull; <b>Pest & Disease:</b> Rat baiting ongoing (96.36 ha). 100% occupancy for 11 Barn Owl nests. Ganoderma mounding done on 11,294 palms to prolong productivity.<br>&bull; <b>Roads:</b> 15 hours backhoe rental utilized; patching and scupper drains needed. (PA Report, Pg. 15-27)",
                        "Harvesting and Collection": "Harvesting intervals have improved compared to previous quarters.<br>&bull; <b>Interval:</b> Ranged from 10 to 16 days (Avg 13.5 days).<br>&bull; <b>Productivity:</b> 1.68 MT/manday (earning RM65.32/day), expected to improve in coming months.<br>&bull; <b>Workforce:</b> Operations carried out sequentially field-by-field by 5 Bangladeshi and 5 Indonesian harvesters using 2 units of mechanical buffalo (Toughfar). (PA Report, Pg. 28-30)",
                        "Crop Production": "YTD (Jan-Mar 2026) FFB Production is 1,026.18 MT, which is 36% below the budget of 1,599.85 MT.<br>&bull; <b>Yield/Ha:</b> 3.38 MT/ha (3 months).<br>&bull; <b>Comparison:</b> 10% lower than the same period last year. Fields P15E, P16F, and P18G show potential to remain high-yielding. (PA Report, Pg. 31-32)",
                        "Production Cost": "N/A (Financial costing data pending Pinfosys implementation). (PA Report, Pg. 8)",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "&bull; <b>PR23L2 (6.31 ha):</b> Scout harvesting started Jan 2026. Vigour improving, recovering from transplant shock.<br>&bull; <b>PR24M (5.91 ha):</b> 1st round ablation completed Mar 2026.<br>&bull; <b>PR26Q (4.00 ha):</b> Planted Feb 2026 (513 palms, 128/ha density). Growth uniform. Pest under control. (PA Report, Pg. 33-37)"
                    },
                    "agronomy": {
                        "Executive Summary": "Yield for the main crop division recorded a 12.4% deficit in 2025. Harvesting operations are generally well-managed with minimal crop losses, though workforce constraints led to intervals slightly exceeding the 15-day target (actual 12-17 days). Pruning practices are effective. Potassium (K) deficiency remains a concern in mature blocks. 2025 manuring is completed, while 2026 faces supply delays. Rat infestation in P18G is severe at 31.9%. (Source: AR 1/2026, Pg. 4-7, 16)",
                        "Nutrient Inputs/Progress of Manuring": "<b>2025 Program:</b> Successfully completed for all fertilizers (99% overall). Mixture B achieved 98% (354.95/361.70 tonnes) as application was stopped in Aug due to cocoa replanting. RP and Compound achieved 100%. (Pg. 13). <b>2026 Program:</b> Commenced with Mixture B (26% complete). Delivery of Compound and NK1 fertilizers is delayed due to small required quantities (Pg. 14). <b>Bio-waste:</b> EFB application carried out systematically at 35 mt/ha, which is below the 50 mt/ha target rate (Pg. 15).",
                        "Agronomic Observation": "<b>Mature Palms:</b> Localised K deficiency (orange spotting) detected in P09A/B. Leaf nutrient status will be reassessed in 2026 (Pg. 18). <b>Weeding:</b> Inter-row round 1 complete in all blocks except P05L. Circle weeding starting Feb 2026. Patches of small VOPs found in P98D1 (Pg. 21-22). <b>P&D:</b> Rat damage census in Jan recorded 31.92% infestation in P18G; baiting with Strom initiated (Pg. 31). Ganoderma mounding completed for 11,294 palms across P09A/B, P06C, and P11D2 (Pg. 27). <b>New Blocks:</b> P18G vigour improving. P22H/I first harvesting year started; ablation recommended for PR24M once 15 months old (Pg. 29, 32, 40). PR26Q newly planted with 513 palms earlier this year (Pg. 42).",
                        "Yield Performance": "<b>Main Crop:</b> 2025 yield was 22.32 mt/ha vs 25.48 mt/ha in 2024 (12.4% deficit). Field D3 (P98) saw a drastic 51% decline to 11.27 mt/ha, considered abnormal despite Ganoderma pressure (Pg. 48). <b>Small Crop:</b> Yield improved by 6.7% (23.81 mt/ha). P011 recorded a 29.6% deficit due to age and seasonal factors (Pg. 49). Average cumulative harvesting rounds in 2025 reached 79.95% of target (Pg. 50).",
                        "Fertilizer Recommendation": "Program revised for 2026 due to price increases. Recommendations include Mixture B (2.25-2.50 kg/palm) for mature areas and Compound 25 (1.0-1.5 kg/palm) for immature blocks. New blocks PR23L2 and PR26Q require 600g CRF and 500g RP in planting holes (Pg. 51-53)."
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>"
            };


            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mt-1 mb-2">${content}</p>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mt-1 mb-2">${content}</p>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Sri Sisek';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
