<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSK Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; } 
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; } 
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    PSK Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "psk",
                "name": "PSK Estate",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: 12th February 2026) and PA Report 2/2025 (Visit: 6th August 2025).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": ["Mature: 1,999.83 ha", "Immature: 0.00 ha", "Total: 1,999.83 ha"] 
                        // (AR 1/2026, Pg. 8)
                    },
                    "yield": { 
                        "title": "Yield/Ha (2025 Actual)", 
                        "value": "12.72 MT", 
                        "note": "Vs 12.89 MT in 2024 (-1%)" 
                        // (AR 1/2026, Pg. 31)
                    },
                    "cost": { 
                        "title": "FFB Cost/Tonne (PA YTD June 25)", 
                        "value": "RM 260.60", 
                        "note": "Budget: RM 340.06 (PA Pg. 47)" 
                    },
                    "weeding": { 
                        "title": "Weeding Progress (2025 Total)", 
                        "value": "Circle: 56%, Inter-row: 63%", 
                        "note": "Incomplete program (AR Pg. 24)" 
                    },
                    "manuring": { 
                        "title": "Manuring Progress (2025 Total)", 
                        "value": "74% (Mix B), 100% (RP)", 
                        "note": "Final round withdrawn (AR Pg. 11)" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Shortage", "value": "Short 48 Workers" }, // (AR 1/2026, Pg. 34)
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Rat Damage < 10%" }, // (AR 1/2026, Pg. 29)
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "ABW (2025)", "value": "19.30 kg (Low)" }, // (AR 1/2026, Pg. 32)
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Yield Target Met", "value": "77% of target rounds" }, // (AR 1/2026, Pg. 32)
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Max Harvest Int.", "value": "50 Days (Peat Areas)" }, // (AR 1/2026, Pg. 32)
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Palm Age Profile", "value": "99.8% Over 20 Years" } // (AR 1/2026, Pg. 10)
                ],
                "chartData": {
                    "production": { 
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"], 
                        "ffb": [1747, 1850, 1920, 2100, 2050, 1980, 2200, 2300, 2150, 2400, 2350, 2380], // Aggregated from AR Pg 40 data
                        "rainfall": [276.0, 120.5, 282.0, 324.0, 352.0, 155.0, 36.0, 248.0, 190.0, 259.0, 480.0, 915.0], // (AR 1/2026, Pg. 39)
                        "note": "*FFB data estimated from monthly totals. Rainfall data from AR 1/2026." 
                    },
                    "ageProfile": { 
                        "labels": ["8-19 Years", "20-25 Years"], 
                        "data": [2.43, 1997.40], 
                        "title": "PSK Estate Palm Age Profile (ha)", 
                        "note": "*99.8% of palms are 20-25 years old and in descending yield stage. (AR Pg 9-10)" 
                    }
                },
                "observations": [
                    "<b>Severe Manpower Shortage:</b> The estate faces a critical shortfall of 48 workers, primarily harvesters, which is the root cause of extended harvesting intervals and incomplete crop recovery. <span class='observation-ref'>(AR Pg. 31, 34)</span>",
                    "<b>Extended Harvesting & Crop Loss:</b> Harvesting intervals in peat areas (Blocks A, B, E) consistently exceeded standards, reaching up to 50 days in early 2026. This has resulted in a high incidence of overripe and rotten bunches. <span class='observation-ref'>(AR Pg. 14, 32)</span>",
                    "<b>Incomplete 2025 Manuring:</b> Only 74% of the Mix B program was completed in 2025. Delays (2+ months) were caused by flooding and lack of manpower, leading to the withdrawal of the final round and suboptimal nutrient status. <span class='observation-ref'>(AR Pg. 4, 11)</span>",
                    "<b>Poor Yield Performance:</b> 2025 yield was 12.72 MT/ha, a slight decline from 2024. Only 77% of target harvesting rounds were met. Yield is severely limited by crop recovery issues and historical fertilizer deviations. <span class='observation-ref'>(AR Pg. 31-32)</span>",
                    "<b>Pruning & Weeding Backlog:</b> Pruning only reached 74% completion in 2025, with Block F at a critical 17%. Similarly, weeding remains incomplete (56-63%), though ground vegetation is currently manageable. <span class='observation-ref'>(AR Pg. 19, 24)</span>",
                    "<b>Peat Soil Challenges:</b> Palms in peat areas exhibit lower vigor, smaller bunches, and leaning. While drain desilting has improved water recession (6 months vs 60 days), prolonged flooding still disrupts all field operations. <span class='observation-ref'>(AR Pg. 18, 34)</span>"
                ],
                "reports": {
                    "agronomy": {
                        "Executive Summary": "Palm census is slow; PARAS assistance is required (Pg. 4). Manuring in 2025 was incomplete (74%) and delayed by 2 months. Harvesting intervals remain unsatisfactory (up to 30-50 days), causing overripe bunches and rotten crop (Pg. 4, 15). Yield remains low (12.72 MT/ha) due to manpower shortages and flooding (Pg. 5, 31).",
                        "Nutrient inputs/progress of manuring": "2025 Mixture B program was only 74% complete due to flooding and manpower (Pg. 11). 2026 program is 39% complete as of Feb, with Jan programs for Block C/D/F/H pending (Pg. 12). Application quality is generally acceptable, though some lumpy fertilizer was noted (Pg. 12).",
                        "Agronomic observation": "Harvesting intervals in peat areas (A, B, E) are extended; non-peat areas are acceptable (Pg. 14). Fresh FFB assessments in P05E-6 showed 10% overripe bunches (Pg. 16). Palms in peat areas show leaning and low vigor; re-mounding is 93% complete (Pg. 18). Pruning only reached 74% in 2025, with Block F severely behind (17%) (Pg. 19). Weeding programs are incomplete (56-63%) (Pg. 24).",
                        "Yield performance": "2025 yield declined to 12.72 MT/ha. Harvesting round achievement was only 77% (Pg. 31-32). ABW (19.30 kg) is low for this age group, likely due to suboptimal nutrient status from multi-year fertilizer deviations (Pg. 32-33). Manpower shortage remains at 48 workers (Pg. 34).",
                        "Fertilizer recommendation": "2025 carry-forward stocks should be used. Mixture C can be replaced by Mixture B if needed. Strict adherence to the 2026 program is mandatory to prevent further yield decline (Pg. 36)."
                    },
                    "plantation": {
                        "Executive Summary": "The estate faces a critical shortage of 23 harvesters and 15 sprayers, leading to high turnover and low wages. Priority must be given to clearing Volunteer Oil Palms (VOPs) and Stenochlaena in low-lying areas. (PA Report, Pg. 50-51)",
                        "Area statement": "Total mature planted area is 1,999.83 ha. No changes. (PA Report, Pg. 9)",
                        "Labour Statement": "Critical shortage of 23 harvesters (ratio 1:33 ha vs 1:24 ha required). Overall ratio is 1:25 ha. (PA Report, Pg. 10-11)",
                        "Staff Establishment": "Manager, 3 executives, 5 field staff. Most staff are inexperienced (<3 years). (PA Report, Pg. 12-13)",
                        "General Charges": "Underspent by 49% as of June 2025. (PA Report, Pg. 14)",
                        "Upkeep Cultivation": "Circle spraying 39% complete, manuring 33% (as of June 25). Pruning backlog of 1,298 ha exists. (PA Report, Pg. 16, 30)",
                        "Harvesting and Collection": "Cost RM 78.90/tonne. Interval was 16 days. Productivity 1.7-2.0 MT/md. (PA Report, Pg. 41-42)",
                        "Crop Production": "Yield as of June 2025 was 5.45 MT/ha (32% below budget). (PA Report, Pg. 44)",
                        "Production Cost": "RM 260.60/tonne FFB. (PA Report, Pg. 47)",
                        "Vehicles Running Cost": "Hilux running cost satisfactory. (PA Report, Pg. 48)",
                        "Capital Expenditure": "Underspent as of June. (PA Report, Pg. 49)",
                        "Immature": "N/A (PA Report, Pg. 9)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Harvesting Intervals & Quality</p><p class='text-sm text-gray-600'><b>Policy 12.3:</b> Maintain interval at 10-12 days. PSK reaching 30-50 days is a critical breach leading to high crop loss. (Pg. 127)</p></div> <div class='policy-item'><p class='font-semibold'>Manuring Timeliness</p><p class='text-sm text-gray-600'><b>Policy 8.4.1 A:</b> Fertilizers must be applied during suitable weather and according to schedule. PSK delays of 2+ months and withdrawal of rounds is a major deviation. (Pg. 82)</p></div> <div class='policy-item'><p class='font-semibold'>Canopy Management (Pruning)</p><p class='text-sm text-gray-600'><b>Policy 11.01:</b> Systematic pruning is essential for harvesting efficiency. Current under-pruned conditions in Blocks A and F require urgent corrective action. (Pg. 124)</p></div> <div class='policy-item'><p class='font-semibold'>Rat Control Census</p><p class='text-sm text-gray-600'><b>Policy 9.1.3:</b> Conduct quarterly census. Baiting required if damage > 5%. Current status <10% requires careful monitoring. (Pg. 118)</p></div>"
            };

            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeCharts(estateData);
                    populateDetails(estateData);
                    attachEvents();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-purple-50 text-purple-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Est. Prod. vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues (Blended)</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeCharts(estate) {
                new Chart(document.getElementById('prodChart'), {
                    type: 'bar',
                    data: {
                        labels: estate.chartData.production.labels,
                        datasets: [
                            { label: 'Est. FFB (MT)', data: estate.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', yAxisID: 'y-ffb', tension: 0.4 },
                            { label: 'Rainfall (mm)', data: estate.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { 'y-ffb': { position: 'left' }, 'y-rainfall': { position: 'right', grid: { drawOnChartArea: false } } } }
                });

                new Chart(document.getElementById('ageChart'), {
                    type: 'pie',
                    data: {
                        labels: estate.chartData.ageProfile.labels,
                        datasets: [{ data: estate.chartData.ageProfile.data, backgroundColor: ['#10B981', '#F59E0B'] }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                });
            }
            
            function populateDetails(estate) {
                const sections = ['agronomy', 'plantation'];
                sections.forEach(sec => {
                    const div = document.getElementById(sec);
                    if (div && estate.reports[sec]) {
                        div.innerHTML = Object.entries(estate.reports[sec]).map(([k, v]) => `
                            <div class="mb-4">
                                <h4 class="font-bold text-gray-800 border-l-4 border-green-700 pl-2">${k}:</h4>
                                <p class="text-sm text-gray-600 ml-3 mt-1 leading-relaxed">${v}</p>
                            </div>`).join('');
                    }
                });
                document.getElementById('pinfosys').innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
            }

            function attachEvents() {
                document.querySelectorAll('.dropdown-btn').forEach(btn => btn.onclick = (e) => {
                    const content = document.getElementById(e.currentTarget.dataset.dropdownId);
                    content.classList.toggle('active');
                    e.currentTarget.classList.toggle('active');
                });
                document.querySelector('.policy-modal-btn').onclick = () => {
                    document.getElementById('modalContent').innerHTML = estateData.policy;
                    document.getElementById('policyModal').classList.add('active');
                };
            }

            renderEstate();
        });

        function closePolicyModal() { document.getElementById('policyModal').classList.remove('active'); }
    </script>
</body>
</html>
