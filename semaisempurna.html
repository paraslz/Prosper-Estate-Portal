<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semai Sempurna Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Semai Sempurna Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "semaisempurna",
                "name": "Semai Sempurna Estate",
                "reportInfo": "Data based on Plantation Advisory Report 1/2026 (Visit Date: 30th March 2026) & Agronomy Report 1/2026 (Visit Date: 13th January 2026).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": ["Mature: 668.40 ha", "Immature: 0.00 ha", "Total: 683.94 ha"], 
                        "source": "PA 1/2026, Pg. 9" 
                    },
                    "yield": { 
                        "title": "Yield/Ha (FY 2025)", 
                        "value": "22.18 / 24.79 MT", 
                        "note": "Actual vs Budget (11% below)", 
                        "source": "PA 1/2026, Pg. 38" 
                    },
                    "cost": { 
                        "title": "Prod. Cost/Tonne (FY 2025)", 
                        "value": "RM 208.22 / 222.95", 
                        "note": "Actual vs Budget (7% below)", 
                        "source": "PA 1/2026, Pg. 40" 
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Critical (P06A)",
                        "note": "22.33% infection in P06A",
                        "source": "AR 1/2026, Pg. 33"
                    },
                    "labour": { 
                        "title": "Labour Status", 
                        "value": "Shortage of 3", 
                        "note": "25 harvesters vs 28 required", 
                        "source": "PA 1/2026, Pg. 10" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:19 ha (Shortage)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "High (Ganoderma/Rat)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Harvest Rounds", "value": "18.3 rounds (Low)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "2025 Production", "value": "-11% vs Budget" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' /></svg>", "label": "Harvester Earn.", "value": "Below Basic Wage" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [964.70, 977.56, 961.51, 1306.02, 1277.45, 1345.27, 1204.33, 1256.87, 1418.40, 1436.73, 1383.57, 1291.11],
                        "rainfall": [222.5, 143.0, 265.5, 396.0, 206.0, 48.0, 29.5, 61.5, 170.0, 103.5, 149.5, 401.0],
                        "note": "*FY 2025 Data. Source: AR 1/2026 Appendix 2b & PA 1/2026 Pg. 38."
                    },
                    "ageProfile": {
                        "labels": ["Prime (8-19 Years)", "Old (20+ Years)"],
                        "data": [74, 26],
                        "title": "Semai Sempurna Estate Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 9."
                    }
                },
                "observations": [
                    "<b>Harvester Shortage & Productivity:</b> The estate is short of 3 harvesters (25 available vs 28 required). Current productivity is unsatisfactory; harvesters only work an average of 5 hours/day vs 9 hours target. <span class='observation-ref'>(PA 1/2026, Pg. 10, 36)</span>",
                    "<b>Low Harvester Earnings:</b> Harvester average earnings (RM 57.04 - 78.21) often fall below the daily basic wage of RM 65.89, leading to high turnover. <span class='observation-ref'>(PA 1/2026, Pg. 36)</span>",
                    "<b>Critical Ganoderma Infection (P06A):</b> Incidence in P06A reached 22.33% (2,189 collapsed palms). Overall infection is 6.04%. Immediate sanitation and census are mandatory. <span class='observation-ref'>(AR 1/2026, Pg. 33; PA 1/2026, Pg. 28)</span>",
                    "<b>Yield Shortfall (FY 2025):</b> Actual yield of 22.18 MT/ha was 11% below the budget (24.79 MT/ha), largely due to extended intervals and crop losses from labor shortages. <span class='observation-ref'>(PA 1/2026, Pg. 38)</span>",
                    "<b>Rat Infestation:</b> Old rat damage is extensive. Baiting campaigns were conducted in 2025, but quarterly census must continue to ensure damage remains below the 10% threshold. <span class='observation-ref'>(PA 1/2026, Pg. 26-27)</span>",
                    "<b>Road Maintenance:</b> Road conditions are generally satisfactory; however, roadside drains in hilly areas require stop blocks to minimize erosion. <span class='observation-ref'>(PA 1/2026, Pg. 30-31)</span>"
                ],
                "reports": {
                    "agronomy": {
                        "Executive Summary": "The estate recorded an average yield of 22.18 mt/ha in 2025, a 12.5% decline from 2024. The primary yield-limiting factors are the high Ganoderma infection rate in P06A (22.33%), waterlogging in P09B1, and extended harvesting intervals due to labour shortages. The 2025 manuring program was successfully completed. (Source: AR 1/2026, Pg. 5)",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 manuring programme was 100% completed without significant delays. For 2026, no fertilizers have been received or applied yet; delivery is expected shortly. (Source: AR 1/2026, Pg. 10)",
                        "Agronomic Observation": "Harvesting intervals fluctuated between 15-20 days, often exceeding the target due to harvester turnover. Pruning is generally acceptable, though some under-pruning was seen in P09B5. Waterlogging in P09B1 requires drainage improvement. Weeding is on schedule, but Clidemia hirta spots require attention. (Source: AR 1/2026, Pg. 12-26)",
                        "Yield Performance": "Cumulative yield for 2025 was 22.18 mt/ha, down from 25.36 mt/ha in 2024. P06A saw the sharpest decline (-16.7%). The average number of harvesting rounds was 18.3, well below the benchmark of 24. (Source: AR 1/2026, Pg. 36-37)",
                        "Fertilizer Recommendation (2026)": "No amendments made to the 2026 recommendation. The 2027 program will be drawn up after the next visit in July 2026. (Source: AR 1/2026, Pg. 39)",
                        "Pest & Disease": "Rat damage exceeded 10% in two quarters of 2025; baiting was conducted. Barn owl occupancy is healthy at 89%. Ganoderma census shows 2,703 infected palms total, with P06A critically affected. (Source: AR 1/2026, Pg. 31-33)"
                    },
                    "plantation": {
                        "Executive Summary": "The main issue is the harvester shortage and low productivity. Earnings are below basic wage, risking turnover. Field conditions are generally satisfactory, but technical guidance is needed for data recording. (PA Report, Pg. 7, 43)",
                        "Area Statement": "Total planted mature area is 668.40 ha (97.7% of total). Older palms are 19 years; no immediate replanting plans. (PA Report, Pg. 4, 9)",
                        "Labour Statement": "Shortage of 3 harvesters (25 available vs 28 required). Worker ratio is 1:19 ha; target ideal is 1:15 ha. (PA Report, Pg. 10-11)",
                        "Staff Establishment": "Satisfactory with 5 personnel. En. Norhisam joined as Assistant in-charge wef Feb 2026. (PA Report, Pg. 12)",
                        "General Charges": "Underspent by 33% (RM 823,073 actual vs RM 1.22M budget). Overspending noted in Staff Accom. (+59%) and Security (+114%). (PA Report, Pg. 13-14)",
                        "Upkeep & Cultivation": "Total upkeep RM 1,454,033 (7% under budget). Circle spraying 100% completed; however, productivity could be higher (4.6 vs 6 ha/md). Pruning is satisfactory but some under-pruned palms require correction. (PA Report, Pg. 15-25)",
                        "Harvesting and Collection": "YTD Cost RM 54.62/tonne. Rounds achieved only 18.3 vs 24 target. Harvesters working only 5 hours/day on average. (PA Report, Pg. 35-36)",
                        "Crop Production": "FY 2025 FFB Production 14,823.51 MT, 11% below budget. Yield 22.18 MT/ha. Decline due to harvester shortage and extended intervals. (PA Report, Pg. 38)",
                        "Production Cost": "FY 2025 Cost RM 208.22/tonne, 7% below budget of RM 222.95. (PA Report, Pg. 40)",
                        "Vehicles Running Cost": "Hilux RM 0.25/km. Eurostar Tractor RM 9.71/km (28% above budget due to repairs). (PA Report, Pg. 41)",
                        "Capital Expenditure": "Underspent. Actual RM 2,128 vs RM 314,000 budget. Residential repairs pending. (PA Report, Pg. 42)",
                        "Immature": "N/A (100% Mature Estate). (PA Report, Pg. 9)"
                    },
                    "pinfosys": {
                        "Report Status": "Pinfosys financial data for FY 2025 is currently under processing. Section will be updated once accounts are closed."
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Sanitation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For infection levels >15% (e.g., P06A), strict sanitation via deboling (1.5m x 1.5m pit) is mandatory to check spread.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must be maintained at 10-12 days. Intervals >15 days negatively impact crop recovery and loose fruit collection.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Damage census >10% triggers immediate baiting campaigns (Storm/flocoumafen) until damage drops below 5%.</p></div> <div class='policy-item'><p class='font-semibold'>Water Management</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-DRAIN-02:</b> Waterlogged areas (e.g., P09B1) must be drained to prevent anaerobic conditions and nutrient lock-up (yellow palms).</p></div>"
            };


            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}<p class="text-[10px] text-gray-400 mt-1 italic">${metric.source || ''}</p></div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p><p class="text-[10px] text-gray-400 mt-1 italic">${metric.source || ''}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#eab308', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                if (pinfosysDiv && estateData.reports.pinfosys) {
                    pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', () => openPolicyModal(estateData));
            }

            renderEstate();
        });
        
        function openPolicyModal(estateData) {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            modalContent.innerHTML = estateData.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
