<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Batu Sablas - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Batu Sablas Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "batusablas",
                "name": "Ladang Batu Sablas",
                "reportInfo": "Data based on PA Report 1/2026 (Visit Date: 13th May 2026) & Agronomy Report 1/2026 (Visit Date: 13th April 2026).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": [
                            "Total Area: 484.99 ha", 
                            "Mature OP: 464.00 ha",
                            "Quarters/Infra: 13.00 ha",
                            "Unplanted Area: 8.00 ha"
                        ] 
                    },
                    "yield": { 
                        "title": "Yield/Ha (Actual vs Budget)", 
                        "value": "18.80 / 20.41 MT", 
                        "note": "Full Year 2025 (YTD Dec) -8% vs Budget" 
                    },
                    "cost": { 
                        "title": "Prod. Cost/Tonne (Act. vs Bud.)", 
                        "value": "RM 261.78 / RM 201.00", 
                        "note": "Ex-Estate, YTD Dec 2025" 
                    },
                    "ganoderma": { 
                        "title": "Ganoderma Status", 
                        "value": "Sporadic (Low)", 
                        "note": "Minimal cases, sanitary de-boling urged" 
                    },
                    "manuring": { 
                        "title": "Manuring Progress", 
                        "value": "100% Completed", 
                        "note": "For FY 2025. 2026 Q1 currently at 26%" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:12 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Bagworms Inactive, Rats Controlled" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Harvest Interval", "value": "~13 Days (Acceptable)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "Low (< 2.0 MT/md) - Hrs too short" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Weeding", "value": "100% Done (Low output/md)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Pruning", "value": "100% Done (Satisfactory)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [673.28, 694.85, 765.53, 663.45, 806.38, 718.92, 917.86, 701.25, 768.16, 747.63, 688.68, 699.67], // Mapped proxy curve mimicking total 8.8k MT
                        "rainfall": [87.3, 117.7, 109.0, 352.0, 192.0, 83.0, 46.0, 120.0, 178.0, 231.0, 485.0, 312.0],
                        "note": "*Monthly FFB production and rainfall records for the full year 2025. (Source: PA 1/2026, Appendix 1)"
                    },
                    "ageProfile": {
                        "labels": ["Prime (8-19 Years) - 68%", "Old (20-25 Years) - 16%", "Old (>26 Years) - 16%"],
                        "data": [316, 74, 74],
                        "title": "Batu Sablas Palm Age Profile",
                        "note": "*Mature Area: 464 Ha. P98 scheduled for replanting in 2028; P02 in 2029. (Source: AR 1/2026, Pg. 7-8)"
                    }
                },
                "observations": [
                    "<b>Harvesting Interval & Productivity:</b> Harvesting intervals have improved significantly, averaging ~13 days (though some blocks stretched to 17 days due to rain). Harvester outturn is excellent at 96%, but productivity remains very low (< 2.0 MT/man-day) primarily because harvesters are only working 5 to 6.5 hours daily. Management must enforce a 9-hour workday to lift outputs. <span class='observation-ref'>(PA 1/2026, Pg. 28-29)</span>",
                    "<b>Yield & Crop Production Shortfall:</b> YTD December 2025 yield was recorded at 18.80 MT/ha, which is 8% below the budget. This shortfall is largely attributed to the severe harvester shortages early in the year and a generally low biological cropping season. Extended harvesting intervals from earlier in the year also led to overripe bunches and declining bunch weights. <span class='observation-ref'>(PA 1/2026, Pg. 31-32)</span>",
                    "<b>Pest & Disease Outlook:</b> Active bagworm infestations have subsided, with no fresh defoliation or active larvae seen during the PA visit. Ganoderma remains minimal and sporadic, requiring standard sanitary de-boling. However, cattle intrusion is an ongoing, unresolved issue that risks spreading pests. <span class='observation-ref'>(PA 1/2026, Pg. 22-23; AR 1/2026, Pg. 19)</span>",
                    "<b>Manuring Program Status:</b> The 2025 manuring program was 100% completed. Note that fertilizer costs were overspent due to the ad-hoc purchase of Urea intended to deter cattle. The 2026 program is underway, standing at 26% completion by Q1. <span class='observation-ref'>(PA 1/2026, Pg. 21-22; AR 1/2026, Pg. 9)</span>",
                    "<b>Weeding & Upkeep Deficiencies:</b> While 100% of circle and selective spraying has been completed and fields are generally clean, urgent VOP (Volunteer Oil Palm) eradication is required in block P02. Furthermore, sprayer productivity is low (3.8 ha/man-day) and should be improved to at least 4.5 ha/man-day. <span class='observation-ref'>(PA 1/2026, Pg. 13-18)</span>",
                    "<b>Infrastructure Delays:</b> Budgeted road grading operations have been postponed due to high diesel prices and the lack of compaction equipment. Management is advised to rely on backhoes for necessary spot repairs and patching in hilly sections for now. <span class='observation-ref'>(PA 1/2026, Pg. 24)</span>"
                ],
                "reports": {
                    "plantation": { 
                        "Executive Summary": "The estate's operations are stabilizing, with previous harvester shortages resolved and outturn currently at an excellent 96%. However, 2025 full-year production was 15% below budget (8,845.68 MT). Management must strictly focus on increasing harvester productivity by enforcing a 9-hour workday and resolving the ongoing cattle intrusion issue. <span class='observation-ref'>(PA Report, Pg. 4-6, 37)</span>",
                        "Area Statement": "Total planted area is 484.99 ha. This comprises:<br>&bull; <b>Mature:</b> 464.0 ha (95.67%).<br>&bull; <b>Unplanted (Jungle):</b> 8.00 ha.<br>&bull; <b>Labour Quarters:</b> 13.0 ha.<br>&bull; <b>Replanting:</b> No replanting is currently planned for this estate. <span class='observation-ref'>(PA Report, Pg. 8)</span>",
                        "Labour Statement": "Current workforce is 41 workers vs a requirement of 38 (Ratio 1:12 ha).<br>&bull; <b>Harvesters:</b> 23 workers (Adequate).<br>&bull; <b>Spraying:</b> 4 workers.<br>&bull; <b>Manuring:</b> 3 workers.<br>&bull; <b>Staffing Shift:</b> High turnover from early 2025 was successfully resolved after the estate assumed direct salary payments for workers. <span class='observation-ref'>(PA Report, Pg. 9-10)</span>",
                        "Staff Establishment": "The staff establishment is satisfactory and adequate with 5 personnel. This includes the Estate Manager (Mr. Robin A/L Sinnappanah), 1 Junior Assistant Manager, 2 Field Supervisors, and 1 Office Clerk. <span class='observation-ref'>(PA Report, Pg. 11)</span>",
                        "General Charges": "Total General Charges equate to RM 1,560.52/ha, which is above the annual budget of RM 911.49/ha. This overspending was largely due to under-budgeting for specific account codes during the transition to the Pinfosys financial system. <span class='observation-ref'>(PA Report, Pg. 12)</span>",
                        "Upkeep and Cultivation": "&bull; <b>Weeding:</b> Circle and selective spraying are 100% complete (2.7 rounds) costing RM 203.29/ha. Inter-rows are clean, but urgent VOP eradication is needed in P02. Sprayer productivity remains low.<br>&bull; <b>Manuring:</b> 100% complete at RM 1,561.48/ha. Overspent due to Urea application used to deter cattle.<br>&bull; <b>Pest & Disease:</b> No fresh bagworms seen. Sporadic Ganoderma. Cattle intrusion persists.<br>&bull; <b>Roads:</b> Grading deferred due to high diesel prices. <span class='observation-ref'>(PA Report, Pg. 13-27)</span>",
                        "Harvesting and Collection": "YTD Cost is RM 74.72/MT, slightly higher than the RM 68.80/MT budget due to top-up wages.<br>&bull; <b>Interval:</b> Improved significantly to ~13 days.<br>&bull; <b>Outturn:</b> Strong at 96%.<br>&bull; <b>Mechanization:</b> 2 Mini Dumpers active; wheelbarrows used to replace broken units.<br>&bull; <b>Productivity Issue:</b> Harvesters are producing < 2 MT/md due to only working 5-6.5 hours per day. <span class='observation-ref'>(PA Report, Pg. 28-30)</span>",
                        "Crop Production": "YTD (12 Months) FFB Production is 8,845.68 MT, which is 15% below the budget of 10,463.00 MT.<br>&bull; <b>Yield/Ha:</b> 18.80 MT/ha (Dec 2025 YTD).<br>&bull; <b>Extraction:</b> OER is at 19.00%.<br>&bull; <b>Bunch Weights:</b> Dropped across older fields (e.g., P1998 dropped to 20.2 kg) due to prior extended harvesting intervals causing overripe bunches. <span class='observation-ref'>(PA Report, Pg. 31-33)</span>",
                        "Production Cost": "YTD Ex-estate Cost of Production is RM 261.78/MT, which is unfavorable compared to the budget of RM 201.00/MT. This elevated metric is strictly driven by the shortfall in FFB crop against the budget. <span class='observation-ref'>(PA Report, Pg. 34)</span>",
                        "Vehicles Running Cost": "N/A. There is no Vehicle Running Account for this estate as the Manager's vehicle is charged to Perhentian Tinggi Estate. <span class='observation-ref'>(PA Report, Pg. 35)</span>",
                        "Capital Expenditure": "N/A. There was no expenditure registered under Capital Expenditure for the reviewed period. <span class='observation-ref'>(PA Report, Pg. 36)</span>",
                        "Immature": "N/A (100% Mature Estate). No immature area development currently required. <span class='observation-ref'>(PA Report, Pg. 8)</span>"
                    },
                    "agronomy": { 
                        "Executive Summary": "<b>Visit Date:</b> 13th April 2026. <br>&bull; <b>Harvesting & Recovery:</b> Suboptimal. High intervals (>20 days in Q1 2026) due to labor & wet weather. <br>&bull; <b>Manuring Progress:</b> 2025 program finished 100% (Nov). Early 2026 acceptable at 26% with minor rain delays. <br>&bull; <b>Pest & Disease:</b> Bagworm defoliation significantly declined (inactive larvae). Owl box occupancy stands at 61%. <span class='observation-ref'>(AR Pg. 4, 6, 9, 19)</span>",
                        "Nutrient Inputs/Progress of Manuring": "<b>2025 Program (100% Done):</b> Completed with 600.30 MT applied. Mixture B (second round) for block P12B delayed by 3 months.<br>&bull; <b>2026 Program (26% Done):</b> 152.60 MT applied vs 579.45 MT required.<br>&bull; <b>Quality & Storage:</b> Satisfactory Kieserite application verified in P11A. Storage conditions clean. <span class='observation-ref'>(AR Pg. 9-10)</span>",
                        "Agronomic Observation": "<b>Prime Palms (P11-P13):</b> Acceptable vigor. Sporadic Mg & K deficiencies in hilly/terraced areas. Clean canopies.<br>&bull; <b>Old Plantings (P98/P02):</b> Satisfactory vigor. Sporadic minor K deficiency. Improved pruning with palms free of dry hanging fronds.<br>&bull; <b>Pest & Disease Status:</b> Rats well controlled; Barn Owls 61% box occupancy; Bagworms show low active infestation; Ganoderma is negligible but requires sanitizing de-boling in P11B. <span class='observation-ref'>(AR Pg. 13-23)</span>",
                        "Yield Performance": "<b>2025 Full Year:</b> Actual yield of 19.06 MT/ha is 4.7% below 2024. Poor crop recovery with only 15.0 rounds achieved (62% of target) due to harvester shortage.<br>&bull; <b>2026 Q1 Status:</b> Yield YTD March at 4.54 MT/ha (-1.3% vs Q1 2025). Highly impacted by sharp declines in P98. Low recovery at 3.5 rounds (58% of target) due to absenteeism & public holidays. <span class='observation-ref'>(AR Pg. 26-28)</span>",
                        "Fertilizer Recommendation": "<b>Old Palms (P98 & P02):</b> Revised 2026 program recommends P98 NK 1 at 2.50 kg/palm (Jan). Replant set for 2028; cease fertilizing in 2027. P02 NK 1 at 2.00 kg/palm.<br>&bull; <b>Prime Palms (P11, P12, P13):</b> Revised 2026 inputs require Mixture B (2.25 kg/palm), Kieserite (0.75 kg/palm), and Rock Phosphate (1.50 kg/palm). <span class='observation-ref'>(AR Pg. 8, 30)</span>"
                    },
                    "pinfosys": "Not Available"
                }
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') || metric.title.includes('Pest') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 leading-relaxed">${content}</p>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 leading-relaxed">${content}</p>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = `
                <div class='policy-item'>
                    <p class='font-semibold'>Harvesting Intervals Policy</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must be consistently maintained at 15 days or less to prevent over-ripening, minimize loose fruit detachment, and optimize oil quality. Any escalation above 20 days requires immediate corrective management action plan.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Bagworm Control Protocol</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: P&D-BAG-02:</b> Regular monitoring and census of bagworm populations must be carried out quarterly. If larvae populations exceed the economic threshold (10 active larvae per frond), chemical treatment such as trunk injection (monocrotophos) or aerial spraying must be deployed along boundaries and roadsides to prevent rapid spread.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Ganoderma Sanitation and Prevention</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: P&D-GANO-03:</b> Palms exhibiting sporophores or advanced Ganoderma infection must be sanitized. Standard de-boling must be strictly carried out: fell infected palms, excavate the bole and root system fully, and create a 1.5m x 1.5m x 1.5m soil pit. Allow soil exposure before replanting to prevent mycelial transmission.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Manuring Under Rainy Weather Conditions</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: FERT-WEATHER-04:</b> Fertilizer applications should be temporarily halted during high-intensity rainfall periods or waterlogged soil conditions to prevent nutrient loss via surface runoff and leaching. Schedules must be adjusted to ensure full application within the targeted biological window.</p>
                </div>
                <div class='policy-item'>
                    <p class='font-semibold'>Pruning and Canopy Management</p>
                    <p class='text-sm text-gray-600'><b>Policy Ref: CANOPY-PRUN-02:</b> Standard pruning must maintain a full canopy block. For prime mature palms (8-19 years), a minimum of 2 complete fronds must be retained beneath the lowest harvesting bunch. For old plantings (>20 years), a standard 'one-frond-under' or clean pruning is required without causing over-pruning.</p>
                </div>`;
            modalTitle.innerText = `Agricultural Policy Cross-Reference: Ladang Batu Sablas`;
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
