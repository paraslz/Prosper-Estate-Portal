<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Nuklias 6 Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
        .report-section-content { margin-bottom: 1.5rem; }
        .report-section-content ul { list-style-type: none; padding-left: 0.5rem; }
        .report-section-content li { margin-bottom: 0.25rem; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Nuklias 6 Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "nuklias",
                "name": "Nuklias 6 Estate",
                "reportInfo": "Data based on PA Report 01/2026 (Visit: Jun 2026) & Agronomy Report 1/2026 (Visit: May 2026).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": ["Mature: 824.50 ha", "Immature: 0 ha", "Total: 841.89 ha"],
                    },
                    "yield": { 
                        "title": "Yield/Ha (2025 Actual vs Budget)", 
                        "value": "26.03 / 25.20 MT", 
                        "note": "Avg Kema (26.53) & Timur (25.53)" 
                    },
                    "cost": { 
                        "title": "FFB Cost/Tonne (Actual vs Budget)", 
                        "value": "RM 302.50 / RM 210.91", 
                        "note": "Spike due to unbudgeted HQ GC" 
                    },
                    "weeding": { 
                        "title": "Weeding Progress", 
                        "value": "Delayed", 
                        "note": "67-83% Circle Spraying (Rain)" 
                    },
                    "manuring": { 
                        "title": "Manuring Progress", 
                        "value": "100% Completed", 
                        "note": "27-37 rounds applied (2025)" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:15.5 ha", "note": "Short 3 Harvesters (Dec 2025)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Moderate", "note": "Gano in G, Elephants in P18" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "18.77%", "note": "Budget 19.00%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z' /></svg>", "label": "Roads & Drains", "value": "Suspended/Delayed", "note": "High diesel cost & low volume" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "12 days", "note": "24 rounds achieved" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Harvester Prod.", "value": "104-115% Outturn", "note": "Needs improvement in young areas" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [1620.99, 1532.76, 1439.43, 1434.95, 1708.56, 1696.94, 1600.39, 1367.33, 1786.08, 2009.06, 1760.34, 1702.37], 
                        "rainfall": [163.5, 113.0, 81.5, 155.0, 330.75, 138.5, 229.25, 106.0, 166.0, 108.5, 404.0, 293.75],
                        "note": "*2025 FFB Production and Average Rainfall (Timur & Kema). Source: Agro Report 1/2026 Appdx 2 & 3."
                    },
                    "ageProfile": {
                        "labels": ["8-19 Years (Prime)", "20-25 Years (Old)", ">25 Years (Very Old)"],
                        "data": [41, 44, 15], 
                        "title": "Nuklias Estate Palm Age Distribution",
                        "note": "*Total 824.50 Ha. Replanting for P98 E1/E2 deferred to 2027. Source: Agro 1/2026, Pg. 9."
                    }
                },
                "observations": [
                    "<b>Unbudgeted Head Office Charges (Cost Spike):</b> The production cost per tonne has significantly exceeded the budget (Kema RM 294/t, Timur RM 311/t) predominantly due to gross over-expenditures in General Charges charged by the Head Office. <span class='observation-ref'>(PA Report 1/2026, Pg. 13)</span>",
                    "<b>Infrastructure Upkeep Suspended:</b> Road grading and backhoe rentals were suspended due to high diesel prices, leading to degraded collection roads. Drain desilting was also not done as the low budgeted volume made contractor mobilization uneconomical. <span class='observation-ref'>(PA Report 1/2026, Pg. 26-30)</span>",
                    "<b>Rat Infestation (Elevated):</b> Rat damage has exceeded the 10% economic threshold in P02B2 and P02B3 (Timur), as well as historically in P08G and P06D. Baiting conducted in April 2026 showed positive results with dead rats found, but continuous monitoring is essential. <span class='observation-ref'>(Agro Report 1/2026, Pg. 28-29)</span>",
                    "<b>Ganoderma & Elephant Intrusion:</b> Upper stem rot Ganoderma infections are becoming prominent, particularly in Block G (Kema), requiring immediate census and de-boling. Additionally, elephant intrusions severely damaged palms in P18/H; digging trenches is recommended. <span class='observation-ref'>(PA Report 1/2026, Pg. 23-26)</span>",
                    "<b>Barn Owl Box Maintenance:</b> Occupancy rates in Timur division are low at 61% (up slightly from 58%). Regular cleaning and replacement of damaged boxes are recommended to assist biological pest control. Kema division is satisfactory at 85%. <span class='observation-ref'>(Agro Report 1/2026, Pg. 29-30)</span>",
                    "<b>Selective Palm Thinning:</b> A total of 730 etiolated and poor-setting palms in closely planted areas (P08G, P09F, P98E) have been selectively thinned out to improve the Leaf Area Index (LAI) and photosynthetic efficiency of remaining palms. <span class='observation-ref'>(Agro Report 1/2026, Pg. 19-21)</span>"
                ],
                "reports": {
                    "agronomy": {
                        "Executive Summary": "<div class='report-section-content'>The estate was visited on 14th May 2026. Agronomic conditions are generally acceptable with the 2025 manuring program 100% completed and the 2026 program progressing on schedule. Harvesting intervals are well maintained below 15 days. Key issues to address include elevated rat infestations in P02B2 and P02B3 (>10%), mild potassium deficiencies in localized blocks, and low barn owl box occupancy in the Timur division. (Agro Report 1/2026, Pg. 4-7)</div>",
                        "Nutrient Inputs/Progress of Manuring": "<div class='report-section-content'><ul><li><b>2025 Program:</b> 100% completed for both Timur (454.60 MT) and Kema (484.36 MT).</li><li><b>2026 Program (YTD April):</b> Timur division is currently applying Mixture A. Kema division has fully applied the currently required Mixture B, NK2, KIE, and CIRP. Overall progress is satisfactory.</li><li><b>Application Standards:</b> NK1 broadcast evenly within palm circles; applicator productivity observed at 27 bags per person.</li></ul>(Agro Report 1/2026, Pg. 11-13)</div>",
                        "Agronomic Observation": "<div class='report-section-content'><ul><li><b>Harvesting & Crop Recovery:</b> Intervals consistently < 15 days. Loose fruit collection is good with minimal over-ripe bunches.</li><li><b>Pruning & Canopy:</b> Progress is nearly 100% across all blocks. Selective thinning of 730 etiolated palms (P08G, P09F, P98E) was completed to improve Leaf Area Index.</li><li><b>Pest Control (Rats):</b> Rat damage exceeded the 10% threshold in P02B2 and P02B3. April baiting showed positive reduction results.</li><li><b>Pest Control (Barn Owls):</b> Occupancy in Timur is low (61%) vs Kema (85%). Maintenance is required for unoccupied boxes.</li><li><b>Weeding:</b> Inter-row and circle weeding are on schedule; soft grasses remain the dominant ground cover.</li></ul>(Agro Report 1/2026, Pg. 14-35)</div>",
                        "Yield Performance": "<div class='report-section-content'><ul><li><b>2025 Full Year:</b> Both divisions recorded increased yields. Timur yielded 24.83 MT/ha (+2.8%), Kema yielded 26.12 MT/ha (+8.3%). 100% of blocks achieved >20 MT/ha.</li><li><b>2026 (YTD April):</b> Timur yielded 6.86 MT/ha (-0.6%), Kema yielded 6.87 MT/ha (-6.8%), slightly down compared to last year primarily due to seasonal cropping trends.</li></ul>(Agro Report 1/2026, Pg. 36-40)</div>",
                        "Fertilizer Recommendation": "<div class='report-section-content'>The 2026 fertilizer program for the second half of the year has been revised in response to fertilizer price hikes and limited stock availability. Furthermore, Block P98E (77.95 ha) has had its fertilizer program completely withdrawn due to the upcoming replanting schedule planned for 2027. (Agro Report 1/2026, Pg. 41-42)</div>"
                    },
                    "plantation": { 
                        "Executive Summary": "<div class='report-section-content'>The estate's performance for 2025 was generally satisfactory with crop production exceeding the budget (Kema +4%, Timur +2%). However, production costs were significantly high (Kema RM 294.00/t, Timur RM 311.00/t) due to gross over-expenditures for unbudgeted General Charges from Head Office. (PA Report 1/2026, Pg. 4-7)</div>",
                        "Area Statement": "<div class='report-section-content'>As of Dec 2025, the total planted area is 824.50 ha. This comprises:<br>• <b>Mature:</b> 824.50 ha (100%).<br>• <b>Immature:</b> 0 ha.<br>• <b>Replanting:</b> None planned. (PA Report 1/2026, Pg. 9)</div>",
                        "Labour Statement": "<div class='report-section-content'>Current workforce is 53 workers vs requirement of 57 (Ratio 1:15.5 ha).<br>• <b>Harvesters:</b> 37 (Ratio 1:22 ha). Short of 3 harvesters to achieve peak crop.<br>• <b>Upkeep/Manuring:</b> 4 workers for manuring, 4 for spraying. (PA Report 1/2026, Pg. 10)</div>",
                        "Staff Establishment": "<div class='report-section-content'>The staff establishment is adequate. The Assistant for Timur was transferred with no replacement, but the Field Conductor shows strong potential for promotion. (PA Report 1/2026, Pg. 12)</div>",
                        "General Charges": "<div class='report-section-content'>Total General Charges were severely overspent.<br>• <b>Kema:</b> Overspent by 82%.<br>• <b>Timur:</b> Overspent by 312%.<br>• <b>Overspending:</b> Primarily due to the entry of expenditures from Head Office for various items which were not budgeted. (PA Report 1/2026, Pg. 13)</div>",
                        "Upkeep and Cultivation": "<div class='report-section-content'>• <b>Weeding:</b> Circle spraying is 67-83% complete, delayed due to perpetual rain. Cost is RM 194-265/ha.<br>• <b>Manuring:</b> 100% completed for both divisions.<br>• <b>Roads & Drains:</b> Road grading suspended due to high diesel prices. Desilting of drains not done due to low volume making it uneconomical for contractors. (PA Report 1/2026, Pg. 14-30)</div>",
                        "Harvesting and Collection": "<div class='report-section-content'>YTD Cost is RM 76.57/MT (Kema) and RM 103.83/MT (Timur).<br>• <b>Interval:</b> Averaged 12 days (24 rounds achieved).<br>• <b>Mechanization:</b> Wheelbarrows used. Harvesters' outturn was 104-115%. (PA Report 1/2026, Pg. 33-35)</div>",
                        "Crop Production": "<div class='report-section-content'>Full Year (12 Months) FFB Production is <b>21,291.02 MT</b>, which is above the budget.<br>• <b>Yield/Ha:</b> Kema 26.53 MT/ha, Timur 25.53 MT/ha.<br>• <b>Extraction:</b> OER at 18.77% vs Budget 19.00%. (PA Report 1/2026, Pg. 36)</div>",
                        "Production Cost": "<div class='report-section-content'>Full Year Cost of Production is high compared to budget.<br>• <b>Kema:</b> RM 294.00/MT (Budget RM 236.82/MT).<br>• <b>Timur:</b> RM 311.00/MT (Budget RM 185.00/MT).<br>• <b>General Charges:</b> Contributed significantly to the high cost per MT (Kema RM 96.36/MT, Timur RM 171.00/MT). (PA Report 1/2026, Pg. 39)</div>",
                        "Vehicles Running Cost": "<div class='report-section-content'>There is no vehicle budget or running cost for the estate. (PA Report 1/2026, Pg. 40)</div>",
                        "Capital Expenditure": "<div class='report-section-content'>Underspent for the year. Kema spent RM 4,560 (Budget RM 19,090). Timur spent RM 7,478 (Budget RM 13,800). Purchases included water pumps, filters, barn owl boxes, and CHRA. (PA Report 1/2026, Pg. 41)</div>",
                        "Immature": "<div class='report-section-content'>N/A (100% Mature Estate). (PA Report 1/2026, Pg. 9)</div>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> For areas with >5% fresh damage, baiting campaigns must be initiated immediately using approved rodenticides (e.g., flocoumafen).</p></div><div class='policy-item'><p class='font-semibold'>Nutrient Management</p><p class='text-sm text-gray-600'><b>Policy Ref: AGR-Nutrient-01:</b> Corrective manuring is required for blocks showing foliar deficiency (N/K) in consecutive rounds.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-03:</b> Harvesting intervals must not exceed 15 days to ensure optimal OER targets are met.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-purple-50 text-purple-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full flex-shrink-0">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg leading-tight">${metric.value}</p>${metric.note ? `<p class="text-xs text-gray-500 mt-1">${metric.note}</p>` : ''}</div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details (May 2026)</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details (Jun 2026)</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#4CAF50', '#FFC107', '#F44336'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && typeof estateData.reports.agronomy === 'object') {
                    agronomyDiv.innerHTML = `<div class="space-y-4">` + Object.entries(estateData.reports.agronomy).map(([section, content]) => `<div><h4 class="font-bold text-gray-900 mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700">${content}</div></div>`).join('') + `</div>`;
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && typeof estateData.reports.plantation === 'object') {
                    plantationDiv.innerHTML = `<div class="space-y-4">` + Object.entries(estateData.reports.plantation).map(([section, content]) => `<div><h4 class="font-bold text-gray-900 mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700">${content}</div></div>`).join('') + `</div>`;
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && typeof estateData.reports.pinfosys === 'object') {
                    pinfosysDiv.innerHTML = `<div class="space-y-4">` + Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<div><h4 class="font-bold text-gray-900 mb-1">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700">${content}</div></div>`).join('') + `</div>`;
                } else if (pinfosysDiv) {
                     pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">${estateData.reports.pinfosys}</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            // Assuming estateData is available globally here based on architecture
            modalTitle.innerText = `Agricultural Policy Cross-Reference: Nuklias 6 Estate`;
            modalContent.innerHTML = `<div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> For areas with >5% fresh damage, baiting campaigns must be initiated immediately using approved rodenticides (e.g., flocoumafen).</p></div><div class='policy-item'><p class='font-semibold'>Nutrient Management</p><p class='text-sm text-gray-600'><b>Policy Ref: AGR-Nutrient-01:</b> Corrective manuring is required for blocks showing foliar deficiency (N/K) in consecutive rounds.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-03:</b> Harvesting intervals must not exceed 15 days to ensure optimal OER targets are met.</p></div>`;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
