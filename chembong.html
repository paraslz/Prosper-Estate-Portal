<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladang Chembong - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Chembong Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "chembong",
                "name": "Ladang Chembong",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: 13th April 2026) & PA Report 2/2025 (Dec 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Estate: 209.20 ha",
                            "Mature Planted: 121.97 ha",
                            "P90 (Deferred Replant): 36.99 ha",
                            "Solar Project Area: Pending"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Q1 2026)",
                        "value": "2.98 MT/ha",
                        "note": "+19.2% vs Q1 2025"
                    },
                    "manuring": {
                        "title": "Manuring Status",
                        "value": "Not Commenced",
                        "note": "2026 Program delayed (April '26)"
                    },
                    "labour": {
                        "title": "Labour Status",
                        "value": "Short 3 Harvesters",
                        "note": "Ratio 1:28 ha (Critical)"
                    },
                     "pests": {
                        "title": "P&D Status",
                        "value": "Ganoderma Risk",
                        "note": "Census & Deboling Pending"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Shortage", "value": "Critical (3 Vacancies)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Ganoderma (P02, P03)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Yield Trend", "value": "+19.2% (Q1 '26)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvest Rounds", "value": "92% of Target (Q1)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": ">15 Days (High)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Solar Project", "value": "Pending (P90)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [95.04, 97.12, 112.24, 124.97, 174.70, 179.29, 146.74, 146.74, 126.75, 135.84, 179.87, 108.25],
                        "rainfall": [80.0, 169.0, 249.0, 451.0, 250.0, 84.0, 49.0, 115.0, 161.0, 198.0, 448.0, 182.0],
                        "note": "*Historical data for full year 2025. Yield declined 9.6% overall in 2025."
                    },
                    "ageProfile": {
                        "labels": ["20-25 Years (P02, P03)", ">26 Years (P90)"],
                        "data": [84.98, 36.99],
                        "title": "Chembong Palm Age Distribution",
                        "note": "*69% of palms are 20-25 years old. (Agro Report 1/2026, Pg. 7)"
                    }
                },
                "observations": [
                    "<b>Persistent Harvester Shortage:</b> The estate continues to face a shortage of 3 harvesters. This manpower gap is keeping harvesting intervals above the 15-day limit, leading to overripe bunches in P02 and P03. <span class='observation-ref'>(Agro Report 1/2026, Pg. 11; PA Report 2/2025, Pg. 21)</span>",
                    "<b>Ganoderma Census Urgency:</b> Typical Ganoderma symptoms are present in old plantings (P02, P03). No census or deboling has been conducted despite previous advisories. Detailed census and sanitation (1.5m pits) are urgently required. <span class='observation-ref'>(Agro Report 1/2026, Pg. 18; PA Report 2/2025, Pg. 16)</span>",
                    "<b>Delayed 2026 Manuring:</b> As of April 2026, fertilizer application for the year has not commenced due to uncertainties surrounding the proposed solar project and diversion of applicators to other estates. <span class='observation-ref'>(Agro Report 1/2026, Pg. 4, 10)</span>",
                    "<b>P90 Replanting/Solar Uncertainty:</b> Replanting for P90 remains deferred pending a final decision on the Solar Panel project. Site visits were conducted in Jan 2026, but field P90 remains under-pruned and under-utilized. <span class='observation-ref'>(Agro Report 1/2026, Pg. 4, 13)</span>",
                    "<b>Improved Q1 2026 Yield:</b> Early 2026 yield (2.98 MT/ha) shows a 19.2% improvement over Q1 2025. However, crop recovery is still not maximized, with only 5.5 out of 6 rounds completed by March. <span class='observation-ref'>(Agro Report 1/2026, Pg. 20-21)</span>",
                    "<b>Overripe Bunches:</b> Evidence of harvesting delays was observed in P03, where >10% of fruit bunches at the platform were overripe. Loose fruit collection standards, however, remain acceptable. <span class='observation-ref'>(Agro Report 1/2026, Pg. 11-12)</span>"
                ],
                "reports": {
                    "plantation": { 
                        "Executive Summary": "Performance in late 2025 was critically impacted by a shortage of harvesters (3 vacancies), resulting in poor harvesting intervals (25 days) and low crop recovery. Yield YTD Nov was 17.7 MT/ha (-16% vs Budget). Block P90 (36.99 ha) remains abandoned with no decision on its future status. (Source: PA Report 2/2025, Pg. 21-24)",
                        "Area Statement": "Total Estate area is 209.20 ha. Mature Oil Palm covers 121.97 ha (P02: 12.58 ha, P03: 72.40 ha). Abandoned P90: 36.99 ha. Solar Project: 69.14 ha. (Source: PA Report 2/2025, Pg. 8)",
                        "Labour Statement": "Critical shortage. Harvesters: 3 available vs 6 required (Ratio 1:28 ha). Shortage of 3 workers. Management is liaising with HRD for recruits from Indonesia by Jan 2026. (Source: PA Report 2/2025, Pg. 9)",
                        "Staff Establishment": "Manager: Mr. Robin a/l Sinnappanah. Staffing is considered adequate. (Source: PA Report 2/2025, Pg. 10)",
                        "General Charges": "N/A",
                        "Upkeep and Cultivation": "Weeding conditions satisfactory but VOPs and Tetracera spots need removal. Manuring for 2025 was completed by early Dec. Pruning is delayed due to harvester shortage. (Source: PA Report 2/2025, Pg. 11-18)",
                        "Harvesting and Collection": "Intervals: ~25 days (Critical). Productivity: Low (1.96-2.04 MT/md). Rates: RM38/ton. High overripe bunches reducing weight. (Source: PA Report 2/2025, Pg. 19-23)",
                        "Crop Production": "YTD Nov 2025 Yield: 17.70 MT/ha (Budget: 20.05 MT/ha). Variance: -16%. Comparison 2024: -8%. (Source: PA Report 2/2025, Pg. 21)",
                        "Production Cost": "Harvesting rate: RM38/ton. Weeding: RM20/ha. Manuring: RM2.50/bag. Pruning: RM1.20/palm. (Source: PA Report 2/2025, Pg. 11-15, 22)",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "N/A"
                    },
                     "agronomy": { 
                        "Executive Summary": "<b>Overview:</b> Field conditions are generally acceptable, though 2025 yield performance saw a 9.6% decline. Replanting of Field P90 (36.99 ha) is further deferred pending a solar project decision; a site visit for this was conducted in Jan 2026. Current agronomic focus is on recovering from harvesting delays and managing the 2026 manuring start. (Source: Agro Report 1/2026, Pg. 4-6)",
                        "Nutrient Inputs/Progress of Manuring": "<b>2025 Performance:</b> 100% completion of the NK1 program (4 rounds: Jan, May, Aug, Nov) across P02 and P03. <b>2026 Progress:</b> No applications commenced as of March 2026. Delays attributed to solar project uncertainty and deployment of applicators for sub-soil work at Perhentian Tinggi. Management must proceed with Mixture A (scheduled for Feb) immediately. (Source: Agro Report 1/2026, Pg. 9-10)",
                        "Agronomic Observation": "<b>Harvesting:</b> Intervals in P02 and P03 frequently exceeded 15 days, with historical peaks of 25-26 days in Dec/Jan. Harvester shortfall stands at 3 men. Overripe bunches observed at P03 platforms (>10%). <b>Vegetation:</b> 2025 weeding 100% complete. 2026 inter-row weeding observed in progress in P02 during visit. <b>P&D:</b> Q1 2026 Rat Census recorded 5.31% (P02) and 6.90% (P03) damage; baiting not yet required. Ganoderma fruiting bodies present; deboling pits of 1.5m x 1.5m x 1.5m are recommended for infected points. <b>Pruning:</b> Standards acceptable in P02/P03; P90 is under-pruned. (Source: Agro Report 1/2026, Pg. 11-19)",
                        "Yield Performance": "<b>2025 Summary:</b> Yield dropped to 11.77 MT/ha (-9.6% vs 2024). P90 yield crashed by 71.5%. Total harvesting rounds in 2025 averaged only 10.2 rounds (42% of target). <b>2026 Trend:</b> Total yield YTD March is 2.98 MT/ha, a 19.2% increase compared to same period in 2025. Crop recovery is improving, reaching 92% of target rounds for Q1. (Source: Agro Report 1/2026, Pg. 20-21)",
                        "Fertilizer Recommendation": "<b>2026 Program:</b> Revised program for P02/P03 includes Mixture A at 2.00 kg/palm (Feb & Aug) and NK1 at 1.75 kg/palm (May). <b>Specifications:</b> NK1 (50% AS : 50% MOP); Mixture A (45% SOA : 40% MOP : 15% KIE). P90 is excluded from manuring. (Source: Agro Report 1/2026, Pg. 22-23)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-02:</b> Maximum harvesting interval must not exceed 15 days. Intervals >20 days trigger immediate mobilization of contract gangs.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Manuring') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 'bg-gray-100 text-gray-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-02:</b> Maximum harvesting interval must not exceed 15 days. Intervals >20 days trigger immediate mobilization of contract gangs.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Chembong';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
