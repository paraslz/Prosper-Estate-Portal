<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Cheroh - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Cheroh Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "cheroh",
                "name": "Ladang Cheroh",
                "reportInfo": "Agronomy Report: May 2026. (Plantation Advisory & Pinfosys: N/A)",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,197.89 ha",
                            "Prime (8-19 yrs): 556.40 ha",
                            "Immature: 209.47 ha",
                            "Replanting (2026): 146.10 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (2025)",
                        "value": "17.01 MT",
                        "note": "Down 3.1% from 2024. Jan-Apr '26: 5.11 MT"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne",
                        "value": "N/A",
                        "note": "Pending PA Report"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Present / Monitor",
                        "note": "Symptoms observed in P03 & P06"
                    },
                     "pests": {
                        "title": "Key Pests",
                        "value": "Oryctes & Apogonia",
                        "note": "Immature PR25. Rat damage < threshold."
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "N/A (Pending PA)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Monitor (Gano, Oryctes)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 4v16m8-8H4' /></svg>", "label": "Manuring Progress", "value": "2025: 54% (Delayed)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Weeding Progress", "value": "Behind Schedule" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "14-26 days (Prolonged)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Mild K/Mg Deficiency" }
                ],

                "chartData": {
                    "production": {
                        "labels": ["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25"],
                        "ffb": [661.91, 657.56, 990.96, 1279.40, 1355.21, 1388.27, 1607.92, 1539.15, 1463.40, 1702.11, 1640.80, 1866.95],
                        "rainfall": [217.0, 195.0, 169.5, 176.5, 231.0, 95.5, 48.5, 134.0, 290.0, 110.0, 395.5, 210.0],
                        "note": "*FFB production and rainfall data for Full Year 2025."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature)", "8-15 & 16-19 Years (Prime)", "20-25 Years (Old)", ">26 Years (Very Old)"],
                        "data": [355.57, 556.40, 247.77, 29.95], 
                        "title": "Ladang Cheroh - Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 10."
                    }
                },

                "observations": [
                    "<b>Poor Manuring Progress (2025):</b> The estate achieved only 54% completion of the 2025 fertilizer program due to labour turnover and delays in fertilizer deliveries. As of April 2026, 37% of the revised program is completed. <span class='observation-ref'>(Agronomy Report, Pg. 4, 13-14)</span>",
                    "<b>Prolonged Harvesting Intervals:</b> Intervals ranged from 14 to 26 days in 2025, leading to suboptimal crop recovery, over-ripe bunches, and excessive loose fruits. Improvements were seen in early 2026, but older blocks still face delays. <span class='observation-ref'>(Agronomy Report, Pg. 4, 18-19)</span>",
                    "<b>Ganoderma Infection & Pests:</b> Symptoms of Ganoderma (fruiting bodies, unopened spears) were identified in P03 and P06 requiring deboling. Meanwhile, rat damage is below threshold, but Oryctes and Apogonia were observed in immature PR25. <span class='observation-ref'>(Agronomy Report, Pg. 5, 36, 39)</span>",
                    "<b>Suboptimal Weeding:</b> Weeding progress is behind schedule. Only one round of inter-row weeding was completed in 2025. Broadleaf weeds and large VOPs were spotted in Blocks P03 and P05. <span class='observation-ref'>(Agronomy Report, Pg. 5, 28-29)</span>",
                    "<b>Immature Area Issues:</b> Immature plantings in PR23/PR25 suffer from uneven palm stands due to delayed supplying, cattle intrusion (requiring fencing), and pest infestations. <span class='observation-ref'>(Agronomy Report, Pg. 6, 37-40)</span>",
                    "<b>Replanting & Yield Drop:</b> Estate yield declined 3.1% in 2025 (to 17.01 MT/ha). Replanting of very old P96C and P97D (146.10 ha) into PR26 is underway, with felling and chipping completed by April 2026. <span class='observation-ref'>(Agronomy Report, Pg. 7, 45, 48)</span>"
                ],

                "reports": {
                    "plantation": {
                        "Executive Summary": "N/A",
                        "Area Statement": "N/A",
                        "Labour Statement": "N/A",
                        "Staff Establishment": "N/A",
                        "General Charges": "N/A",
                        "Upkeep & Cultivation": "N/A",
                        "Harvesting and Collection": "N/A",
                        "Crop Production": "N/A",
                        "Production Cost": "N/A",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "N/A"
                    },
                    "agronomy": {
                        "Executive Summary": "The estate faced operational challenges in 2025, notably a poor manuring completion rate (54%) and extended harvesting intervals (up to 26 days), leading to a 3.1% yield decline. However, early 2026 shows yield recovery (+39.22% YoY). Action is needed for Ganoderma in P03/P06 and pest/cattle issues in immature areas. (Source: AR, Pg. 4-7, 48)",
                        "Nutrient Inputs / Progress of Manuring": "The 2025 fertilizer program was severely delayed, achieving only 54% completion due to labour turnover and supplier delivery issues. By April 2026, 37% of the revised program was complete. Mixture A was fully applied. Fertilizer application quality and storage were assessed as acceptable. (Source: AR, Pg. 13-14)",
                        "Agronomic Observation": "Harvesting intervals were prolonged (14-26 days) in 2025 but showed improvement by April 2026. Progressive pruning was 100% completed in prime mature blocks. Mild Potassium and Magnesium deficiencies were localized in P14O2 and P13N. Weeding is behind schedule (only 1 round inter-row in 2025), though field conditions remain manageable. (Source: AR, Pg. 18-29)",
                        "Yield Performance": "The 2025 yield was recorded at 17.01 MT/ha (down 3.1% from 2024). Crop recovery was suboptimal, averaging only 16 harvesting rounds for the year. Conversely, the first four months of 2026 saw a significant 39.22% yield increase to 5.11 MT/ha compared to the same period prior. (Source: AR, Pg. 48-50)",
                        "Fertilizer Recommendation": "The 2026 program has been heavily revised in response to fertilizer price hikes and limited stock availability. NK1, Mixture A, Mixture B, and RP programs are outlined in the appendices. (Source: AR, Pg. 52-54)"
                    },
                    "pinfosys": {
                        "CEO Financial Summary": "N/A",
                        "Summary of Oil Palm Expenditure": "N/A"
                    }
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Fertilizer Application Compliance</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays (such as the 54% completion rate in 2025) must be reported with a mitigation plan involving contractor aid or supplier re-negotiation.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must not exceed 15 days to prevent over-ripe bunches and minimize loose fruits. Intervals reaching 26 days trigger mandatory labor reassignment.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For identified Ganoderma infected palms (e.g., in P03 & P06), implement immediate sanitation by de-boling. Create a 1.5m x 1.5m x 1.5m pit and allow sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Immature Area Pest Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-ORY-01:</b> Foliar insecticide applications must be carried out on a biweekly basis for Oryctes rhinoceros control until the infestation level decreases below the 10% threshold.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mb-2">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mb-2">${content}</p>`).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys) {
                    pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section}:</h4><p class="text-sm text-gray-600 mb-2">${content}</p>`).join('');
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Fertilizer Application Compliance</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays (such as the 54% completion rate in 2025) must be reported with a mitigation plan involving contractor aid or supplier re-negotiation.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Intervals</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-INT-01:</b> Harvesting intervals must not exceed 15 days to prevent over-ripe bunches and minimize loose fruits. Intervals reaching 26 days trigger mandatory labor reassignment.</p></div> <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For identified Ganoderma infected palms (e.g., in P03 & P06), implement immediate sanitation by de-boling. Create a 1.5m x 1.5m x 1.5m pit and allow sun exposure before refilling.</p></div> <div class='policy-item'><p class='font-semibold'>Immature Area Pest Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-ORY-01:</b> Foliar insecticide applications must be carried out on a biweekly basis for Oryctes rhinoceros control until the infestation level decreases below the 10% threshold.</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Cheroh';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
