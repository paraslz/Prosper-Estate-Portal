<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Cheroh - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Cheroh Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "cheroh",
                "name": "Ladang Cheroh",
                "reportInfo": "Data based on PA Report 1/2026 (Jan 2026) & Agronomy Report 1/2026 (May 2026). Pinfosys report pending.",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 1,197.89 ha",
                            "Mature: 842.32 ha",
                            "Immature: 209.47 ha",
                            "Replanting: 146.10 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "16.80 / 22.80 MT",
                        "note": "Full Year 2025"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "N/A",
                        "note": "Data pending Pinfosys Report"
                    },
                    "weeding": {
                        "title": "Weeding Progress",
                        "value": "1 Round Completed",
                        "note": "Delayed due to weather & labour"
                    },
                     "manuring": {
                        "title": "Manuring Progress",
                        "value": "37% Completed",
                        "note": "As of April 2026"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:17 ha (Shortage)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Mod (Ganoderma, Oryctes)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "N/A" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "Low (New Workers)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "14-26 days (Prolonged)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Mild K/Mg Deficiencies" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb2025": [661.91, 657.56, 990.96, 1279.40, 1355.21, 1388.27, 1607.92, 1539.15, 1463.40, 1702.11, 1640.80, 1866.95],
                        "ffb2026": [1491.59, 1051.12, 1116.66, 1345.69, null, null, null, null, null, null, null, null],
                        "rainfall": [217.0, 195.0, 169.5, 176.5, 231.0, 95.5, 48.5, 134.0, 290.0, 110.0, 395.5, 210.0],
                        "note": "*Monthly FFB production (2025 vs 2026) and 2025 Rainfall distribution."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature)", "4-7 Years (Young Mature)", "8-19 Years (Prime)", "20-25 Years (Old)", ">26 Years (Old)"],
                        "data": [30, 0, 47, 21, 3],
                        "title": "Ladang Cheroh - Palm Age Distribution (2026)",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 10."
                    }
                },
                "observations": [
                    "<b>Critical Labour Shortage & Delayed Field Upkeep:</b> A high worker turnover is a severe issue impacting weeding and manuring. The 2025 fertilizer program was only 54% complete, and harvesting intervals are extended (14-26 days). <span class='observation-ref'>(PAR Pg. 11-12; AR Pg. 13, 18)</span>",
                    "<b>Crop Production & Yield Volatility:</b> 2025 yield declined to 16.80 MT/ha (down 3.1% from 2024), affected by harvester shortage and delayed manuring. However, Jan-Apr 2026 shows a strong 39.2% recovery vs the same period last year. <span class='observation-ref'>(PAR Pg. 32; AR Pg. 48-49)</span>",
                    "<b>Ganoderma & Nutrient Deficiencies:</b> Ganoderma fruiting bodies and unopened spears were observed in P03 and P06 requiring immediate sanitation. Mild Potassium and Magnesium deficiencies were also spotted in P14O2 and P13N, for which Kieserite was applied in March. <span class='observation-ref'>(PAR Pg. 23; AR Pg. 27, 36)</span>",
                    "<b>Pest & Cattle Intrusion in Immature Areas:</b> Oryctes beetles and Apogonia are affecting PR25. Cattle intrusion continues in PR25 despite previous severe damage in PR23. A Rhinoceros Beetle census and fencing are urgently needed. <span class='observation-ref'>(PAR Pg. 23-24; AR Pg. 39-40)</span>",
                    "<b>Replanting & Immature Stand Status:</b> P96C & P97D (146.10 ha) felling and chipping are completed; terracing is in progress. PR24 shows low palm density (54 SPH) requiring urgent infilling to reach target stands. <span class='observation-ref'>(PAR Pg. 8; AR Pg. 11, 45)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The main issue in this estate is high worker turnover, which has resulted in severe delays across harvesting, weeding, and manuring work. The labour shortage requires an effective, long-term retention strategy from management. (PA Report, Pg. 42-43)",
                        "Area Statement": "Total planted area is **1,197.89 ha**. This comprises: <br>• <b>Mature:</b> 980.22 ha.<br>• <b>Immature:</b> 106.33 ha (PR23). Maturity delayed to 2027 due to severe cattle damage.<br>• <b>Replanting:</b> 111.34 ha (PR24/25). Felling and chipping commenced early Jan 2026. (PA Report, Pg. 8-9)",
                        "Labour Statement": "Current workforce is 66 workers vs requirement of 75 (Ratio 1:17 ha). <br>• <b>Harvesters:</b> 46 (Ratio 1:21 ha). Considered adequate for the remaining mature areas post-felling.<br>• <b>Sprayers:</b> Short by 8 workers. This is a critical shortage directly impacting upkeep.<br>• <b>Manuring:</b> 4 workers. (PA Report, Pg. 11-12)",
                        "Staff Establishment": "The staff establishment is adequate, comprising the Manager, 1 Assistant Manager, 1 Jr. Assistant, 2 Field Supervisors, and 2 Clerks. The estate is currently short of 1 Field Supervisor for manuring. (PA Report, Pg. 13-14)",
                        "General Charges": "N/A",
                        "Upkeep and Cultivation": "• <b>Weeding:</b> Circle spraying is only 46% complete (1338 ha). Selective spraying is 30% complete (893 ha) due to sprayer shortages and rain.<br>• <b>Manuring:</b> Only 39% complete for mature areas. Highly delayed program.<br>• <b>Pest & Disease:</b> Sporadic Ganoderma detected at older plantings. Stray cattle intruding. (PA Report, Pg. 15-24)",
                        "Harvesting and Collection": "• <b>Interval:</b> Averaged 16 days.<br>• <b>Rounds:</b> 13 rounds achieved versus 24 rounds budgeted.<br>• <b>Productivity:</b> Outturn is 90%, but harvester productivity is low as a lot of harvesters are new and require training. (PA Report, Pg. 33-35)",
                        "Crop Production": "2025 Full Year FFB Production is **16,153.64 MT**, which is 28% below the budget.<br>• <b>Yield/Ha:</b> 16.48 MT/ha (Budget: 22.8 MT/ha).<br>• <b>Extraction:</b> N/A. (PA Report, Pg. 32)",
                        "Production Cost": "N/A",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "• <b>PR23 (106.33 ha):</b> Circle spraying 75% complete, Selective 25% complete. Manuring 64% achieved due to worker shortage. Supplying still in progress.<br>• <b>PR24 (111.34 ha):</b> Circle spraying 83% complete, Selective 50% complete. Palm planting was completed in October 2025. (PA Report, Pg. 36-40)"
                    },
                    "agronomy": {
                        "Executive Summary": "Estate yield declined by 3.1% in 2025 due to suboptimal crop recovery and insufficient harvesting rounds (intervals extended to 14-26 days). However, performance rebounded significantly in early 2026 (+39.22% YTD). Fertilizer management struggled in 2025 (54% completed) but shows improved traction in 2026 (37% YTD). Weeds are manageable despite program delays. (Source: AR, Pg. 4-7)",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 fertilizer program achieved only 54% completion due to labour turnover and supplier delays. As of April 2026, 37% of the revised 2026 program is completed, with Mixture A 100% applied. Field application quality and worker productivity (22-23 bags/man-day) were acceptable. (Source: AR, Pg. 13-14)",
                        "Agronomic Observation": "Harvesting intervals are prolonged (14-26 days), causing over-ripe bunches. Progressive pruning in prime mature blocks is 100% completed. Ganoderma symptoms were detected in P03 and P06. Rat infestation remains below the economic threshold. Mild leaf potassium and magnesium deficiencies were seen in localized areas (P14O2 and P13N). (Source: AR, Pg. 18-36)",
                        "Yield Performance": "Total FFB for 2025 was 16,153.64 MT (16.80 MT/ha). During the first four months of 2026, the estate produced 5,005.06 MT, an encouraging 39.22% increase over the same period in 2025, though harvesting intervals must be tightened to 15 days to maximize recovery. (Source: AR, Pg. 48-51)",
                        "Fertilizer Recommendation (2026)": "The 2026 fertilizer program has been fully revised in response to the hike in fertilizer prices and limited stock. Prime areas are prescribed NK1, Mix A, and Mix B, while new plantings will utilize Compound A and Rock Phosphate. (Source: AR, Pg. 52-54)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Cattle Intrusion Management</p><p class='text-sm text-gray-600'><b>Policy Ref: SEC-Cattle-01:</b> Estates prone to cattle intrusion must establish trenches (desilting) and maintain fencing. Cattle traps must be constructed at the entrance to all new replants.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div> <div class='policy-item'><p class='font-semibold'>Spraying Productivity Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-SPRAY-02:</b> Minimum productivity standard for selective spraying using Mist Blowers is set at 5-6 ha/man-day (minimum 11 pumps/man-day equivalent to 7 hours worked).</p></div>"
            };


            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') || metric.title.includes('Manuring') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025/2026)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: '2025 FFB (MT)', data: estateData.chartData.production.ffb2025, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: '2026 FFB (MT)', data: estateData.chartData.production.ffb2026, type: 'line', borderColor: '#16a34a', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: '2025 Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy && estateData.reports.agronomy !== "Not Available") {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">N/A (Report Pending)</p>`;
                }

                if (plantationDiv && estateData.reports.plantation && estateData.reports.plantation !== "Not Available") {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">N/A (Report Pending)</p>`;
                }

                if (pinfosysDiv && (estateData.reports.pinfosys === "Not Available" || !estateData.reports.pinfosys)) {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">N/A (Report Pending)</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Cattle Intrusion Management</p><p class='text-sm text-gray-600'><b>Policy Ref: SEC-Cattle-01:</b> Estates prone to cattle intrusion must establish trenches (desilting) and maintain fencing. Cattle traps must be constructed at the entrance to all new replants.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div> <div class='policy-item'><p class='font-semibold'>Spraying Productivity Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: WEED-SPRAY-02:</b> Minimum productivity standard for selective spraying using Mist Blowers is set at 5-6 ha/man-day (minimum 11 pumps/man-day equivalent to 7 hours worked).</p></div>`;
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Cheroh';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
