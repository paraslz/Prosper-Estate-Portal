<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Perhentian Tinggi - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Perhentian Tinggi Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->

                "observations": [
                    "<b>FFB Yield Shortfall &amp; Harvesting Constraints:</b> The estate achieved a yield of $18.80\\text{ MT/ha}$ in 2025, which is 8% below the budgeted target of $20.41\\text{ MT/ha}$ <span class='observation-ref'>(PAR Pg. 32)</span>. This yield gap was primarily driven by harvester shortages in the first half of the year, alongside a low cropping season <span class='observation-ref'>(PAR Pg. 32)</span>. While the overall harvesting interval averaged 16 days, operations were frequently disrupted by rain, and the average working hours for harvesters were limited to 5-6 hours per day, resulting in suboptimal labor productivity <span class='observation-ref'>(PAR Pg. 30-31)</span>. In contrast, Q1 2026 yields have declined slightly (-2%) due to harvesting delays exceeding 20 days and a shortage of 4 harvesters <span class='observation-ref'>(AR Pg. 4, 14)</span>.",

                    "<b>Widespread Ganoderma Infection &amp; Deboling Demands:</b> Extensive Ganoderma infections have been observed in older plantings, specifically blocks P05H, P01G, and P95F, which are experiencing visible basidiocarps and root rot <span class='observation-ref'>(PAR Pg. 23, 25)</span>. The advisor strongly urged the estate to establish a systematic census and initiate deboling operations of fallen palms in blocks not scheduled for replanting within the next 2 years to check disease spread <span class='observation-ref'>(PAR Pg. 5, 23)</span>.",

                    "<b>Immature Area and Replanting Execution:</b> Block P93/E2 (34 ha) replanting was postponed to 2027 with maintenance suspended, leaving it weedy with unpruned palms <span class='observation-ref'>(PAR Pg. 10)</span>. For PR24C (43 ha), crop circles are satisfactory, but selective weeding is at 79% completion <span class='observation-ref'>(PAR Pg. 38-39)</span>. The PR25D (60 ha) replant was completed in February 2026, though cover crops are still in progress, and the presence of volunteer oil palms (VOPs) requires urgent blanket spraying to prevent resource competition <span class='observation-ref'>(PAR Pg. 6, 43)</span>."
                ],
                "reports": {

                        "Executive Summary": "The estate's performance was affected by crop shortfalls and significant cost overruns. YTD FFB production (11,489.06 MT) was 8% below budget due to early-year harvester shortages (PAR Pg. 32). Total ex-estate cost of production surged to RM 309.39/tonne, which is 30.3% over budget (PAR Pg. 35). A critical deficit of 4 sprayers is impacting weeding operations, while harvester and sprayer productivity remains low (PAR Pg. 12, 17, 31). Focus must remain on managing extensive Ganoderma infections, enhancing road compaction, and eradicating remaining volunteer oil palms (VOPs) (PAR Pg. 5, 20).",

                        "Harvesting and Collection": "Total harvesting costs were RM 868,498.08 (RM 75.59/tonne FFB), which is slightly higher than the budget of RM 73.16/tonne due to top-up wage adjustments for new cutters (PAR Pg. 30).<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Operations:</b> 23 harvesting rounds were achieved YTD against a budget of 24, with intervals averaging 16 days. Cutter outturn was satisfactory at 93%.</li><li><b>Mechanization:</b> In-field FFB evacuation utilized 4 units of Mini Dumpers (configured with 2 cutters and 1 collector per dumper) in designated blocks, with manual wheelbarrows handling the remainder of the estate.</li><li><b>Productivity:</b> Harvesters' output was low (averaging 1.15 to 2.38 tons/md), primarily because cutters worked only 5-6 hours per day. Management must encourage cutters to work 9 hours to raise output and earnings (PAR Pg. 31).</li></ul>(PAR Pg. 30-31)",
                        "Crop Production": "Mature FFB production reached 11,489.06 MT, representing an 8% shortfall against the budget of 12,471.00 MT (PAR Pg. 32).<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Yield/Ha:</b> Yield achieved was 18.80 MT/ha (an improvement of 6% over 2024's yield of 17.69 MT/ha), primarily held back by early-year harvester shortages.</li><li><b>Extraction Rates:</b> Mill OER and KER extraction rates stayed flat at 19.00% and 4.00% respectively.</li><li><b>Crop Trend:</b> The estate is experiencing a low cropping cycle, though P18 displays strong crop load and fruit sets (PAR Pg. 32, 34).</li></ul>(PAR Pg. 32)",
                        "Production Cost": "Total operational cost of production was RM 3,554,657.18, resulting in RM 309.39/tonne FFB against a budget of RM 237.49/tonne (30.3% over budget) (PAR Pg. 35).<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>General Charges:</b> Stood at RM 140.27/tonne (+76% above RM 79.70/tonne budget) due to lower crop tonnage and administrative overruns.</li><li><b>Upkeep Cost:</b> Upkeep costs accounted for RM 93.53/tonne FFB (Actual) vs RM 84.63/tonne (Budget).</li><li><b>Harvesting Cost:</b> Stood at RM 75.59/tonne FFB vs RM 73.16/tonne (Budget).</li></ul>(PAR Pg. 35)",
                        "Vehicles Running Cost": "Vehicle operational expenditures were acceptable and within budget. Hilux KEH 8191 (Manager's utility truck) completed 20,000 km against a budget of 21,290 km, with total expenses of RM 8,721.80 against a budgeted RM 17,952.00, achieving a satisfactory running cost of RM 0.44/km (PAR Pg. 36).",
                        "Capital Expenditure": "No capital work was carried out in 2025. Total Capital Expenditure was RM 0.00 against a budget of RM 80,000.00 allocated for building, welfare, and utility upgrades (PAR Pg. 37).",
                        "Immature": "Total upkeep cost for immature block PR24C (43 ha) was RM 99,425.00 (RM 2,312/ha), which is 22.8% below the budget of RM 128,797.00 (PAR Pg. 38). Upkeep for PR25D (60 ha) was RM 96,037.00 (PAR Pg. 42).<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Weeding & Upkeep (PR24C):</b> Circle weeding (258 ha, 6 rounds) is complete and circles are clean. Selective inter-row spraying (204 ha, 5 rounds) is satisfactory, with cover crops establishing well and wild bananas eradicated (PAR Pg. 39). Oryctes control is active (12 Cypermethrin rounds applied), and beetle damage is minimal (PAR Pg. 41).</li><li><b>Upkeep & Planting (PR25D - 60 ha):</b> Palm planting commenced and was successfully completed in February 2026 (PAR Pg. 6, 43). Blanket weed spraying was done in June and September 2025, but a high presence of volunteer oil palms (VOPs) remains and requires urgent eradication (PAR Pg. 43). Cover crop establishment is in progress, and applying EFB mulching is highly recommended to improve the lateritic soil structure (PAR Pg. 43-44).</li></ul>(PAR Pg. 38-44)"
                    },

                        "Agronomic Observation": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Harvesting:</b> Intervals exceed 20 days in most fields; overripe bunches noted. Currently experiencing a shortage of 4 harvesters.</li><li><b>Pruning:</b> Progressive pruning completed for 2025 (except P93E2). 3 rounds completed for 2026 with satisfactory quality.</li><li><b>Weeding:</b> Circle weeding is complete in P13A1 and P95F. P93E2 is severely overgrown due to suspended maintenance.</li><li><b>Pest & Disease:</b> High rat infestation in P18B and P13A3 (no 2026 census yet). Minor localized bagworm in P13/P05. Ganoderma is widespread in older blocks.</li></ul>(AR 1/2026, Pg. 14-29)",

                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>"
            };


            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-4 text-gray-700 mt-4 leading-relaxed">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-3">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-medium">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-medium font-medium">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition font-medium">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200 shadow-inner"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-900 border-b pb-1 mb-2 text-md">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1 mb-4 leading-relaxed">${content}</div>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-900 border-b pb-1 mb-2 text-md">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1 mb-4 leading-relaxed">${content}</div>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>`;
            
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Perhentian Tinggi';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
