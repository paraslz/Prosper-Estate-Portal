<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Perhentian Tinggi - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Perhentian Tinggi Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <!-- Container where the estate data will be rendered -->
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "perhentiantinggi",
                "name": "Ladang Perhentian Tinggi",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: April 2026) & PA Report 2/2025.",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 714.00 ha",
                            "Mature: 611.00 ha",
                            "Immature: 103.00 ha",
                            "Replanting 2026: 34.00 ha (Pending)"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Full Year 2025)",
                        "value": "18.80 MT",
                        "note": "Q1 2026: 4.06 MT/ha"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne",
                        "value": "N/A",
                        "note": "Not available in PA Report 2/2025"
                    },
                    "ganoderma": {
                        "title": "Ganoderma Status",
                        "value": "Extensive",
                        "note": "Infection in old plantings (P01G, P95F)"
                    },
                     "pests": {
                        "title": "Key Pests",
                        "value": "Rats & Bagworms",
                        "note": "High rat infestation in P18B, P13A3"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:15 ha (Adequate)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "High (Rats & Ganoderma)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (2025)", "value": "N/A" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "Shortage of 4 Harvesters" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": ">20 Days (Delayed)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "20% Completed (Mar '26)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [718.33, 648.83, 1154.61, 810.11, 1163.25, 1132.40, 1135.02, 1239.48, 1136.18, 868.95, 996.04, 599.48],
                        "rainfall": [83.50, 148.50, 185.00, 497.10, 196.40, 111.50, 43.50, 148.00, 266.00, 194.00, 386.00, 221.50],
                        "note": "*FFB production (MT) and rainfall (mm) data for 2025."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Years (Immature)", "4-7 Years (Young Mature)", "8-19 Years (Prime)", "20-25 Years (Old)", ">26 Years (Old)"],
                        "data": [108.0, 0.0, 239.0, 288.0, 84.0],
                        "title": "Perhentian Tinggi Palm Age Distribution",
                        "note": "*Source: Agronomy Report 1/2026, Pg. 8."
                    }
                },
                "observations": [
                    "<b>Delayed Harvesting & Crop Loss:</b> Harvesting intervals exceeded 20 days in Q1 2026 due to persistent rainfall and a shortage of 4 harvesters. Incomplete crop recovery and overripe bunches were observed, notably in P93E2 which is severely weedy. <span class='observation-ref'>(AR 1/2026, Pg. 14-15; PA Report 2-2025, Pg. 30)</span>",
                    "<b>High Rat Infestation:</b> Significant rat damage was recorded heavily in P18B and P13A3 during late 2025. Continuous quarterly monitoring and baiting are urgently required as no census has been done for Q1 2026. <span class='observation-ref'>(AR 1/2026, Pg. 5, 27)</span>",
                    "<b>Ganoderma Infection:</b> Typical Ganoderma infection symptoms were observed extensively in old plantings, particularly in P95F, P01G, and P05H. Immediate census and field sanitation via deboling are strongly advised. <span class='observation-ref'>(AR 1/2026, Pg. 5, 29; PA Report 2-2025, Pg. 22-23)</span>",
                    "<b>Labour Shortage Impact on Upkeep:</b> A critical shortage of 4 sprayers is directly affecting the upkeep of immature areas. Maintenance activities in P93E2 have been suspended pending replanting, leaving it overgrown. <span class='observation-ref'>(PA Report 2-2025, Pg. 11; AR 1/2026, Pg. 14, 21)</span>",
                    "<b>Immature Area Establishment:</b> PR24C (43ha) shows acceptable palm vigour, but the establishment of Mucuna bracteata is below expectations, with soft grasses dominating the inter-rows. <span class='observation-ref'>(AR 1/2026, Pg. 31-32; PA Report 2-2025, Pg. 34)</span>",
                    "<b>Replanting Progress:</b> The replanting of PR25D (60ha) is progressing well with satisfactory palm vigour. However, the current planting density (125 SPH) requires additional supplying to reach the recommended 136-148 SPH. <span class='observation-ref'>(AR 1/2026, Pg. 9, 35)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate faces a critical shortage of 4 sprayers, impacting immature area upkeep. While harvester numbers (31) were previously adequate, management must ensure high productivity to retain them. Monitoring of chemical usage is required. P&D focus must remain on Bagworm surveillance and Ganoderma deboling. (PA Report 2-2025, Pg. 40-41)",
                        "Area Statement": "Total Estate area is 736 ha. Total Oil Palm area is 714 ha.<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Mature:</b> 611 ha.</li><li><b>Immature:</b> 103 ha (PR24-C: 43 ha, PR25-D: 60 ha).</li><li><b>Replanting:</b> Block P93/E2 is scheduled for replanting in 2026.</li></ul>(PA Report 2-2025, Pg. 9)",
                        "Labour Statement": "Total Workforce is 48 (Required: 53). Overall ratio is 1:15 ha (acceptable).<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Harvesters:</b> 31 (Adequate previously, Ratio 1:20 ha).</li><li><b>Sprayers:</b> 4 (Required: 8) - Critical shortage.</li><li><b>Manuring:</b> 4 (Required: 5).</li></ul>(PA Report 2-2025, Pg. 11)",
                        "Staff Establishment": "Staff establishment is adequate. Manager: Mr. Robin A/L Sinnappanah. Assistant Managers: En. Zulfakar and En. Muhamad Amirul. (PA Report 2-2025, Pg. 12)",
                        "General Charges": "N/A",
                        "Upkeep and Cultivation": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Circle Spraying:</b> 96% completed. Productivity improved to 4.5 ha/md in Q4. Excessive Ally usage noted.</li><li><b>Selective Spraying:</b> 100% completed. Low productivity (2.7-3.5 ha/md).</li><li><b>Manuring:</b> 98% completed (2025). Wheelbarrow application satisfactory (27 bags/md).</li><li><b>P&D:</b> Old bagworm infestations in P13/P18. Ganoderma extensive in P95/F. Stray cattle issues persist.</li></ul>(PA Report 2-2025, Pg. 13-29)",
                        "Harvesting and Collection": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Yield:</b> YTD Nov 2025 was 17.75 t/ha (-6% vs Budget). Shortfall linked to tall palms in P95/F.</li><li><b>Operations:</b> Intervals extended due to rain. Harvester outturn at 89%.</li><li><b>Productivity:</b> P95/F low (1.35 t/md); P13-A high (2.25 t/md).</li></ul>(PA Report 2-2025, Pg. 30-33)",
                        "Crop Production": "YTD Nov 2025 Yield: 17.75 t/ha vs Budget 18.94 t/ha. Performance was 4% better than 2024. P13A1 was the highest yielding block (21.39 t/ha), while P93E-2 was lowest (7.20 t/ha). (PA Report 2-2025, Pg. 30)",
                        "Production Cost": "N/A",
                        "Vehicles Running Cost": "N/A",
                        "Capital Expenditure": "N/A",
                        "Immature": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>PR24-C (43 ha):</b> 83% circle sprayed. Issues with wild bananas, Lalang, and regenerated woodies. Oryctes control active.</li><li><b>PR25-D (60 ha):</b> Cover crop 40ha planted. Palm planting commenced Dec 2025. Emerging VOPs require spraying.</li></ul>(PA Report 2-2025, Pg. 34-39)"
                    },
                    "agronomy": {
                        "Executive Summary": "Fertilizer application for 2025 was fully completed, and 20% of the 2026 programme has been applied. Yield performance in 2025 saw a 4% improvement (18.80 MT/ha). However, Q1 2026 yields have declined slightly (-2%) due to significant harvesting delays (>20 days interval) and incomplete crop recovery caused by persistent rain and harvester shortages. Focus must remain on managing Ganoderma and rat infestations. (AR 1/2026, Pg. 4-6)",
                        "Nutrient Inputs & Progress Of Manuring": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>2025 Programme:</b> 100% completed, though sub-surface application of Mixture A in P01G experienced a 4-month delay.</li><li><b>2026 Programme:</b> Commenced with 20% completion as of March 2026. Subsoil application quality observed in P01G was acceptable with an output of 15 bags/worker.</li></ul>(AR 1/2026, Pg. 10-12)",
                        "Agronomic Observation": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>Harvesting:</b> Intervals exceed 20 days in most fields; overripe bunches noted. Currently experiencing a shortage of 4 harvesters.</li><li><b>Pruning:</b> Progressive pruning completed for 2025 (except P93E2). 3 rounds completed for 2026 with satisfactory quality.</li><li><b>Weeding:</b> Circle weeding is complete in P13A1 and P95F. P93E2 is severely overgrown due to suspended maintenance.</li><li><b>Pest & Disease:</b> High rat infestation in P18B and P13A3 (no 2026 census yet). Minor localized bagworm in P13/P05. Ganoderma is widespread in older blocks.</li></ul>(AR 1/2026, Pg. 14-29)",
                        "Yield Performance": "<ul class='list-disc pl-5 mt-1 space-y-1 mb-2'><li><b>2025 Yield:</b> 18.80 MT/ha, a 4% surplus against 2024. Highest yield was in P13A1 (22.82 MT/ha), lowest in P93E (7.30 MT/ha).</li><li><b>2026 Q1 Yield:</b> 4.06 MT/ha, which is 2% lower than the same period in 2025, heavily dragged by incomplete recovery in P93E (-92%).</li></ul>(AR 1/2026, Pg. 37-38)",
                        "Fertilizer Recommendation": "A revised programme for 2026 has been provided for mature areas (Mixture A, B, NK2, Kieserite). P95F is omitted as it is scheduled for replanting in 2027. For immature areas, Compound 25 and RP are recommended. New transplants should receive 600g CRF and 500g RP per hole. (AR 1/2026, Pg. 40-42)"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": " <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-EFB-01:</b> EFB mulching should be prioritized in areas with low organic matter or high Ganoderma incidence as per budget.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>"
            };


            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Ganoderma') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-900">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1">${content}</div>`).join('');
                } else if (agronomyDiv) {
                    agronomyDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-900">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-700 mt-1">${content}</div>`).join('');
                } else if (plantationDiv) {
                    plantationDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            // Grabbing policy from the existing estateData scope embedded above (simulated using standard FEHB policy references matching the idealestate model)
            const policyData = ` <div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> For areas with >15% infection, implement sanitation by de-boling and creating a 1.5m x 1.5m x 1.5m pit. Allow 2-3 months of sun exposure before refilling.</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-GML-03:</b> On alternate years in high-risk Ganoderma blocks, apply GML to raise soil pH above 6.0.</p></div> <div class='policy-item'><p class='font-semibold'>Rat Infestation</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> If post-baiting census still indicates damage >10%, a second round of baiting must be conducted within 30 days.</p></div> <div class='policy-item'><p class='font-semibold'>Manuring & Fertilizing</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> All fertilizer applications must be completed according to the schedule. Any delays beyond 15 days must be reported with a mitigation plan.</p></div> <div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-FROND-04:</b> In palms younger than 8 years, a minimum of 2 subtending fronds must be retained below the lowest bunch to prevent over-pruning.</p></div>`;
            
            modalTitle.innerText = 'Agricultural Policy Cross-Reference: Ladang Perhentian Tinggi';
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
