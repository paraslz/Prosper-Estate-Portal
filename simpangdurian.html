<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Simpang Durian Estate - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Simpang Durian Estate Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "simpangdurian",
                "name": "Ladang Simpang Durian",
                "reportInfo": "Data based on Agronomy Report 1/2026 (Visit: 25th Feb 2026) & Plantation Advisory Report 1/2026 (Visit: 20th Apr 2026).",
                
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 308.82 ha",
                            "Mature: 242.08 ha",
                            "Immature (PR26): 66.74 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "25.19 / 20.25 MT",
                        "note": "Running 12-Month vs 2026 Annual Budget (PAR Pg. 31)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne",
                        "value": "N/A",
                        "note": "Cost data not detailed in current PAR 1/2026."
                    },
                    "manuring": {
                        "title": "Manuring Progress",
                        "value": "40% (1H 2026 Program)",
                        "note": "64.26 mt applied. Mix A delayed by delivery. (PAR Pg. 18)"
                    },
                    "weeding": {
                        "title": "Weeding Status",
                        "value": "Satisfactory",
                        "note": "Circle & selective spraying ahead of schedule. (PAR Pg. 15)"
                    }
                },
                "keyMetrics": [
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>`, "label": "10-Mo Rainfall Deficit", "value": "740.0 mm (93 days)" },
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>`, "label": "Labour to Land Ratio", "value": "1 worker : 12 ha" },
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`, "label": "P&D Threshold", "value": "Rats Under Control" },
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`, "label": "YTD Yield (Jan-Apr 26)", "value": "6.43 MT/ha" },
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>`, "label": "Harvest Interval", "value": "15 Days" },
                    { "icon": `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-teal-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z" /></svg>`, "label": "Old Mature Canopy", "value": "55.68% Over 18 Years" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jul 25", "Aug 25", "Sep 25", "Oct 25", "Nov 25", "Dec 25", "Jan 26", "Feb 26", "Mar 26", "Apr 26"],
                        "ffb": [575.45, 605.38, 542.86, 519.16, 487.08, 505.88, 343.06, 332.44, 366.75, 513.78],
                        "rainfall": [10.00, 70.00, 104.50, 51.60, 173.50, 125.00, 29.00, 72.00, 13.00, 92.00],
                        "note": "*FFB production and rainfall data over the 10-month period (Jul 2025 - Apr 2026). (PAR Pg. 11, 31)"
                    },
                    "ageProfile": {
                        "labels": ["Immature (<3 Yrs)", "Young Prime (9-13 Yrs)", "Old Mature (>18 Yrs)"],
                        "data": [66.74, 70.13, 171.95],
                        "title": "Simpang Durian - Age Profile (2026)",
                        "note": "*32% of aging palms (>45ft) previously noted. Immature areas replanted in Jan 2026. (PAR Pg. 10)"
                    }
                },
                
                "observations": [
                    "<b>Severe Water Deficit & Drought Stress:</b> Serious moisture deficit registered in the Jelebu region (Malaysia's driest district) with only 740 mm total rainfall over 10 months and past 4 months consistently below 100 mm/month (Jan: 29mm, Feb: 72mm, Mar: 13mm, Apr: 92mm). Water conservation measures are critical: frond stacking must be aligned along contours/terraces to retain moisture and EFB mulching has been recommended, although no allocation is provided in this year's budget. <span class='observation-ref'>(PAR Pg. 11-12, 21-22; AR Pg. 14)</span>",
                    "<b>Manuring Program Delivery Backlog:</b> The first-half 2026 fertilizer application has reached 40% completion of its program (64.26 MT applied out of 164.60 MT). While Mix B manual application is strictly on schedule, Mix A is delayed due to late supplier deliveries. Corrective adherence is highly crucial as fertilizer applications were skipped entirely for 2 years prior to takeover. Moving toward semi-mechanized application using Mechanical Buffalo (Timac) is advised to raise productivity and workers' earnings. <span class='observation-ref'>(PAR Pg. 18-19; AR Pg. 11-13)</span>",
                    "<b>Corrective Pruning Backlog in Tall Palms:</b> Around 15% of old mature fields (P99C and P02D) are still undergoing corrective pruning to remove dry hanging fronds. Pruning standards must be improved to ease harvester access and boost collection efficiency. Proper frond stacking practices must be enforced: diagonal stacking on flat areas and terrace-edge stacking on hilly blocks to prevent blocking mechanically-assisted infield collection paths. <span class='observation-ref'>(PAR Pg. 25-26; AR Pg. 14-16)</span>",
                    "<b>Weeding Program & Circle Raking:</b> Weeding standards are satisfactory, with 1.0 round of circle spraying and 1.4 rounds of selective spraying completed ahead of schedule. Circle raking is urgently required in old fields P99C and P02D to remove debris after corrective pruning. Circle spraying must be limited to a 2-meter radius from the palm base to prevent overspraying, ensuring soft grasses are preserved to retain soil moisture. <span class='observation-ref'>(PAR Pg. 15-17; AR Pg. 17-19)</span>",
                    "<b>Integrated Pest Management (IPM):</b> Rat damage previously exceeded the 10% threshold in mature block P15A, prompting a round of baiting in March 2026 which successfully brought the infestation under control. To minimize pesticide reliance, biological controls have been initiated, including the installation of 3 barn owl nests in April 2026 (ratio target of 1 box per 40 ha) and planting beneficial plants (Cassia cobanensis, Antigonon leptopus, Tunera subulata at 60:20:20) in bagworm-prone areas. <span class='observation-ref'>(PAR Pg. 19-20; AR Pg. 20, 28)</span>",
                    "<b>Immature Fields & Terrace Waterlogging:</b> Replanting of fields P25B (66.00 ha) and P25E (0.74 ha) was successfully completed in January 2026 with a planting design of 148 SPH. Stagnant water on terraces and low-lying spots in P25B represents a critical issue that could impair palm growth; constructing herringbone drains at 2-palm intervals is recommended. Infill planting of 1,021 palms in P25B (using overgrown seedlings from the Juasa nursery) and infilling of vacant points in P25E are in progress. <span class='observation-ref'>(PAR Pg. 32-35; AR Pg. 24-26)</span>"
                ],
                
                "reports": {
                    "agronomy": {
                        "Executive Summary": "Routine visit conducted on 25th Feb 2026. The estate achieved 22.62 MT/ha in 2025 (6.5% above estimate), however, the current status is below acceptable standards. Principal limiting factors include overdue weeding operations, incomplete corrective pruning backlogs in P99C/P02D, and zero progress on the 2026 manuring schedule. Yield performance in Jan 2026 was low due to harvester shortages in the prime mature block (P15A). <span class='observation-ref'>(AR Pg. 4-5, 32-33)</span>",
                        "Nutrient Inputs/Progress of Manuring": "<b>2025 Summary:</b> Application closed at 89%. Mix B reached 88% and RP at 92%. A balance of 21.35 MT of Mix B was carried forward to 2026. <br><b>2026 Status:</b> 0% applied as of visit. January program delayed by supplier delivery (Mix A) and weedy circle conditions in P02D preventing application. <br><b>Quality Issues:</b> Fertilizer caking and lump formation observed in sub-block P15A2 circle from the previous round; must be broken down before broadcasting to ensure even distribution. <span class='observation-ref'>(AR Pg. 11-13)</span>",
                        "Agronomic Observation": "<b>Old Plantings (P99C & P02D):</b> Palm density ranges from 119-131 palms/ha. Corrective pruning in P99C has 5 ha remaining. P02D shows excessive dry hanging fronds due to inconsistent progressive pruning. Circles are weedy with volunteer seedlings. Ganoderma detected (P15A2 areas); field sanitation (1.5m deboling) required. <br><b>Prime Planting (P15A):</b> Vigor below optimal. Orange spotting (K deficiency) and pale green canopy (N deficiency) noted in laterite soil (P15A2). Harvesting standards acceptable but pruning stacked fronds improperly in hilly spots. <br><b>Replanting (PR25B):</b> 67 ha planted Nov 2025-Feb 2026. Variable seedling sizes from Juasa (APM) and Cheekah Kemayan. CRF (600g) and RP (500g) applied in planting holes. <span class='observation-ref'>(AR Pg. 14-31)</span>",
                        "Yield Performance": "<b>2025 Review:</b> Total yield 22.62 MT/ha. P15A performed best at 28.12 MT/ha (+19.3% vs Est). <br><b>Jan 2026 Review:</b> Production very low at 355.80 MT (1.47 MT/ha). P15A recorded only 28.85 MT (50% target) due to harvester shortage and only 1 round completed. Total rounds in Jan averaged 1.7 vs target of 2.0. <span class='observation-ref'>(AR Pg. 32-33, 37)</span>",
                        "Fertilizer Recommendation": "<b>2026 Program:</b> Remains unchanged. Recommendations include Mix A (2.00-1.75 kg/palm) for P99C and Mix B (2.25 kg/palm) for P15A. <br><b>Specifications:</b> Mix B (45% AS: 40% MOP: 14% Kie: 1% BOR) and Mix A (45% AS: 40% MOP: 15% Kie). Immature palms (PR25) to receive Compound (14:14:9:2.5) at 0.80-0.90 kg/palm after initial hole application. <span class='observation-ref'>(AR Pg. 35-36)</span>"
                    },
                    "plantation": {
                        "Executive Summary": "Routine advisory visit conducted on 20th April 2026 by Visiting Advisor Tn Hj Mohd Sufian Bin Yusoff. FFB production is satisfactory, averaging 25.19 MT/ha over the 12-month running period (May 2025 to April 2026), despite 71% of mature palms being over 24 years old. Replanting of P25B and P25E was successfully completed in Jan 2026. Staff structure is satisfactory, and the labor force is sufficient (26 workers) with 15 active harvesters. Corrective pruning in old tall palm fields remains the key backlog that must be expedited. <span class='observation-ref'>(PAR Pg. 4, 8, 9, 31)</span>",
                        "Area Statement": "Total Planted: 308.82 ha. Mature: 242.08 ha (78.39%) comprising fields P15A (70.13 ha), P99C (98.78 ha), and P02D (73.17 ha). Immature: 66.74 ha (21.61%) comprising replanted fields P25B (66.00 ha) and P25E (0.74 ha). Others (Office/Housing): 1.00 ha. Total estate area: 309.82 ha. Topography is 75% flat to undulating and 25% hilly. GIS-based palm census has adjusted the SPH database accordingly. <span class='observation-ref'>(PAR Pg. 10-11)</span>",
                        "Labour Statement": "Total workforce stands at 26 workers, which exceeds the requirement of 23 workers, establishing an adequate labor-to-land ratio of 1 worker per 12 hectares. Harvesters increased to 15 workers (harvester-to-land ratio of 1:21 ha), supported by 3 units of Mechanical Buffalo (Badang) for infield collection. The estate successfully integrated 10 Indonesian foreign workers in November 2025. Monitoring productivity and daily earnings is critical to reduce labor turnover. <span class='observation-ref'>(PAR Pg. 14)</span>",
                        "Staff Establishment": "Adequate and satisfactory. Assistant In-Charge En Mohamad Syukri Bin Ahmad and Field Supervisor En Mohamad Syawal Fitri Bin Jamil both transferred to the estate on 6th October 2025. Cik Puputfikaria joined as General Clerk on 2nd March 2026, replacing Pn Fatiha Suraya. Assistant Manager En Muhammad Nurhafizi was transferred to Ladang Simpai in February 2026. Field team urged to familiarize themselves with estate conditions and enforce company policies. <span class='observation-ref'>(PAR Pg. 13)</span>",
                        "General Charges": "N/A - General Charges details not explicitly reported in the PAR 1/2026 text. <span class='observation-ref'>(PAR Pg. 3)</span>",
                        "Upkeep & Cultivation": "Weeding: Completed 1.0 round of circle spraying and 1.4 rounds of selective spraying ahead of schedule. Circle raking is required in fields P99C and P02D. Manuring: Applied 64.26 MT of fertilizer (40% of first-half program). Mix B is on track; Mix A is delayed due to late supplier delivery. Pests & Diseases: Introduced biological controls with 3 barn owl nests installed in April 2026 and planned beneficial plant planting. Soil & Water Conservation: Favorable water retention methods are prioritized due to Jelebu's extreme moisture deficit (740 mm rain in 10 months). Drains: Minimal routine drain work with a rental backhoe; drainage must focus on water retention during dry spells. <span class='observation-ref'>(PAR Pg. 15-22)</span>",
                        "Harvesting and Collection": "Operations utilize 15 active harvesters and 3 units of Mechanical Buffaloes (average badang productivity: 11.95 MT/day). Harvesting intervals average 15 days (8.00 rounds completed). Average harvester productivity is 2.39 MT/man-day, and average daily earnings are highly satisfactory (RM102.44 to RM135.73/day). FFB quality is satisfactory with low unripe/overripe incidences and excellent loose fruit recovery. Implementing field-by-field block harvesting is recommended to improve supervision. <span class='observation-ref'>(PAR Pg. 27-29)</span>",
                        "Crop Production": "FFB production for Jan-Apr 2026 was 1,556.03 MT, which is 11.59% below the estimate of 1,760.00 MT. Todate yield was 6.43 MT/ha. However, the running 12-month FFB production (May 2025 to April 2026) was excellent at 6,099.17 MT, averaging 25.19 MT/ha (P15A achieved 27.95 MT/ha). Crop production is trending upward from Q2 to year-end, and the estate is projected to exceed the 2026 annual budget of 20.25 MT/ha (6,275.00 MT). <span class='observation-ref'>(PAR Pg. 30-31)</span>",
                        "Production Cost": "N/A - Cost data not detailed in current PAR 1/2026. <span class='observation-ref'>(PAR Pg. 3)</span>",
                        "Vehicles Running Cost": "N/A - Running costs not explicitly detailed in the PAR 1/2026 report. <span class='observation-ref'>(PAR Pg. 3)</span>",
                        "Capital Expenditure": "Current assets include 1 Estate Office, 1 Fertilizer Store, and 4 blocks of 2-unit worker quarters. Approval obtained from the Labour Department for the construction of 1 block of 2-unit staff quarters (for Field Supervisor & Clerk) and 1 block of 3-unit worker quarters. Existing worker quarters are to be renovated to comply with minimum housing standards. Manager's bungalow construction should be deferred in favor of nearby rental housing. <span class='observation-ref'>(PAR Pg. 36)</span>",
                        "Immature": "P25B (66.00 ha): Felling/shredding completed Jun 2025; planting of 9,919 palms (DxP IOI Deli Avros) completed Jan 2026 (148 SPH). 1,021 palms supplied to replace dead points. Stagnant water on terraces and low-lying spots requires herringbone drains at 2-palm intervals. P25E (0.74 ha): Planting of 100 palms completed Jan 2026 (135 SPH). Recommending supplying dead palms and infilling vacant spots to suit design SPH. Both blocks received 500g RP and 600g Fuji Coat fertilizer per hole. <span class='observation-ref'>(PAR Pg. 32-35)</span>"
                    },
                    "pinfosys": {
                        "CEO Financial Summary": "N/A - Pinfosys Report not available.",
                        "Summary of Oil Palm Expenditure": "N/A - Pinfosys Report not available."
                    }
                },
                
                "policy": "<div class='policy-item'><p class='font-semibold'>Manuring Schedule</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-APP-05:</b> Any delay in fertilizer application >1 month requires a catch-up plan to be approved by the Visiting Agent.</p></div><div class='policy-item'><p class='font-semibold'>Ganoderma Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> Implement sanitation by de-boling (1.5m x 1.5m x 1.5m) for all infected palms in older blocks.</p></div><div class='policy-item'><p class='font-semibold'>Water Conservation</p><p class='text-sm text-gray-600'><b>Policy Ref: SOIL-H2O-01:</b> In Jelebu (rainfall <1700mm), frond stacking must be aligned along contours/terraces to retain moisture.</p></div>"
            };

            const container = document.getElementById('selected-estate-container');
            let chartInstances = {};

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Manuring') ? 'bg-yellow-50 text-yellow-800' : 'bg-red-50 text-red-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2 text-center">Monthly Production vs Rainfall (YTD)</h3><div class="chart-container"><canvas id="prodChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2 text-center">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${estate.observations.map(obs => `<li>${obs}</li>`).join('')}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="agronomy" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="plantation" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="pinfosys" class="details-content bg-gray-50 p-6 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCtx = document.getElementById('prodChart')?.getContext('2d');
                if(prodCtx) {
                    chartInstances['prod'] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false, 
                            scales: { 
                                x: { grid: { display: false } }, 
                                'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 
                                'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } 
                            } 
                        }
                    });
                }
                const ageCtx = document.getElementById('ageChart')?.getContext('2d');
                if(ageCtx) {
                    chartInstances['age'] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#eab308', '#ca8a04'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                    });
                }
            }

            function populateInternalDropdowns() {
                const ag = document.getElementById('agronomy');
                const pa = document.getElementById('plantation');
                const pi = document.getElementById('pinfosys');
                
                ag.innerHTML = Object.entries(estateData.reports.agronomy).map(([k, v]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-b mb-1">${k.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-600">${v}</div></div>`).join('');
                pa.innerHTML = Object.entries(estateData.reports.plantation).map(([k, v]) => `<div class="mb-4"><h4 class="font-bold text-gray-800 border-b mb-1">${k.replace(/([A-Z])/g, ' $1').trim()}:</h4><div class="text-sm text-gray-600">${v}</div></div>`).join('');
                pi.innerHTML = `<div class="mb-4"><h4 class="font-bold text-gray-800 border-b mb-1">CEO Financial Summary:</h4><div class="text-sm text-gray-600">${estateData.reports.pinfosys.CEOFinancialSummary}</div></div><div class="mb-4"><h4 class="font-bold text-gray-800 border-b mb-1">Summary of Oil Palm Expenditure:</h4><div class="text-sm text-gray-600">${estateData.reports.pinfosys.SummaryOfOilPalmExpenditure || estateData.reports.pinfosys.SummaryofOilPalmExpenditure || "N/A"}</div></div>`;
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const content = document.getElementById(e.currentTarget.dataset.dropdownId);
                        content.classList.toggle('active');
                        e.currentTarget.classList.toggle('active');
                    };
                });
                container.querySelector('.policy-modal-btn').onclick = openPolicyModal;
            }

            renderEstate();
        });

        function openPolicyModal() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = estateData.policy;
            document.getElementById('modalTitle').innerText = 'Agricultural Policy Cross-Reference: Ladang Simpang Durian';
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('modalContent').innerHTML = "";
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
