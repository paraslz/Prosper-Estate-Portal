<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Ladang Sungai Sisik - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Sisik Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sgsisik",
                "name": "Ladang Sungai Sisik",
                "reportInfo": "Data based on PA Report 2-2025 (Visit: 17th Dec 2025) & Agronomy Report 1/2026 (Visit: 20th April 2026).",
                "summaryMetrics": {
                    "area": { 
                        "title": "Estate Area", 
                        "lines": [
                            "Total Planted: 1,965.00 ha", 
                            "Mature: 1,469.53 ha", 
                            "Immature: 495.47 ha", 
                            "Unplanted: 4.92 ha"
                        ] 
                    },
                    "yield": { 
                        "title": "Yield/Ha (2025 Actual vs 2024)", 
                        "value": "21.46 / 18.93 MT", 
                        "note": "Full Year 2025 (+12% vs 2024)" 
                    },
                    "cost": { 
                        "title": "FFB Cost/Tonne (Actual vs Budget)", 
                        "value": "RM 233.91 / RM 321.52", 
                        "note": "Oct YTD 2025 (PA Report)" 
                    },
                    "labour": { 
                        "title": "Labour Status", 
                        "value": "Critical Shortage", 
                        "note": "Short 15 weeders & 4 manurers" 
                    },
                    "pests": { 
                        "title": "Pest & Disease", 
                        "value": "Rat Infestation", 
                        "note": "Spiked to 19% in PM20K" 
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Shortage", "value": "19 Workers Short" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Yield Trend (Q1 2026)", "value": "-17% YoY Decline" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "General Charges", "value": "Underspent (42%)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4' /></svg>", "label": "Harvest Interval", "value": "19 Days (Improved in Q2)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M20.618 5.984A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016zM12 9v2m0 4h.01' /></svg>", "label": "Pest Status", "value": "19% Rat Damage (PM20K)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-teal-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Manuring", "value": "Delivery Delays (Mix B)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct"],
                        "ffb": [1600, 1500, 1800, 2100, 2400, 2300, 2200, 2100, 2000, 2215], 
                        "rainfall": [233, 301, 585, 1043, 237, 203, 42, 192, 193, 241],
                        "note": "*FFB Trend is illustrative based on PA Report. Q1 2026 yield saw 17% decline."
                    },
                    "ageProfile": {
                        "labels": ["0-3 Yrs (Immature)", "4-7 Yrs (Young Mature)", "8-19 Yrs (Prime)", "20-25 Yrs (Old)", ">26 Yrs (Very Old)"],
                        "data": [25, 33, 17, 3, 21], 
                        "title": "Sg. Sisik Palm Age Distribution (%)",
                        "note": "*Distribution updated as of March 2026. (Agronomy Report 1/2026, Pg. 11)"
                    }
                },
                "observations": [
                    "<b>Critical Labour Shortage (Weeding & Manuring):</b> The estate remains critically short of weeders (15 available vs 30 required) and manuring workers (8 vs 12). This shortage has directly delayed inter-row weeding in PR24C and slowed general upkeep. <span class='observation-ref'>(PA Report 2-2025, Pg. 12; Agronomy Report 1/2026, Pg. 35)</span>",
                    "<b>Yield Decline & Harvesting Standards:</b> While 2025 saw a 12% yield improvement, Q1 2026 recorded a 17% decline YoY due to underperforming old mature fields (PM05H down 74%). Erratic harvesting intervals (up to 19 days in Jan/Feb) and poor standards (long stalks, uncollected loose fruits in P95E-5) must be corrected. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 14, 15, 39-41)</span>",
                    "<b>Rat Infestation Spike:</b> Rat damage in PM20K spiked to an alarming 19% in February 2026, well above the 10% threshold. Immediate baiting has been actioned but requires strict follow-up censuses. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 31-32)</span>",
                    "<b>Manuring Programme Delivery Delays:</b> While the 2025 program achieved 100% completion, the 2026 Mixture B application fell behind schedule (only 24% completed by March) primarily due to fertilizer delivery issues. It is currently being brought back on track. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 12)</span>",
                    "<b>Flooding & Weeding in Immature Areas:</b> Previously flooded immature areas (PR23B, PR25E) are recovering, but Mucuna is now encroaching into palm circles in PR24C. Clidemia dominance requires intensive weeding, hampered by the labour shortage. <span class='observation-ref'>(PA Report 2-2025, Pg. 41; Agronomy Report 1/2026, Pg. 36-37)</span>",
                    "<b>Nutrient Deficiencies & Epiphytes:</b> Isolated cases of magnesium deficiency (yellowing lower fronds) were observed in P95E-5 and PR23B. Overgrowth of epiphytes in older blocks (PM95E) threatens harvesting efficiency and must be continuously removed. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 16, 21, 35)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The advisory visit on 17th Dec 2025 highlighted a critical shortage of 15 weeders and 4 manuring workers. Despite this, yield performance (15.08 t/ha) exceeded budget by 7% at the time. Harvester productivity remains a concern, and flooding was observed in immature areas. <span class='observation-ref'>(PA Report 2-2025, Pg. 9, 12, 34)</span>",
                        "Area Statement": "As of the report date, total Planted Area is 1,965.00 Ha. This comprises:<br><ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>Mature:</b> 1,286.21 Ha (Increased slightly due to replanting adj).</li><li><b>Immature:</b> 612.72 Ha.</li><li><b>Replanting:</b> 66.07 Ha (PR25). Scheduled for 2029.</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 10-11)</span>",
                        "Labour Statement": "Total Workers: 104 (Required: 123, Shortage: 19).<br><ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>Harvesters:</b> 68 available (Req: 61) - Surplus but low productivity.</li><li><b>Weeders:</b> 15 available (Req: 30) - Critical shortage of 50%.</li><li><b>Manurers:</b> 8 available (Req: 12).</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 12)</span>",
                        "Staff Establishment": "Staff establishment is adequate. Assistant managers transferred to/from Simpai 2 Estate. <span class='observation-ref'>(PA Report 2-2025, Pg. 13)</span>",
                        "General Charges": "Underspent by 42%.<br><ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>Overspending noted in:</b> Staff Accommodation (Furniture purchasing) and Upkeep Sundry Buildings (Unbudgeted painting/roof repairs).</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 14-15)</span>",
                        "Upkeep & Cultivation": "<ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>Circle Spraying:</b> 91% completed (3,243 ha). Output 5.2 ha/man-day. Recommended to switch to CDA/Inter Pump.</li><li><b>Selective Spraying:</b> 83% completed (3,578 ha).</li><li><b>Manuring:</b> 84% completed. Shortage of workers hindering progress.</li><li><b>Pruning:</b> 99% completed. Under-pruning noted in P20.</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 16-31)</span>",
                        "Harvesting and Collection": "<ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>Cost:</b> RM 82.89/tonne (Budget: RM 81.46).</li><li><b>Intervals:</b> 19 rounds achieved. Avg interval ~19 days due to rain.</li><li><b>Productivity:</b> Harvester outturn 75%. Low productivity in P05H, P95E, P15A.</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 32-33)</span>",
                        "Crop Production": "<ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>YTD Yield:</b> 15.08 MT/ha (Budget: 14.16 MT/ha).</li><li><b>Production:</b> 22,157.79 MT (Oct YTD). 21% higher than last year.</li><li><b>Bunch Weights:</b> Improved vs 2024 (e.g., 2015 planting: 16.33 kg vs 11.56 kg).</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 34-35)</span>",
                        "Production Cost": "<ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>FFB Cost:</b> RM 233.91/tonne (Budget: RM 321.52).</li><li><b>Breakdown:</b> General Charges (RM 72.94), Upkeep (RM 78.06), Harvesting (RM 82.90).</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 36)</span>",
                        "Vehicles Running Cost": "Hilux running cost satisfactory at RM 0.21/km (Budget: RM 0.23/km). <span class='observation-ref'>(PA Report 2-2025, Pg. 37)</span>",
                        "Capital Expenditure": "Underspent. Spent RM 41,926 vs Budget RM 119,199. <span class='observation-ref'>(PA Report 2-2025, Pg. 38)</span>",
                        "Immature": "<ul class='list-disc pl-5 mt-1 space-y-1 text-sm text-gray-600'><li><b>PR23 (232.71 ha):</b> 107% circle spray. Flooded during visit.</li><li><b>PR22 (183.32 ha):</b> Scout harvest 1.15 t/ha. Basal pruning completed.</li><li><b>PR24 (196.69 ha):</b> Fresh Oryctes attack. 9 rounds Russel Beta done.</li><li><b>PR25 (66 ha):</b> Planting completed Nov. Flooded sections noted.</li></ul><span class='observation-ref'>(PA Report 2-2025, Pg. 39-55)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "The first visit (1/2026) on 20th April 2026 revealed that while full-year 2025 yields improved by 12% to 21.46 MT/ha, Q1 2026 yields declined by 17% YoY. Key focus areas include rectifying delayed Mixture B application (caused by delivery issues), addressing erratic harvesting intervals and poor loose fruit collection, and controlling a significant rat infestation spike (19%) in PM20K. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 8, 31, 39-41)</span>",
                        "Nutrient Inputs/Progress of Manuring": "The 2025 manuring program was successfully completed (100% for most fertilizers). However, the 2026 Mixture B application is currently behind schedule (only 24% completed by March) due to supplier delivery issues. Application rates and quality in the field were found to be satisfactory once fertilizers were received. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 12-13)</span>",
                        "Agronomic Observation": "<b>Old Mature (PM95-05):</b> Harvesting intervals were erratic in Jan/Feb (19 days) but improved by April. Frond stacking remains inconsistent. Magnesium deficiency (yellowing fronds) and uncollected loose fruits were noted in P95E-5. Epiphyte overgrowth is a concern in PM95E blocks. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 14-22)</span><br><br><b>Young/Prime Mature (PM15-22L):</b> Crop recovery is acceptable. However, long stalks and uncollected loose fruits require stricter supervision. Canopy status is generally good, though rat damage hit an alarming 19% in PM20K, prompting immediate baiting. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 23-33)</span><br><br><b>Immature (PR23-25E):</b> PR25E replants survived transplant shock. PR23B scout harvesting and PR24C ablation are on track. However, weeding in PR24C is severely delayed (30% inter-row completion) due to labour shortages, leading to Mucuna encroaching on palm circles. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 34-37)</span>",
                        "Yield Performance": "2025 closed strong at 21.46 MT/ha (+12% vs 2024). However, Q1 2026 yield dropped to 3.59 MT/ha (-17% vs Q1 2025). This decline is heavily attributed to older fields (PM05H plummeted by 74%, PM19J by 25%), while newly mature fields like PM22L showed positive growth (+83%). <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 39-41)</span>",
                        "Fertilizer Recommendation": "The manuring programme for the second half of 2026 has been revised (Appendix 1) primarily due to current issues related to manuring pricing. Nutrient status will be further analyzed following leaf sampling. <span class='observation-ref'>(Agronomy Report 1/2026, Pg. 42-47)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Fertilizer Application Delay</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-SCH-02:</b> Any delay in fertilizer application exceeding 2 months requires a catch-up plan approved by the Planting Advisor to prevent nutrient stress.</p></div><div class='policy-item'><p class='font-semibold'>Rat Infestation Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-RAT-04:</b> If rat damage exceeds the 10% threshold (as seen in PM20K at 19%), immediate 100% baiting must commence, followed by a post-baiting census to verify suppression.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards & Loose Fruits</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-01:</b> All loose fruits must be collected during each harvesting round. Bunch stalks must be cut flush (< 5cm) to prevent OER penalties at the mill.</p></div>"
            };

            // --- GLOBAL VARIABLES ---
            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            // --- FUNCTIONS ---
            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate(estateData);
                    populateInternalDropdowns(estateData);
                    attachEventListeners(estateData);
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Labour') ? 'bg-red-50 text-red-800' : 'bg-yellow-50 text-yellow-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (Estimate)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-3 text-gray-900 border-b pb-1 mb-2">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                } else if (pinfosysDiv && estateData.reports.pinfosys) {
                    pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const policyData = "<div class='policy-item'><p class='font-semibold'>Fertilizer Application Delay</p><p class='text-sm text-gray-600'><b>Policy Ref: FERT-SCH-02:</b> Any delay in fertilizer application exceeding 2 months requires a catch-up plan approved by the Planting Advisor to prevent nutrient stress.</p></div><div class='policy-item'><p class='font-semibold'>Rat Infestation Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-RAT-04:</b> If rat damage exceeds the 10% threshold (as seen in PM20K at 19%), immediate 100% baiting must commence, followed by a post-baiting census to verify suppression.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards & Loose Fruits</p><p class='text-sm text-gray-600'><b>Policy Ref: HARV-STD-01:</b> All loose fruits must be collected during each harvesting round. Bunch stalks must be cut flush (< 5cm) to prevent OER penalties at the mill.</p></div>";
            
            modalTitle.innerText = `Agricultural Policy Cross-Reference: Ladang Sungai Sisik`;
            modalContent.innerHTML = policyData;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
