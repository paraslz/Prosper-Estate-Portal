<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladang Sungai Enggang - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Sungai Enggang Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "sgenggang",
                "name": "Ladang Sungai Enggang",
                "reportInfo": "Data based on PA Report 1/2026 (Visit: 25 May 2026) & Agronomy Report 2/2025 (Visit: 16 Dec 2025).",
                "summaryMetrics": {
                    "area": {
                        "title": "Estate Area",
                        "lines": [
                            "Total Planted: 2,809.16 ha",
                            "Mature: 2,163.31 ha",
                            "Immature: 645.85 ha"
                        ]
                    },
                    "yield": {
                        "title": "Yield/Ha (Actual vs Budget)",
                        "value": "15.88 / 20.54 MT",
                        "note": "FY 2025 (22% below budget)"
                    },
                    "cost": {
                        "title": "FFB Cost/Tonne (Actual vs Budget)",
                        "value": "RM 254.64 / RM 262.36",
                        "note": "FY 2025"
                    },
                    "manuring": {
                        "title": "Manuring Progress",
                        "value": "100% Completed",
                        "note": "72 rounds achieved"
                    },
                    "weeding": {
                        "title": "Weeding Progress",
                        "value": "84% Completed",
                        "note": "Inter-row: 90% | Circle: 84%"
                    }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Status", "value": "Short 10 Pax (1:26ha)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (FY 2025)", "value": "18.99%" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Harvest Interval", "value": "~20 Days" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' /></svg>", "label": "Harvest Rounds", "value": "16.6 (Target 24)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z' /></svg>", "label": "Pest Alert", "value": "Monkeys & Rats" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Pruning Status", "value": "49% (Delayed)" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
                        "ffb": [2117, 2998, 2372, 3258, 3513, 2578, 2878, 2716, 2549, 3381, 3304, 2689], 
                        "rainfall": [531.8, 77, 306.7, 285.4, 387, 213.8, 93.1, 127.5, 236, 325.4, 298.4, 211.2],
                        "note": "*Estimated Full Year 2025 Production & Rainfall."
                    },
                    "ageProfile": {
                        "labels": ["Immature (0-3 Yrs)", "Young Mature (4-7 Yrs)", "Prime Mature (8-19 Yrs)", "Old Mature (20-25 Yrs)", ">25 Yrs"],
                        "data": [23, 2, 0, 19, 56], 
                        "title": "Sg. Enggang Palm Age Distribution (2025)",
                        "note": "*Includes new replanting PR25K (168 ha)."
                    }
                },
                "observations": [
                    "<b>Critical Labour Shortage & Low Productivity:</b> The estate faces a shortage of 10 harvesters (operating at a ratio of 1:26 ha), alongside shortages in sprayers and manurers. High turnover and low harvester productivity are severely impacting crop recovery. <span class='observation-ref'>(PA 1/2026, Pg. 11, 33; Agro 2/2025, Pg. 15)</span>",
                    "<b>Extended Harvest Intervals:</b> Harvesting rounds averaged only 16.6 (approx. 20-day interval) versus the budgeted 24 rounds, leading to crop loss and dropping bunch weights due to overripe bunches. <span class='observation-ref'>(PA 1/2026, Pg. 32-35; Agro 2/2025, Pg. 15)</span>",
                    "<b>Pruning Backlog:</b> Progressive pruning is only 49% complete (8,398 ha of 17,306 ha) due to the diversion of labor. Expediting this is critical for unhindered harvesting. <span class='observation-ref'>(PA 1/2026, Pg. 25; Agro 2/2025, Pg. 18)</span>",
                    "<b>Manuring & Upkeep Standards:</b> Manuring program is 100% complete for 2025. However, EFB and inorganic fertilizers are often placed too close to the palm base (must be 5-6 ft away). Circle spraying is at 84%; adoption of CDA is recommended to improve worker output. <span class='observation-ref'>(PA 1/2026, Pg. 15, 23-24; Agro 2/2025, Pg. 11-13)</span>",
                    "<b>Pest & Disease Pressures:</b> Severe monkey damage to bunches was observed at hilltop areas (P20). Rat damage (old) remains a concern in immature and hill areas, requiring regular baiting if damage exceeds 10%. <span class='observation-ref'>(PA 1/2026, Pg. 28; Agro 2/2025, Pg. 44)</span>",
                    "<b>Immature & Replanting Progress:</b> Supplying must be expedited in PR24J. In PR25K (168 ha), planting was completed in Feb 2026, but eradication of Volunteer Oil Palms (VOPs) and legume cover crop establishment needs urgent attention. <span class='observation-ref'>(PA 1/2026, Pg. 44-48; Agro 2/2025, Pg. 46)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "The estate faces a continued harvester shortage (10 pax) contributing to a 22% shortfall in crop production against the budget. Upkeep programs like pruning (49% complete) are delayed due to this shortage. However, manuring is 100% complete and costs are well-managed (COP is RM 254.64/MT, below budget). Management must prioritize harvester recruitment and worker productivity. <span class='observation-ref'>(PA Report 1/2026, Pg. 4, 34-36, 52)</span>",
                        "Area Statement": "Total planted area is 2,809.16 ha. This comprises:<ul class='list-disc pl-5 mt-1 space-y-1'><li><b>Mature:</b> 2163.31 ha.</li><li><b>Immature:</b> 645.85 ha.</li><li><b>Replanting:</b> No replanting program scheduled for 2026.</li></ul><span class='observation-ref'>(PA Report 1/2026, Pg. 10)</span>",
                        "Labour Statement": "The estate is operating with a shortage of critical field workers.<ul class='list-disc pl-5 mt-1 space-y-1'><li><b>Harvesters:</b> 84 available vs 94 required (Shortage of 10). Ratio is 1:26 ha (Target 1:23 ha). High turnover is a major concern.</li><li><b>Spraying & Manuring:</b> Short of 4 sprayers and 8 manuring workers. Overall ratio is 1:15 ha, indicating a general worker shortage.</li></ul><span class='observation-ref'>(PA Report 1/2026, Pg. 11)</span>",
                        "Staff Establishment": "Staffing is adequate. The Manager (En. Shukor) was transferred in Feb 2026, and En. Zambri was appointed as Assistant in charge. <span class='observation-ref'>(PA Report 1/2026, Pg. 12)</span>",
                        "General Charges": "Overall General Charges are underspent by 30% (Actual RM 3.05M vs Budget RM 4.34M). The Manager must ensure reasons for specific sub-code overspending are tracked even in the Chief Clerk's absence. <span class='observation-ref'>(PA Report 1/2026, Pg. 13)</span>",
                        "Upkeep & Cultivation": "<ul class='list-disc pl-5 mt-1 space-y-1'><li><b>Weeding:</b> Circle spraying is 84% complete (delayed by rain). Selective spraying is 90% complete. Output is low (3.7 ha/md); CDA adoption is recommended.</li><li><b>Manuring:</b> 100% completed (72 rounds). EFB application is 78% completed but often placed too close to palms (requires 5-6 feet distance).</li><li><b>Pruning:</b> Only 49% completed due to the harvester shortage. Progressive pruning must be expedited.</li></ul><span class='observation-ref'>(PA Report 1/2026, Pg. 14-26)</span>",
                        "Harvesting and Collection": "Harvesting interval achieved is 16.6 rounds (averaging 20 days) against a budget of 24 rounds. Productivity is low (RM 32-75/MT rates), with many workers struggling to hit minimum wage. <span class='observation-ref'>(PA Report 1/2026, Pg. 32-33)</span>",
                        "Crop Production": "FFB yield achieved is 15.88 MT/ha, which is 22% below the budgeted 20.54 MT/ha. However, this is a 12% improvement over 2024's 14.12 MT/ha. The shortfall is primarily due to the harvester shortage and high turnover. OER stands at 18.99%. <span class='observation-ref'>(PA Report 1/2026, Pg. 34-35)</span>",
                        "Production Cost": "Total COP is RM 254.64/MT FFB, which is slightly below the budget of RM 262.36/MT FFB. Cost is acceptable despite the yield shortfall. <span class='observation-ref'>(PA Report 1/2026, Pg. 36)</span>",
                        "Vehicles Running Cost": "Running costs for the Managers' vehicles are under control. <span class='observation-ref'>(PA Report 1/2026, Pg. 50)</span>",
                        "Capital Expenditure": "Capital expenditures (RM 905k budget) were transferred to Prosper Group and not reflected in the current estate accounts. <span class='observation-ref'>(PA Report 1/2026, Pg. 51)</span>",
                        "Immature": "<ul class='list-disc pl-5 mt-1 space-y-1'><li><b>PR23/11 (222.38 ha):</b> 100% selective spraying and 5 rounds manuring complete. Good fruit sets observed. Basal pruning commenced.</li><li><b>PR24/J (255.12 ha):</b> Weeding at 78-98%. Cypermethrin applied for Oryctes (minimal damage). Supplying needed.</li><li><b>PR25/K (168.35 ha):</b> Planting completed in low-lying/tapping rights areas (Feb 2026). Eradication of Volunteer Oil Palms (VOPs) required.</li></ul><span class='observation-ref'>(PA Report 1/2026, Pg. 37-49)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "A routine agronomy visit was conducted on 16th December 2025. The estate continues to struggle with a harvester shortage (22% deficit), leading to intervals exceeding 20 days. Manuring progress is good (97%), but storage conditions require immediate improvement. Pruning in old mature fields is critically behind schedule (40%). <span class='observation-ref'>(Source: Agronomy Report 2/2025, Pg. 2-7)</span>",
                        "Nutrient Inputs / Progress of Manuring": "Manuring is 97% complete (Nov 2025). Old stock Compact B has been cleared. However, fertilizer bags were found stored directly on wet ground; usage of pallets is mandatory. EFB application covers 73% of the area but is often placed too close to palm bases. <span class='observation-ref'>(Source: Agronomy Report 2/2025, Pg. 11-13)</span>",
                        "Agronomic Observation": "Harvesting intervals are consistently >20 days. Crop recovery is suboptimal with over-ripe bunches found. Pruning is only 40% complete in old mature fields (P96B-D, P03G), leading to under-pruned conditions. <span class='observation-ref'>(Source: Agronomy Report 2/2025, Pg. 15-18)</span>",
                        "Yield Performance": "Total estate production decreased by 7.9% vs last year. Yield stands at 14.64 MT/Ha (YTD Nov). Cumulative harvesting rounds averaged only 15.45 against a target of 22, indicating severe crop loss. <span class='observation-ref'>(Source: Agronomy Report 2/2025, Pg. 49-50)</span>",
                        "Fertilizer Recommendation": "2026 program formulated. Mixture fertilizers recommended as main source. <span class='observation-ref'>(Source: Agronomy Report 2/2025, Pg. 53)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Labour & Harvesters</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-REC-01:</b> Estate must maintain a harvester-to-area ratio of 1:15 ha (hilly) or 1:23 ha (flat). Shortages >10% must trigger immediate recruitment protocols.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: OP-HARV-03:</b> Harvesting rounds must be maintained at 10-15 days. Intervals >20 days trigger mandatory 'block closure' reviews to prioritize crop recovery.</p></div><div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-PEST-02:</b> Rat baiting is mandatory when damage census exceeds 5%. Second rounds must be applied if damage persists >10%.</p></div><div class='policy-item'><p class='font-semibold'>Manuring Application</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-FERT-04:</b> Fertilizers and EFB must be applied at least 5-6 feet away from the palm base in mature fields to optimize root uptake and prevent rot.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-red-50 text-red-800' : 'bg-teal-50 text-teal-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                             <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                // Structured format matches PA Report details template screenshot
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `
                        <div class="mb-4">
                            <h4 class="font-bold text-gray-900 text-base mb-1">${section}:</h4>
                            <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                        </div>
                    `).join('');
                }
                
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `
                        <div class="mb-4">
                            <h4 class="font-bold text-gray-900 text-base mb-1">${section}:</h4>
                            <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                        </div>
                    `).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys) {
                    if (estateData.reports.pinfosys === "Not Available") {
                        pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                    } else {
                        pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `
                            <div class="mb-4">
                                <h4 class="font-bold text-gray-900 text-base mb-1">${section}:</h4>
                                <div class="text-sm text-gray-700 leading-relaxed">${content}</div>
                            </div>
                        `).join('');
                    }
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const estateData = {
                "name": "Ladang Sungai Enggang",
                "policy": "<div class='policy-item'><p class='font-semibold'>Labour & Harvesters</p><p class='text-sm text-gray-600'><b>Policy Ref: HR-REC-01:</b> Estate must maintain a harvester-to-area ratio of 1:15 ha (hilly) or 1:23 ha (flat). Shortages >10% must trigger immediate recruitment protocols.</p></div><div class='policy-item'><p class='font-semibold'>Harvesting Standards</p><p class='text-sm text-gray-600'><b>Policy Ref: OP-HARV-03:</b> Harvesting rounds must be maintained at 10-15 days. Intervals >20 days trigger mandatory 'block closure' reviews to prioritize crop recovery.</p></div><div class='policy-item'><p class='font-semibold'>Pest Control (Rats)</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-PEST-02:</b> Rat baiting is mandatory when damage census exceeds 5%. Second rounds must be applied if damage persists >10%.</p></div><div class='policy-item'><p class='font-semibold'>Manuring Application</p><p class='text-sm text-gray-600'><b>Policy Ref: AGRO-FERT-04:</b> Fertilizers and EFB must be applied at least 5-6 feet away from the palm base in mature fields to optimize root uptake and prevent rot.</p></div>"
            };
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateData.name}`;
            modalContent.innerHTML = estateData.policy;
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
