<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladang Tagar 3 - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        
        /* Typography spacing for the PA template style */
        .report-section-content ul { list-style-type: disc; margin-left: 1.5rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
        .report-section-content li { margin-bottom: 0.25rem; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Tagar 3 Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const estateData = {
                "id": "tagar3",
                "name": "Ladang Tagar 3",
                "reportInfo": "Data based on PA Report 2/2025 (Nov 2025) & Agronomy Report 1/2026 (June 2026).",
                "summaryMetrics": {
                    "area": { "title": "Estate Area", "lines": ["Mature: 1,548.20 ha", "Immature/New: 80.00 ha", "Total: 1,628.20 ha"] },
                    "yield": { "title": "Yield/Ha (YTD May 2026)", "value": "4.76 MT", "note": "Drastic drop of -39.4% YoY" },
                    "cost": { "title": "FFB Cost/Tonne", "value": "RM 268.28", "note": "Actual: 268.28 | Budget: 274.58 (YTD Sep 25)" },
                    "weeding": { "title": "Weeding Progress", "value": "Satisfactory", "note": "Inter-row and circles generally acceptable" },
                    "manuring": { "title": "Manuring Progress (2026)", "value": "Significantly Delayed", "note": "Only 35-44% complete by May 2026" }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-blue-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Harvester Prod.", "value": "0.85-1.22 MT/md <span class='text-sm text-red-500 block font-normal mt-1'>Shortage of 17 harvesters</span>" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "High (Bagworms, Rats & Gano)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "Yield Trend", "value": "Drastic Decline <span class='text-sm text-red-500 block font-normal mt-1'>-39.44% YoY (May)</span>" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-green-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "Cost Variance", "value": "-2% (Favorable) <span class='text-sm text-gray-500 block font-normal mt-1'>Based on Nov PA</span>" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "~15 Days (Acceptable) <span class='text-sm text-red-500 block font-normal mt-1'>Poor loose fruit collection</span>" }
                ],
                "chartData": {
                    "production": {
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May"],
                        "ffb": [1551.33, 1275.21, 1446.46, 1577.19, 1525.03],
                        "rainfall": [216.20, 193.50, 243.50, 355.00, 98.00],
                        "note": "*YTD 2026 FFB Production vs Rainfall (AR 1/2026, Pg. 20, 78)"
                    },
                    "ageProfile": {
                        "labels": ["Young Mature (4-7 Yrs)", "Prime (8-19 Yrs)", "Old (20-25 Yrs)", "Very Old (>26 Yrs)"],
                        "data": [7, 64, 13, 16],
                        "title": "Tagar 3 Palm Age Distribution",
                        "note": "*Age distribution based on total planted area. (AR 1/2026, Pg. 10)"
                    }
                },
                "observations": [
                    "<b>Drastic Yield Decline:</b> FFB yield dropped drastically by 39.4% YoY as of May 2026 (4.76 MT/ha vs 7.87 MT/ha). Total Bunch Number (TBN) fell by 47.2%, primarily due to prolonged moisture stress in 2025, persistent bagworm defoliation, and fertilizer delays. <span class='observation-ref'>(AR 1/2026, Pg. 68-69)</span>",
                    "<b>Harvester Shortage & Low Productivity:</b> There is an acute shortage of 17 harvesters (61 active). Productivity remains highly unsatisfactory, ranging from 0.85 to 1.22 MT/man-day. Consequently, loose fruit collection is compromised and over-ripe bunches were spotted in P06B and P12F. <span class='observation-ref'>(AR 1/2026, Pg. 21, 27; PA Report 2/2025, Pg. 11, 42)</span>",
                    "<b>Severe Manuring Delays:</b> The 2026 manuring program is significantly delayed. As of May 2026, Mixture A is only 35% complete and Mixture B is 44% complete due to late deliveries. Kieserite application in P16 was observed happening during rainy conditions, leading to potential nutrient runoff. <span class='observation-ref'>(AR 1/2026, Pg. 15-17)</span>",
                    "<b>Active Bagworm Outbreaks:</b> <i>Metisa plana</i> infestations remain significant in P11E, P12F, P16G, and P17H as of May 2026. While trunk injection and fogging show some control in older patches, pest activity persists and requires strict adherence to recommended control timing. <span class='observation-ref'>(AR 1/2026, Pg. 51-53; PA Report 2/2025, Pg. 33)</span>",
                    "<b>Incomplete Crop Recovery & Pruning Backlogs:</b> Under-pruned sections (95.8 ha pending) in the ravines of P00A, P09C, and P12F are obstructing harvesting. Palms in these areas are often left unattended, directly contributing to crop losses. <span class='observation-ref'>(AR 1/2026, Pg. 22, 33)</span>",
                    "<b>Pest & Disease Escalation (Rats & Ganoderma):</b> Rat damage exceeded the 10% threshold in P17H during April/May censuses. Ganoderma is present in P00, P09, P10, and P12 with no progress on the required deboling of dead/infected palms. <span class='observation-ref'>(AR 1/2026, Pg. 49, 54)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "<div class='report-section-content'>The estate condition is generally acceptable, but critical focus is needed on two main issues: harvester productivity and bagworm control. Recruitment of new harvesters is expected to stabilize the workforce by Jan 2026. <span class='observation-ref'>(PA Report 2/2025, Pg. 7, 50)</span></div>",
                        "Area Statement": "<div class='report-section-content'>As of Nov 2025, the total mature area remains 1,548.20 ha. This comprises:<ul><li><b>Mature:</b> 1,548.20 ha.</li><li><b>New Planting:</b> 80 ha (Block PN25/K) land preparation in progress at the ex-excavation area, with planting expected in December.</li></ul><span class='observation-ref'>(PA Report 2/2025, Pg. 9)</span></div>",
                        "Labour Statement": "<div class='report-section-content'>Current workforce is 120 vs requirement of 127.<ul><li><b>Harvesters:</b> 72 workers vs requirement of 76 (shortage of 4).</li><li><b>Recruitment:</b> 4 new harvesters are expected in November to stabilize the workforce.</li></ul><span class='observation-ref'>(PA Report 2/2025, Pg. 11)</span></div>",
                        "Staff Establishment": "<div class='report-section-content'>Staffing is adequate. One Field Supervisor (Mr. Gobalakrishnan) is being medically boarded out. A Cadet Assistant is currently covering the role. <span class='observation-ref'>(PA Report 2/2025, Pg. 13-14)</span></div>",
                        "General Charges": "<div class='report-section-content'>YTD General Charges were RM 1.69M vs RM 1.91M budget (12% underspent).<ul><li><b>Overspending:</b> Electricity (+26%) and MSPO compliance costs (+34%).</li></ul><span class='observation-ref'>(PA Report 2/2025, Pg. 15)</span></div>",
                        "Upkeep & Cultivation": "<div class='report-section-content'><ul><li><b>Weeding:</b> On track (99% complete).</li><li><b>Manuring:</b> Delayed at 75% completion due to slow sub-surface application productivity (0.68 ha/man-day).</li><li><b>Pest & Disease:</b> Bagworm control (932 ha affected) is ongoing but infestations persist.</li></ul><span class='observation-ref'>(PA Report 2/2025, Pg. 19, 28, 33)</span></div>",
                        "Harvesting and Collection": "<div class='report-section-content'><ul><li><b>Interval:</b> The current interval is 16 days. YTD harvesting rounds were 15.5 vs 18 budget.</li><li><b>Productivity:</b> Badang teams output is ~1.6-1.8 MT, while Mini Dumpers achieve ~1.5-2.25 MT.</li></ul><span class='observation-ref'>(PA Report 2/2025, Pg. 42-43)</span></div>",
                        "Crop Production": "<div class='report-section-content'>YTD FFB yield is 14.37 MT/ha, slightly below the budget of 14.53 MT/ha (-1%). However, yield is 2% higher than the same period last year (Sept 2024). <span class='observation-ref'>(PA Report 2/2025, Pg. 45)</span></div>",
                        "Production Cost": "<div class='report-section-content'>YTD cost of production is <b>RM 268.28/MT</b>, which is favorable compared to the budget of RM 274.58/MT. <span class='observation-ref'>(PA Report 2/2025, Pg. 47)</span></div>",
                        "Vehicles Running Cost": "<div class='report-section-content'>Vehicle running costs are currently maintained within budget parameters. <span class='observation-ref'>(PA Report 2/2025, Pg. 48)</span></div>",
                        "Capital Expenditure": "<div class='report-section-content'>Unbudgeted fogging machines were purchased for bagworm control (RM 10,290) with Director approval. <span class='observation-ref'>(PA Report 2/2025, Pg. 49)</span></div>",
                        "Immature": "<div class='report-section-content'>Land preparation at PN25/K (80 ha) is ongoing. EFB application is being used to revitalize poor soil conditions from previous excavation. <span class='observation-ref'>(PA Report 2/2025, Pg. 9)</span></div>"
                    },
                    "agronomy": {
                        "Executive Summary": "<div class='report-section-content'>The visit on 17th June 2026 noted a drastic decline in yield performance (down 39.4% YoY as of May). The key yield-limiting factors include a massive drop in Total Bunch Number (-47.2%) stemming from 2025 moisture stress, incomplete crop recovery due to harvester shortages, prolonged bagworm damage, and severe delays in the manuring program. <span class='observation-ref'>(AR 1/2026, Pg. 6-8, 64-68)</span></div>",
                        "Nutrient Inputs/Progress of Manuring": "<div class='report-section-content'>The 2026 program is highly unsatisfactory due to late fertilizer deliveries. As of May 2026:<ul><li><b>Mixture A:</b> Only 35% completed.</li><li><b>Mixture B:</b> Only 44% completed.</li><li><b>Kieserite/RP:</b> 0% completed. Application in P16 was seen during rain, which is highly improper.</li><li><b>EFB:</b> Application in P09B is excessive and risking Oryctes breeding.</li></ul><span class='observation-ref'>(AR 1/2026, Pg. 15-18)</span></div>",
                        "Agronomic Observation": "<div class='report-section-content'><ul><li><b>Harvesting:</b> Intervals improved to ~15 days by May, but harvester productivity is poor (0.85-1.22 MT/md). Harvester shortage (17 pax) led to poor loose fruit collection and unattended ravines.</li><li><b>Pruning:</b> 95.8 ha backlog in P00A, P09C, P12F. Under-pruned ravines severely obstruct harvesting.</li><li><b>Weeding:</b> Inter-row generally acceptable. VOPs present in palm circles of P00, P06, P09, P11.</li><li><b>Pests & Disease:</b> Bagworm active in P11E, P12F, P16G, P17H. Rat damage >10% in P17H requires continued baiting. Ganoderma found in P00, P09, P10, P12 with no deboling action taken yet.</li></ul><span class='observation-ref'>(AR 1/2026, Pg. 22-54)</span></div>",
                        "Yield Performance": "<div class='report-section-content'>2025 full-year yield closed at 18.21 MT/ha (-3.6%). YTD May 2026 yield is <b>4.76 MT/ha</b>, an alarming 39.4% drop YoY. TBN fell by 47.2%. Despite the severe drop, promising bunch sets observed during the visit suggest an upcoming production increase in the second half of 2026. <span class='observation-ref'>(AR 1/2026, Pg. 68-71)</span></div>",
                        "Fertilizer Recommendation": "<div class='report-section-content'>The 2026 Fertilizer Program has been revised for the second half of the year in response to fertilizer price hikes and limited stock availability (See Appendix 1). The 2027 program will be formulated in H2 2026. <span class='observation-ref'>(AR 1/2026, Pg. 74)</span></div>"
                    },
                    "pinfosys": {
                        "Status": "N/A",
                        "Note": "Pinfosys Report details not available in the provided documents."
                    }
                },
                "policy": "<p>Policy cross-references are not yet available for this estate.</p>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                    const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-red-50 text-red-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3>${metric.lines.map(line => `<p class="text-sm">${line}</p>`).join('')}</div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass}"><h3 class="font-semibold">${metric.title}</h3><p class="text-2xl font-bold">${metric.value}</p><p class="text-xs text-gray-500 mt-1">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div><p class="text-sm text-gray-500">${metric.label}</p><p class="font-bold text-lg">${metric.value}</p></div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2026)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                            <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#ca8a04', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#fde047', '#facc15', '#eab308', '#ca8a04'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-800">${section}:</h4>${content}`).join('');
                }
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-800">${section}:</h4>${content}`).join('');
                }
                 if (pinfosysDiv && estateData.reports.pinfosys) {
                     if (estateData.reports.pinfosys.Status === "N/A") {
                          pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600 mt-2">Not Available</p>`;
                     } else {
                         pinfosysDiv.innerHTML = Object.entries(estateData.reports.pinfosys).map(([section, content]) => `<h4 class="font-semibold mt-4 text-gray-800">${section}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                     }
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const estateData = {
                "name": "Ladang Tagar 3",
                 "policy": `
