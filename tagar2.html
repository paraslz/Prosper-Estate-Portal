<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladang Tagar 2 - Plantation and Agronomy Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .details-content { display: none; }
        .details-content.active { display: block; }
        .dropdown-btn.active { background-color: #14532d; }
        .policy-item { border-left: 3px solid #16a34a; padding-left: 1rem; margin-top: 0.75rem; }
        .modal { display: none; }
        .modal.active { display: flex; }
        .chart-container { position: relative; height: 300px; width: 100%; margin: auto; }
        .pie-chart-container { position: relative; height: 350px; width: 100%; margin: auto; }
        .observation-ref { font-size: 0.75rem; color: #57534e; font-style: italic; }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Header -->
    <header class="bg-white shadow-md">
        <nav class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="text-xl font-bold text-gray-900">
                <a href="index.html" class="flex items-center">
                    Ladang Tagar 2 Report
                </a>
            </div>
            <a href="estates.html" class="text-green-800 hover:text-green-900 transition duration-300">&larr; Back to Estates List</a>
        </nav>
    </header>

    <!-- Main container for the report -->
    <div class="container mx-auto p-4 md:p-8">
        <div id="selected-estate-container" class="grid grid-cols-1 gap-8">
             <!-- Content will be generated by JavaScript -->
        </div>
    </div>
    
    <!-- Modal for displaying policy details -->
    <div id="policyModal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-2xl font-bold">Agricultural Policy Cross-Reference</h3>
                <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            </div>
            <div id="modalContent" class="space-y-4 overflow-y-auto pr-4 flex-grow">
                <!-- Modal content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Main script for application logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATA STORE ---
            const estateData = {
                "id": "tagar2",
                "name": "Ladang Tagar 2",
                "reportInfo": "Data based on Plantation Advisory Report 1/2026 (Visit: 22 Jan 2026) and Agronomy Report 1/2026 (Visit: 9 Apr 2026).",
                "summaryMetrics": {
                    "area": { "title": "Estate Area", "lines": ["Total Planted: 734.35 ha", "Mature: 734.35 ha", "Immature: 0 ha (P22 Mature 2026)"] },
                    "yield": { "title": "Yield/Ha (2025 Actual)", "value": "13.59 MT", "note": "5% lower than 2024 (AR Pg. 57)" },
                    "cost": { "title": "FFB Cost/Tonne (Actual vs Budget)", "value": "RM 342.46 / RM 283.08", "note": "YTD Nov 2025 (PAR Pg. 42)" },
                    "weeding": { "title": "Weeding Progress", "value": "Q1 2026 Progress", "note": "Circle weeding incomplete P00, P02, P12 (AR Pg. 29)" },
                    "manuring": { "title": "Manuring Progress (2026)", "value": "Mixture B 91%", "note": "Kieserite delayed at 23% (AR Pg. 13)" }
                },
                "keyMetrics": [
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Labour Ratio", "value": "1:15 ha", "note": "Critical harvester shortage (PAR Pg. 10)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' /></svg>", "label": "P&D Status", "value": "Active", "note": "Rat P16 (16%), Bagworm P18 (AR Pg. 35, 47)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-yellow-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M13 10V3L4 14h7v7l9-11h-7z' /></svg>", "label": "OER % (YTD)", "value": "18.76%", "note": "YTD Nov 2025" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-red-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z' /></svg>", "label": "Low Harvester Prod.", "value": "Suboptimal", "note": "Earning < Minimum Wage (PAR Pg. 36)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-purple-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' /></svg>", "label": "Harvest Interval", "value": "Acceptable", "note": "<20 days currently (AR Pg. 16)" },
                    { "icon": "<svg xmlns='http://www.w3.org/2000/svg' class='h-6 w-6 text-orange-600' fill='none' viewBox='0 0 24 24' stroke='currentColor'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M17.657 18.343A8 8 0 016.343 7.029m11.314 11.314a8 8 0 01-11.314-11.314m2.121 13.435a2 2 0 01-2.828 0l-2.122-2.121a2 2 0 010-2.828l5.656-5.657a2 2 0 012.829 0l2.121 2.121a2 2 0 010 2.828l-5.657 5.657z' /></svg>", "label": "Nutrient Status", "value": "Mg Deficiency", "note": "Orange fronds P16 (AR Pg. 21)" }
                ],
                "chartData": {
                    "production": { 
                        "labels": ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"], 
                        "ffb": [598.33, 628.80, 661.25, 721.36, 652.63, 789.22, 766.19, 711.40, 817.96, 814.08, 722, 792], 
                        "rainfall": [330, 259, 261, 351, 160, 142, 35, 150, 170, 207, 434, 238], 
                        "note": "*Chart data based on Full Year 2025 records. (AR Appendix 2)" 
                    },
                    "ageProfile": { 
                        "labels": ["4-7 Yrs (Young Mature)", "8-19 Yrs (Prime)", "20-25 Yrs (Old Mature)", ">26 Yrs (Old)"], 
                        "data": [27, 37, 14, 22], 
                        "title": "Tagar 2 Palm Age Profile 2026", 
                        "note": "*P22 matured in 2026. Replanting scheduled for 2027 (AR Pg. 9-10)." 
                    }
                },
                "observations": [
                    "<b>Severe Labour Shortage & Low Productivity:</b> Shortage of 15 workers (8 harvesters) remains a critical bottleneck. Harvesters earn below basic wage, contributing to turnover. <span class='observation-ref'>(PAR Pg. 10-11, 50)</span>",
                    "<b>Incomplete Crop Recovery in Ravines:</b> Harvesting in P00 and P01 ravines is hindered by palm height and under-pruning. Rotten bunches and oxidized loose fruits were observed. <span class='observation-ref'>(AR Pg. 17-18)</span>",
                    "<b>Manuring Program Delays (2026):</b> Mixture B application is slightly behind (91%), while Kieserite is significantly delayed at 23% due to late deliveries. <span class='observation-ref'>(AR Pg. 13)</span>",
                    "<b>Pest Outbreaks (Rats & Bagworms):</b> Significant rat damage (16%) found in P16, requiring baiting. Bagworm infestation (18 early larvae/palm) recorded in P18. <span class='observation-ref'>(AR Pg. 35, 47)</span>",
                    "<b>Low SPH & Vacant Points:</b> Stand per hectare is below target in P18F, P20G, and P22H. Repeated recommendations for infilling have seen no action. <span class='observation-ref'>(AR Pg. 11, 50)</span>",
                    "<b>Disease (Ganoderma):</b> Upper stem rot infections detected in mature areas P00A and P01B. Monitoring is critical. <span class='observation-ref'>(PAR Pg. 34)</span>",
                    "<b>Infrastructure & Infrastructure:</b> Road grading neglected in 2025; poor access hampers crop evacuation in P18F. Cattle intrusion remains unresolved. <span class='observation-ref'>(PAR Pg. 26; AR Pg. 40, 56)</span>"
                ],
                "reports": {
                    "plantation": {
                        "Executive Summary": "Estate performance faces critical operational challenges due to a shortage of 15 workers. Mechanization has ceased, reverting to wheelbarrows, which increases labour requirements to a 1:17 ha ratio for harvesters. Management must focus on recruitment to stabilize workforce and productivity. <span class='observation-ref'>(PAR Pg. 50-51, 10)</span>",
                        "Area Statement": "Total planted area is 734.35 ha. Roads and buildings occupy 34.95 ha. Mature palms comprise 83% of the planted area. <span class='observation-ref'>(PAR Pg. 9)</span>",
                        "Labour Statement": "Actual workforce: 49 vs Required: 64. Harvester shortage is severe. Reversion to wheelbarrows has further strained the required ratio. <span class='observation-ref'>(PAR Pg. 10-11)</span>",
                        "Staff Establishment": "Senior Assistant Manager in post with three supervisors. Office Clerk position remains vacant. <span class='observation-ref'>(PAR Pg. 12)</span>",
                        "General Charges": "Overall underspending of 10% recorded. However, recruitment immigration costs spiked significantly (RM500 to RM2,500 per worker). <span class='observation-ref'>(PAR Pg. 13)</span>",
                        "Upkeep & Cultivation": "Weeding: Circle spraying 82% complete. Pruning: 78% complete but hampered by labour. Roads: No grading done in 2025 due to low contract rates (RM12/chain). Drains: Desilting satisfactory but high sand content noted. Pests: Rat and bagworm outbreaks in P18F. Ganoderma seen in P00A/P01B. <span class='observation-ref'>(PAR Pg. 14-35)</span>",
                        "Harvesting and Collection": "Achieved 22 rounds vs budget 24. Harvest intervals ~15 days. Reverted to wheelbarrows as machines were in poor condition. Loose fruits uncollected in circles. <span class='observation-ref'>(PAR Pg. 36-38)</span>",
                        "Crop Production": "2025 yield was 13.59 MT/ha, 27% below budget. Inaccurate bunch counting suspected in 2016-2020 plantings. <span class='observation-ref'>(PAR Pg. 39-41)</span>",
                        "Production Cost": "RM 342.46/MT actual vs RM 286.50/MT budget, driven by low crop. <span class='observation-ref'>(PAR Pg. 42)</span>",
                        "Vehicles & Machinery": "New Holland tractor underutilized for manuring, leading to high running costs per hour. <span class='observation-ref'>(PAR Pg. 43)</span>",
                        "Immature (PR22/H)": "Scout harvesting began with 1.28 MT/ha. Weeding 51% complete. Basal pruning must be finished as area is now declared mature. <span class='observation-ref'>(PAR Pg. 45-49)</span>"
                    },
                    "agronomy": {
                        "Executive Summary": "Report 1/2026 (Visit Apr 9, 2026). 2025 yield (13.59 MT/ha) was unsatisfactory and 5% lower than 2024. Q1 2026 yield (2.54 MT/ha) is also down slightly. Manuring program for 2025 was completed but Q1 2026 is falling behind. <span class='observation-ref'>(AR Pg. 4, 57, 60)</span>",
                        "Nutrient Inputs/Progress of Manuring": "2025 manuring 100% complete by Dec. Q1 2026: Mixture B is at 91% of schedule, but Kieserite is only 23% due to late deliveries. Goal is 80 MT/month from April onwards. <span class='observation-ref'>(AR Pg. 12-13)</span>",
                        "Agronomic Observation": "<b>Mature:</b> Incomplete crop recovery in P00/P01 ravines (rotten bunches/oxidized fruits). Pruning backlogs (48 ha) mainly in P00. <b>Young Mature:</b> Poor vigor in hilly P18F1. <b>Pests:</b> 16% rat damage in P16; baiting done but follow-up needed. Bagworm (18 larvae/leaf) in P18 requires treatment. <span class='observation-ref'>(AR Pg. 16-48)</span>",
                        "Yield Performance": "2025 yield deficit of 5% vs 2024. Q1 2026 yield down 1.3% vs Q1 2025. Yield limiting factors: harv. intervals, incomplete ravine recovery, manuring delays, and pest infestation. <span class='observation-ref'>(AR Pg. 57, 60)</span>",
                        "Fertilizer Recommendation": "2026 programme revised due to price/stock. NK1 (1.75 kg/palm) for P01/P02. Mixture B and Kieserite for young/immature blocks. <span class='observation-ref'>(AR Pg. 61-63)</span>"
                    },
                    "pinfosys": "Not Available"
                },
                "policy": "<div class='policy-item'><p class='font-semibold'>Bagworm Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Bagworm-01:</b> Census must be conducted monthly. If infestation > 10 larvae/leaf (lower frond), immediate trunk injection or spraying is required.</p></div><div class='policy-item'><p class='font-semibold'>Rat Control</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Rat-02b:</b> Census required quarterly. If damage threshold > 10%, immediate baiting campaigns must be instituted. (Ref: P16 at 16%).</p></div><div class='policy-item'><p class='font-semibold'>Ganoderma Management</p><p class='text-sm text-gray-600'><b>Policy Ref: P&D-Gano-01:</b> Regular monitoring required for stem rot. Infected palms must be isolated/sanitized to prevent spread to prime blocks.</p></div><div class='policy-item'><p class='font-semibold'>Stand per Hectare (SPH)</p><p class='text-sm text-gray-600'><b>Policy Ref: AGR-SPH-02:</b> Vacant points must be infilled within 12-24 months of planting to ensure full stand and yield potential.</p></div>"
            };

            let chartInstances = {};
            const container = document.getElementById('selected-estate-container');

            function renderEstate() {
                container.innerHTML = createEstateHTML(estateData);
                setTimeout(() => {
                    initializeChartsForEstate();
                    populateInternalDropdowns();
                    attachEventListeners();
                }, 0);
            }

            function createEstateHTML(estate) {
                const summaryMetrics = estate.summaryMetrics;
                const summaryMetricsHTML = Object.values(estate.summaryMetrics).map(metric => {
                     const colorClass = metric.title.includes('Area') ? 'bg-blue-50 text-blue-800' : 
                                       metric.title.includes('Yield') ? 'bg-green-50 text-green-800' :
                                       metric.title.includes('Cost') ? 'bg-orange-50 text-orange-800' :
                                       metric.title.includes('Weeding') ? 'bg-yellow-50 text-yellow-800' : 'bg-purple-50 text-purple-800';
                    if (metric.lines) {
                        return `<div class="p-4 rounded-lg ${colorClass} shadow-sm"><h3 class="text-sm font-semibold text-gray-500">${metric.title}</h3><div class="mt-1">${metric.lines.map(line => `<p class="text-gray-900 font-medium">${line}</p>`).join('')}</div></div>`;
                    }
                    return `<div class="p-4 rounded-lg ${colorClass} shadow-sm"><h3 class="text-sm font-semibold text-gray-500">${metric.title}</h3><p class="text-3xl font-bold mt-1">${metric.value}</p><p class="text-xs mt-1 opacity-80">${metric.note}</p></div>`;
                }).join('');

                const keyMetricsHTML = estate.keyMetrics.map(metric => `
                    <div class="flex items-center space-x-3 bg-gray-50 p-3 rounded-lg">
                        <div class="bg-gray-100 p-2 rounded-full">${metric.icon}</div>
                        <div>
                            <p class="text-sm text-gray-500">${metric.label}</p>
                            <p class="font-bold text-lg">${metric.value}</p>
                            ${metric.note ? `<p class="text-xs text-gray-500">${metric.note}</p>` : ''}
                        </div>
                    </div>`).join('');

                const observationsHTML = estate.observations.map(obs => `<li class="ml-4">${obs}</li>`).join('');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-lg animate-fade-in">
                        <h2 class="text-3xl font-bold mb-2 text-gray-900">${estate.name}</h2>
                        <p class="text-sm text-gray-500 mb-6 italic">${estate.reportInfo}</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-8">${summaryMetricsHTML}</div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-4 border-b pb-2">Key Metrics & Agronomic Status</h3><div class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">${keyMetricsHTML}</div></div>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            <div><h3 class="text-xl font-semibold mb-2">Monthly Production vs Rainfall (2025)</h3><div class="chart-container"><canvas id="prodChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.production.note}</p></div>
                            <div><h3 class="text-xl font-semibold mb-2">Palm Age Profile</h3><div class="pie-chart-container"><canvas id="ageChart-${estate.id}"></canvas></div><p class="text-xs text-center text-gray-500 mt-2">${estate.chartData.ageProfile.note}</p></div>
                        </div>
                        <div class="mb-8"><h3 class="text-xl font-semibold mb-2 border-b pb-2">Key Observations & Issues</h3><ul class="list-disc list-inside space-y-2 text-gray-700 mt-4">${observationsHTML}</ul></div>
                        <div class="mb-8 text-center"><button class="policy-modal-btn bg-green-800 text-white px-6 py-3 rounded-lg hover:bg-green-900 transition shadow-md">View Agricultural Policy Cross-Reference</button></div>
                        <div class="space-y-2">
                             <button data-dropdown-id="${estate.id}-plantation" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Plantation Advisory Report Details</button>
                            <div id="${estate.id}-plantation" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-agronomy" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Agronomy Report Details</button>
                            <div id="${estate.id}-agronomy" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                            <button data-dropdown-id="${estate.id}-pinfosys" class="dropdown-btn w-full text-left bg-gray-800 text-white p-3 rounded-md hover:bg-gray-700 transition">Pinfosys Report Details</button>
                            <div id="${estate.id}-pinfosys" class="details-content bg-gray-50 p-4 rounded-md border border-gray-200"></div>
                        </div>
                    </div>`;
            }

            function initializeChartsForEstate() {
                const prodCanvasId = `prodChart-${estateData.id}`;
                const ageCanvasId = `ageChart-${estateData.id}`;
                if (chartInstances[prodCanvasId]) chartInstances[prodCanvasId].destroy();
                if (chartInstances[ageCanvasId]) chartInstances[ageCanvasId].destroy();

                const prodCtx = document.getElementById(prodCanvasId)?.getContext('2d');
                if(prodCtx) {
                    chartInstances[prodCanvasId] = new Chart(prodCtx, {
                        type: 'bar',
                        data: {
                            labels: estateData.chartData.production.labels,
                            datasets: [
                                { label: 'FFB Production (MT)', data: estateData.chartData.production.ffb, type: 'line', borderColor: '#c026d3', backgroundColor: 'transparent', yAxisID: 'y-ffb', tension: 0.4 },
                                { label: 'Rainfall (mm)', data: estateData.chartData.production.rainfall, backgroundColor: '#3b82f6', yAxisID: 'y-rainfall' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false } }, 'y-ffb': { type: 'linear', position: 'left', title: { display: true, text: 'FFB Production (MT)' } }, 'y-rainfall': { type: 'linear', position: 'right', title: { display: true, text: 'Rainfall (mm)' }, grid: { drawOnChartArea: false } } } }
                    });
                }

                const ageCtx = document.getElementById(ageCanvasId)?.getContext('2d');
                if(ageCtx) {
                    chartInstances[ageCanvasId] = new Chart(ageCtx, {
                        type: 'pie',
                        data: {
                            labels: estateData.chartData.ageProfile.labels,
                            datasets: [{ data: estateData.chartData.ageProfile.data, backgroundColor: ['#facc15', '#eab308', '#ca8a04', '#a16207'], hoverOffset: 4 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { title: { display: true, text: estateData.chartData.ageProfile.title, font: { size: 16 } }, legend: { position: 'right' } } }
                    });
                }
            }
            
            function populateInternalDropdowns() {
                const agronomyDiv = document.getElementById(`${estateData.id}-agronomy`);
                const plantationDiv = document.getElementById(`${estateData.id}-plantation`);
                const pinfosysDiv = document.getElementById(`${estateData.id}-pinfosys`);
                
                if (agronomyDiv && estateData.reports.agronomy) {
                    agronomyDiv.innerHTML = Object.entries(estateData.reports.agronomy).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }
                
                if (plantationDiv && estateData.reports.plantation) {
                    plantationDiv.innerHTML = Object.entries(estateData.reports.plantation).map(([section, content]) => `<h4 class="font-semibold mt-2 text-gray-800">${section.replace(/([A-Z])/g, ' $1').trim()}:</h4><p class="text-sm text-gray-600">${content}</p>`).join('');
                }

                if (pinfosysDiv && estateData.reports.pinfosys === "Not Available") {
                    pinfosysDiv.innerHTML = `<p class="text-sm text-gray-600">Not Available</p>`;
                }
            }

            function attachEventListeners() {
                container.querySelectorAll('.dropdown-btn').forEach(button => {
                    button.addEventListener('click', (event) => {
                        const id = event.currentTarget.dataset.dropdownId;
                        const content = document.getElementById(id);
                        content.classList.toggle('active');
                        event.currentTarget.classList.toggle('active');
                    });
                });
                container.querySelector('.policy-modal-btn')?.addEventListener('click', openPolicyModal);
            }

            renderEstate();
        });
        
        function openPolicyModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalContent = document.getElementById('modalContent');
            const estateName = "Ladang Tagar 2";
            
            modalTitle.innerText = `Agricultural Policy Cross-Reference: ${estateName}`;
            modalContent.innerHTML = estateData.policy;
            
            document.getElementById('policyModal').classList.add('active');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.remove('active');
        }
    </script>
</body>
</html>
